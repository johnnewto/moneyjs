  - markdown:
      id: adjusted-prediction
      title: Adjusted in-sample prediction
      source: |
        After checking the unadjusted model fit, the original `marcoverpas/Italy-SFC-Model`
        workflow also runs an adjusted in-sample prediction. That adjusted run uses the same
        `simType = "STATIC"` setting, but it exogenizes many additional endogenous variables
        from 1998-2021 so BIMETS reads their observed Eurostat values instead of solving them
        from the estimated behavioural equations.

        In other words, exogenization is a historical tracking device: the model still solves
        the remaining equations and accounting identities, but selected endogenous series are
        pinned to observed data, absorbing the prediction errors from the unadjusted fit. The
        adjusted figures in the reference repository are therefore closer to observed history
        than the unadjusted baseline shown in this notebook.

        The adjusted run exogenizes these 28 behavioural or price/flow variables over
        1998-2021:

        | Variable | Description |
        | --- | --- |
        | `Lpc` | Log of consumer price index |
        | `Lp_en` | Log of price of energy |
        | `mul` | Markup on loans to firms |
        | `mulh` | Markup on personal loans |
        | `mubb` | Average premium on bills held by banks |
        | `mubrow` | Average premium on bills held by foreign sector |
        | `mubh` | Average premium on bills held by households |
        | `fuf` | Firms' undistributed profit |
        | `lh` | Personal loans to households |
        | `gov` | Government spending |
        | `tr` | Transfers |
        | `Leh` | Log of household demand for shares |
        | `Lbh` | Log of household demand for government bills |
        | `Lhh` | Log of household demand for cash |
        | `Lbb` | Log of bank demand for bills |
        | `prod` | Labour productivity |
        | `Lns` | Log of labour force |
        | `gw` | Growth rate of wages |
        | `Lp` | Log of price level |
        | `LidR` | Log of real investment |
        | `LimR` | Log of real import |
        | `LconsR` | Log of real consumption |
        | `intmh` | Interest received by households on bank deposits |
        | `rstar` | ECB refinancing rate |
        | `tax` | Tax revenue |
        | `LxR` | Log of real export |
        | `Lp_im` | Log of price of import |
        | `Lp_row` | Log of foreign price level |

        It also exogenizes these variables for the whole simulation range:

        | Variable | Description |
        | --- | --- |
        | `oph` | Other payments associated with households |
        | `oacb` | Other financial assets of ECB |
        | `oaf` | Other financial assets held by firms |
        | `oab` | Other financial assets held by banks |
        | `oag` | Other financial assets held by government |
        | `oah` | Other financial assets held by households |
        | `mub` | Average premium paid by the government |
        | `perc_en` | Percentage of energy import to total import |
        | `lambdarow` | Share of government bills held by foreign sector |
        | `yf` | Foreign income |
        | `rho` | Reserve ratio |

        In this notebook's adjusted run, the companion other-payments flows `opf`, `opb`
        and `opcb` are also held to observed history. They are part of the unadjusted
        STATIC exogenization set above and remove a very slow accounting block around
        firms' profit distribution under the stricter notebook solver tolerance.

        This notebook keeps the baseline unadjusted on purpose, so the charts compare the
        model's simulated path against observed history rather than forcing the fitted values
        onto the observed series.
  - run:
      id: adjusted-run
      title: Adjusted in-sample run (1997-2021)
      description: STATIC tracking run matching the reference repository's adjusted in-sample prediction. The listed endogenous variables are held to observed Eurostat paths while the remaining equations and accounting identities solve.
      mode: baseline
      periods: 25
      simType: STATIC
      exogenize: [Lpc, Lp_en, mul, mulh, mubb, mubrow, mubh, fuf, lh, gov, tr, Leh, Lbh, Lhh, Lbb, prod, Lns, gw, Lp, LidR, LimR, LconsR, intmh, rstar, tax, LxR, Lp_im, Lp_row, oph, opf, opb, opcb, oacb, oaf, oab, oag, oah, mub, perc_en, lambdarow, yf, rho]
      resultKey: italy_sfc_adjusted
      sourceModelId: italy-sfc
  - chart:
      id: chart-gdp-adjusted
      title: Adjusted Fig. 1(a) Nominal GDP (current prices)
      variables:
        - y
      axisMode: shared
      referenceTrace: observed
      sourceRunCellId: adjusted-run
  - chart:
      id: chart-cons-adjusted
      title: Adjusted Fig. 1(b) Nominal consumption (current prices)
      variables:
        - cons
      axisMode: shared
      referenceTrace: observed
      sourceRunCellId: adjusted-run
