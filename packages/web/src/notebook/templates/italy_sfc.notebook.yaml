format: sfcr-notebook-yaml
formatVersion: 1
id: italy-sfc-notebook
title: Empirical SFC Model for Italy
metadata:
  version: 1
  template: italy-sfc
cells:
  - markdown:
      id: intro
      title: Overview
      source: >
        This notebook replicates the empirical stock-flow consistent (SFC) model for Italy by
        Rosa Canelli and Marco Veronese Passarella (Canelli, Fontana, Realfonzo & Veronese
        Passarella 2021, 2022, 2024), ported from the R/`bimets` code in
        `references/Italy-SFC-Model` (marcoverpas/Italy-SFC-Model). The model covers six
        sectors - households, firms, banks, the central bank (ECB), the government and the rest
        of the world - over 1998-2021, calibrated on (an elaboration of) Eurostat data.


        The original model has 40 behavioural equations whose coefficients are estimated by OLS
        in R, plus ~80 accounting identities. This port bakes the estimated coefficients into
        the live behavioural equations and runs the baseline in STATIC mode, matching the
        repo's unadjusted in-sample prediction (`type_pred = 0`): lags read from observed
        Eurostat history, while current-period behaviourals and accounting identities solve
        the simulated path. The simulated traces therefore diverge from observed data like
        Fig. 1 rather than being pinned to the historical series.


        Period index 0 corresponds to 1997 (initial values); period index i corresponds to
        year 1997 + i, so the run spans 1997-2021.
  - matrix:
      id: balance-sheet
      sourceRunCellId: baseline-run
      title: Balance sheet (observed)
      description: Aggregate balance sheet of the Italian economy by sector. Asset holdings are positive, liabilities negative; each column sums to zero once net worth is netted out, and each financial-instrument row sums to zero across sectors.
      note: Reproduced from observed Eurostat series (the repo's 2_BS_obs view). Select a period to inspect a given year.
      columns: [Households, Firms, Government, Banks, ECB, Foreign, Sum]
      sectors: [Households, Firms, Government, Banks, ECB, Foreign, ""]
      accountingKind: balance-sheet
      rows:
        - [Cash, Cash and reserves, +hh, "", "", +hbd, -hs, "", "0"]
        - [Deposits, Deposits, +mh, "", "", -ms, "", "", "0"]
        - [Securities, Securities (bills), +bh, "", -bs, +bb, +bcb, +brow, "0"]
        - [Loans, Loans, -lh, -lf, "", +ls, "", "", "0"]
        - [Shares, Shares, +eh, -es, "", "", "", "", "0"]
        - [OtherFA, Other net financial assets, +oah, +oaf, +oag, +oab, +oacb, +oarow, "0"]
        - [NetWorth, Net worth (balancing item), -vh, -vf, -vg, -vb, -vcb, -vrow, "0"]
        - [Sum, Sum, "0", "0", "0", "0", "0", "0", "0"]
  - matrix:
      id: transaction-flow
      sourceRunCellId: baseline-run
      title: Transactions-flow matrix (observed)
      description: Transactions-flow matrix of the Italian economy by sector. Current flows (income positive, expenditure negative) plus the financing counterparts (changes in assets negative, changes in liabilities positive) sum to zero in every column and every row.
      note: Reproduced from observed Eurostat series (the repo's 3_TFM_obs view), with the firms current and capital accounts combined into a single firms column.
      columns: [Households, Firms, Government, Banks, ECB, Foreign, Sum]
      sectors: [Households, Firms, Government, Banks, ECB, Foreign, ""]
      accountingKind: transaction-flow
      rows:
        - [Consumption, Consumption, -cons, +cons, "", "", "", "", "0"]
        - [Government, Government spending, "", +gov, -gov, "", "", "", "0"]
        - [Export, Exports, "", +x, "", "", "", -x, "0"]
        - [Import, Imports, "", -im, "", "", "", +im, "0"]
        - [Wages, Wages, +wb, -wb, "", "", "", "", "0"]
        - [Taxes, Taxes, -tax, "", +tax, "", "", "", "0"]
        - [Transfers, Transfers, +tr, "", -tr, "", "", "", "0"]
        - [Interest, Interest payments, +inth, -intf, -intg, +intb, +fcb, +introw, "0"]
        - [CorpProfit, Corporate profit (distributed), +fdf, -fdf, "", "", "", "", "0"]
        - [BankProfit, Bank profit, +fb, "", "", -fb, "", "", "0"]
        - [Seigniorage, CB seigniorage, "", "", +fcb, "", -fcb, "", "0"]
        - [OtherPay, Other payments, +oph, +opf, +opg, +opb, +opcb, +oprow, "0"]
        - [dCash, Change in cash and reserves, -d(hh), "", "", -d(hbd), +d(hs), "", "0"]
        - [dDeposits, Change in deposits, -d(mh), "", "", +d(ms), "", "", "0"]
        - [dSecurities, Change in securities, -d(bh), "", +d(bs), -d(bb), -d(bcb), -d(brow), "0"]
        - [dLoans, Change in loans, +d(lh), +d(lf), "", -d(ls), "", "", "0"]
        - [dShares, Change in shares, -d(eh), +d(es), "", "", "", "", "0"]
        - [dOtherFA, Change in other net FA, -d(oah), -d(oaf), -d(oag), -d(oab), -d(oacb), -d(oarow), "0"]
        - [Sum, Sum, "0", "0", "0", "0", "0", "0", "0"]
  - sequence:
      id: transaction-flow-sequence
      title: Transaction-flow sequence
      source:
        kind: matrix
        matrixCellId: transaction-flow
      description: Sequence view generated from the transactions-flow matrix at the selected simulation period.
  - equations:
      id: equations
      title: Accounting identities
      modelId: italy-sfc
      collapsed: false
      rows:
        - { name: "fuf", expression: "0.2645868325*ff", desc: "Firms' undistributed profit" }
        - { name: "TSDELTALOG(lh,1)", expression: "0.05829971282*TSLAG(cons/yd,1)", desc: "Loans to households" }
        - { name: "mubh", expression: "0.7925009699*TSLAG(mubh,1)+0.8039101157*mub", desc: "Premium on government bills held by households" }
        - { name: "mul", expression: "-0.01352819727+0.4904592188*TSLAG(mub,1)", desc: "Markup on loans to firms" }
        - { name: "mulh", expression: "0.02902256245+0.2297245242*TSLAG(mub,1)", desc: "Markup on personal loans to households" }
        - { name: "Lbb", expression: "0.9184678492*TSLAG(log(ls+hbd+bb),1)+0.3810144635*dum", desc: "Stock of bills held by banks (log)" }
        - { name: "tax", expression: "0.5140981384*(TSLAG(wb,1))+0.06132552397*(TSLAG((yd-wb),1))+0.04162683316*(TSLAG(vh,1))", desc: "Tax revenue" }
        - { name: "tr", expression: "1.043369861*TSLAG(tr,1)+374169.8585*TSDELTA(un,1)", desc: "Transfers and benefits" }
        - { name: "Lbh", expression: "0.9033685467*TSLAG(log(vh),1)+-0.7748525636*dum", desc: "Holdings of government bills (log)" }
        - { name: "Leh", expression: "0.9245377119*TSLAG(log(vh),1)", desc: "Holdings of shares (log)" }
        - { name: "TSDELTA(Lhh,1)", expression: "0.006220519043*log(cons/pc)", desc: "Holdings of cash (log)" }
        - { name: "rho", expression: "1.003838554*TSLAG(rho,1)", desc: "Reserve ratio" }
        - { name: "yf", expression: "1.036662756*TSLAG(yf,1)", desc: "Foreign income (yf1 = 1 + gF)" }
        - { name: "exr", expression: "0.999754368*MOVAVG(exr,2)", desc: "Exchange rate: dollars per 1 euro" }
        - { name: "lambdarow", expression: "0.8752750723*TSLAG(lambdarow,1)+0.252528926*TSLAG(rbrow,1)", desc: "Share of government bills purchased by foreign agents" }
        - { name: "mubb", expression: "0.9244328851*TSLAG(mubb,1)+0.2481936746*mub", desc: "Premium on government bills held by banks" }
        - { name: "mubrow", expression: "0.5537887521*TSLAG(mubrow,1)+0.9163600321*mub", desc: "Premium on government bills held by RoW" }
        - { name: "intmh", expression: "-69139.3257+0.05465478104*mh", desc: "Interests paid by banks to households on deposits and other A/L" }
        - { name: "TSDELTALOG(prod,1)", expression: "-0.003662952028+0.3966443515*TSDELTALOG(100*w/p,1)+0.1826436653*TSDELTALOG(100*y/p,2)", desc: "Labour productivity (real value added per employee)" }
        - { name: "Lns", expression: "1.000845923*TSLAG(Lns,1)+0.03062052672*(log(nd)-TSLAG(Lns,1))", desc: "Labour force (log)" }
        - { name: "gw", expression: "0.008641812243*TSDELTAP(p/100,1)+-0.7855263998*TSDELTA(un,1)", desc: "Wage rate growth" }
        - { name: "perc_en", expression: "-0.002156806238*infl_en+0.01263026888*TSLAG(log(y/p),1)", desc: "Share of energy products to total import" }
        - { name: "LconsR", expression: "0.9063428643*TSLAG(log(y*100/pc),1)+0.05500181197*TSLAG(log(vh*100/pc),1)", desc: "Real consumption (log); y used in place of yd for stability" }
        - { name: "gov", expression: "1.01*TSLAG((gov/p),1)*p", desc: "Government consumption" }
        - { name: "LidR", expression: "-117.5121355+138.6163422*TSLAG(log(y)/log(k),1)", desc: "Real investment net of capital depreciation (log)" }
        - { name: "LxR", expression: "7.878563023+0.5119948292*TSLAG(log(yf),1)+0.07953035772*TSLAG(exr*p/p_row,1)", desc: "Log of real export" }
        - { name: "LimR", expression: "4.092185889+0.633165807*TSLAG(log(y),1)+-0.1058226447*TSLAG(p_im/p,1)", desc: "Log of real import" }
        - { name: "Lp_im", expression: "2.169566159+0.1879363716*TSLAG(exr,1)+0.4874950883*TSLAG(Lp_row,1)", desc: "Log of price of import" }
        - { name: "Lp", expression: "0.05816269859*TSLAG(Lp_en,1)+0.6192720172*TSLAG(Lp_row,1)+0.1044414215*TSLAG(log(100*y/p),1)", desc: "Log of price level (GDP deflator)" }
        - { name: "Lpc", expression: "0.181837429*TSLAG(Lp_en,1)+0.5047636088*TSLAG(Lp_row,1)+0.1010135865*TSLAG(log(100*y/p),1)", desc: "Log of consumer price index" }
        - { name: "mub", expression: "0.03222812595*TSLAG(deb/y,1)+-0.07942628589*bcb/bs+-0.4223383907*rstar", desc: "Average premium on government bills" }
        # Exogenized-list behaviourals (ported from R; held to observed data via the baseline run's `exogenize`).
        - { name: "oacb", expression: "-4533.844042+1.140538927*TSLAG(oacb,1)", desc: "Other financial assets held by ECB (exogenized in baseline run)" }
        - { name: "oaf", expression: "16702.34113+0.8972048528*TSLAG(oaf,1)", desc: "Other financial assets/liabilities of firms (exogenized in baseline run)" }
        - { name: "oab", expression: "-431517.0761+0.7452631022*TSLAG(oab,1)", desc: "Other financial assets held by banks (exogenized in baseline run)" }
        - { name: "oag", expression: "86022.61571+0.5829040298*TSLAG(oag,1)", desc: "Other financial assets/liabilities of government (exogenized in baseline run)" }
        - { name: "oah", expression: "134828.9666+0.9080466985*TSLAG(oah,1)", desc: "Other assets of households (exogenized in baseline run)" }
        - { name: "rstar", expression: "0.01858333186", desc: "Policy rate (exogenized in baseline run)" }
        - { name: "Lp_row", expression: "0.206831466+0.9591765307*TSLAG(Lp_row,1)", desc: "Log foreign price level (exogenized in baseline run)" }
        - { name: "Lp_en", expression: "1.005825582*TSLAG(Lp_en,1)", desc: "Log of energy price (exogenized in baseline run)" }
        - { name: "TSDELTAP(oph,1)", expression: "1*TSDELTAP(oph,1)", desc: "Other payments or receipts of households (exogenized in baseline run; degenerate par_oph=1)" }
        - [y, cons + id + gov + nx, "Nominal GDP (expenditure)."]
        - [gy, y / lag(y) - 1, "Nominal GDP growth rate."]
        - [deltak, 0.046, "Capital depreciation rate (1996-2019 average)."]
        - [idR, exp(LidR), "Real net investment."]
        - [id, idR * p / 100 + deltak * lag(k), "Nominal gross investment."]
        - [k, lag(k) * (1 - deltak) + id, "Nominal capital stock."]
        - [ff, y - intf - wb + opf, "Firms' total profit."]
        - [intf, rl * lf, "Interest paid on loans to firms."]
        - [rl, rstar + mul, "Interest rate on loans to firms."]
        - [fdf, ff - fuf, "Firms' distributed profit."]
        - [lf, lag(lf) + id - fuf - (es - lag(es)) + (oaf - lag(oaf)), "Bank loans to firms."]
        - [es, eh, "Supply of shares."]
        - [vf, oaf - (lf + es), "Net wealth of firms."]
        - [yd, wb - tax + tr + inth + fdf + fb + oph, "Household disposable income."]
        - [consR, exp(LconsR), "Real consumption."]
        - [cons, consR * p / 100, "Nominal consumption."]
        - [vh, lag(vh) + yd - cons, "Net wealth of households."]
        - [intlh, rlh * lag(lh), "Interest paid by households on personal loans."]
        - [rbh, rstar + mubh, "Interest rate received by households on bills."]
        - [intgh, rbh * lag(bh), "Interest received by households on government debt."]
        - [inth, intgh + intmh - intlh, "Net interest received by households."]
        - [rlh, rstar + mulh, "Interest rate on loans to households."]
        - [Omega, wb / y, "Wage share."]
        - [ls, lf + lh, "Total supply of loans."]
        - [ms, mh, "Supply of bank deposits."]
        - [fb, intb, "Banks' profit."]
        - [intb, intgb + intf + intlh - intmh, "Total net interest received by banks."]
        - [intgb, rbb * lag(bb), "Interest received by banks on government debt."]
        - [bb, exp(Lbb), "Stock of bills held by banks."]
        - [vb, oab + hbd + bb + ls - ms, "Net wealth of banks."]
        - [def, gov + tr + intg - tax - fcb, "Government deficit."]
        - [deb, bs, "Government debt stock."]
        - [intg, rb * lag(deb), "Interest payments on government debt."]
        - [bs, lag(bs) + def, "Supply of government bills."]
        - [vg, -bs + oag, "Net wealth of government."]
        - [eh, exp(Leh), "Household holdings of shares."]
        - [bh, exp(Lbh), "Household holdings of government bills."]
        - [hh, exp(Lhh), "Household holdings of cash."]
        - [mh, vh + lh - hh - bh - eh - oah, "Household holdings of deposits."]
        - [bcb, bs - bh - bb - brow, "Central bank holdings of government bills."]
        - [hs, bcb + oacb - vcb, "Supply of cash (high-powered money)."]
        - [fcb, intg - intgh - intgb - introw, "Central bank profit (remitted to government)."]
        - [hbd, rho * ms, "Reserve requirement demanded by banks."]
        - [hd, hbd + hh, "Total demand for cash and reserves."]
        - [im, exp(LimR) * p / 100, "Nominal imports."]
        - [x, exp(LxR) * p / 100, "Nominal exports."]
        - [nx, x - im, "Net exports."]
        - [brow, lambdarow * bs, "Government bills held by the foreign sector."]
        - [vrow, brow + oarow, "Net wealth of the rest of the world."]
        - [introw, rbrow * lag(brow), "Interest received by the foreign sector."]
        - [re, fdf / lag(eh), "Return rate on shares."]
        - [rb, rstar + mub, "Average yield on government securities."]
        - [rbb, rstar + mubb, "Yield on bills held by banks."]
        - [rbrow, rstar + mubrow, "Yield on bills held by the foreign sector."]
        - [wb, w * nd, "Wage bill."]
        - [nd, 100 * y / (prod * p), "Employment (labour demand)."]
        - [ns, exp(Lns), "Labour force."]
        - [w, lag(w) * (1 + gw), "Nominal wage rate."]
        - [un, 1 - nd / ns, "Unemployment rate."]
        - [p, exp(Lp), "GDP deflator."]
        - [pc, exp(Lpc), "Consumer price index."]
        - [p_row, exp(Lp_row), "Foreign price level."]
        - [p_im, exp(Lp_im), "Import price level."]
        - [infl, (p - lag(p)) / lag(p), "GDP-deflator inflation."]
        - [inflc, (pc - lag(pc)) / lag(pc), "CPI inflation."]
        - [def_ratio, def / y, "Deficit-to-GDP ratio."]
        - [deb_ratio, deb / y, "Debt-to-GDP ratio."]
        - [p_en, exp(Lp_en), "Energy price level."]
        - [im_en, im * perc_en, "Energy imports."]
        - [infl_en, (p_en - lag(p_en)) / lag(p_en), "Energy-price inflation."]
        - [opb, fb - intb + (vb - lag(vb)), "Other payments of banks."]
        - [opf, vf - lag(vf) - (cons + gov + nx - wb - intf - fdf), "Other payments of firms (exogenized in baseline run)."]
        - [opg, vg - lag(vg) - (-gov + tax - tr - intg + fcb), "Other payments of government."]
        - [opcb, vcb - lag(vcb), "Other payments of the central bank."]
        - [oprow, -(oph + opf + opg + opb + opcb), "Other payments of the rest of the world."]
        - [oarow, -(oah + oaf + oab + oacb + oag), "Other net financial assets of the rest of the world."]
        - [vcb, -(vh + vf + vrow + vg + vb), "Net wealth of the central bank."]
        - [yR, 100 * y / p, "Real GDP."]
        - [iddR, 100 * id / p, "Real gross investment."]
        - [xR, 100 * x / p, "Real exports."]
        - [imR, 100 * im / p, "Real imports."]
  - solver:
      id: solver
      title: Solver
      modelId: italy-sfc
      collapsed: true
      method: gauss-seidel
      tolerance: "1e-8"
      maxIterations: 1000
      defaultInitialValue: "1"
  - externals:
      id: externals
      title: Externals and observed history
      modelId: italy-sfc
      collapsed: true
