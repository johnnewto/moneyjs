  - markdown:
      id: estimated-coefficients
      title: Estimated behavioural equations
      source: >
        The 40 behavioural equations of the original model are estimated by OLS in R over
        1998-2019 (`bimets::ESTIMATE`). Because the SFCR engine does not estimate, each
        behavioural variable is supplied here as its observed series (see the Externals cell).
        For reference, the fitted coefficients (regenerated by
        `scripts/generate_italy_sfc_r_fixture.R`) include:


        - Real consumption: `LconsR = 0.906*log(y*100/pc)[-1] + 0.055*log(vh*100/pc)[-1]`

        - Real net investment: `LidR = -117.5 + 138.6*(log(y)/log(k))[-1]`

        - Real exports: `LxR = 7.879 + 0.512*log(yf)[-1] + 0.080*(exr*p/p_row)[-1]`

        - Real imports: `LimR = 4.092 + 0.633*log(y)[-1] - 0.106*(p_im/p)[-1]`

        - GDP deflator: `Lp = 0.058*Lp_en[-1] + 0.619*Lp_row[-1] + 0.104*log(100*y/p)[-1]`

        - Consumer prices: `Lpc = 0.182*Lp_en[-1] + 0.505*Lp_row[-1] + 0.101*log(100*y/p)[-1]`

        - Tax revenue: `tax = 0.514*wb[-1] + 0.061*(yd-wb)[-1] + 0.042*vh[-1]`

        - Average bill premium: `mub = 0.032*(deb/y)[-1] - 0.079*(bcb/bs) - 0.422*rstar`

        - Firms' retained profit: `fuf = 0.265*ff`; Government consumption: `gov = 1.01*(gov/p)[-1]*p`.


        Full coefficient values are in `scripts/generated/italy_sfc_yaml_fragments.txt`.
  - markdown:
      id: exogenization-list
      title: Unadjusted STATIC exogenization list
      source: |
        The STATIC in-sample run holds the following 12 variables exogenous to their
        observed Eurostat paths (matching `exogenizeList` in `4_In_sample_pred` with
        `type_pred = 0`). Every other behavioural equation solves endogenously, so the
        simulated traces are free to diverge from observed history.

        | Variable | Description |
        | --- | --- |
        | `oph` | Other payments or receipts of households |
        | `opf` | Other payments or receipts received by firms |
        | `opb` | Other payments or receipts received by banks |
        | `opcb` | Other payments or receipts received by CB |
        | `oacb` | Other financial assets held by ECB |
        | `oaf` | Other financial assets/liabilities of firms |
        | `oab` | Other financial assets held by banks |
        | `oag` | Other financial assets/liabilities of government |
        | `oah` | Other assets of households |
        | `rstar` | Policy rate |
        | `Lp_row` | Log foreign price level |
        | `Lp_en` | Log of energy price |
  - run:
      id: baseline-run
      title: Baseline run (1997-2021)
      description: STATIC in-sample simulation matching the unadjusted R prediction. Lags read from observed Eurostat history while the live behavioural equations and accounting identities solve the simulated path.
      mode: baseline
      periods: 25
      simType: STATIC
      exogenize: [oph, opf, opb, opcb, oacb, oaf, oab, oag, oah, rstar, Lp_row, Lp_en]
      resultKey: italy_sfc_baseline
