format: sfcr-notebook-yaml
formatVersion: 1
id: gl2-pc-notebook
title: GL2 PC Notebook
metadata:
  version: 1
  template: gl2-pc
cells:
  - markdown:
      id: intro
      title: Overview
      source: >
        This notebook adapts `gl2-pc.Rmd` into executable browser cells. 
        It includes the PC balance-sheet, transactions-flow, and account-transactions matrices, 
        the baseline portfolio-choice model, the interest-rate scenario from the article, 
        a deterministic `PCEX1` random-shock section with a stored `Ra` sequence, 
        the `PCEX2` adaptive-expectations variant, and the `PCEX3` interest-sensitive 
        propensity-to-consume extension.
      more: |
        **Model PC** — Godley & Lavoie's _"portfolio choice"_ model (_Monetary
        Economics_, 2007, chapter 4) — is the first model in the book where households
        hold **more than one financial asset**. Where model SIM (chapter 3) had a single
        form of money, PC splits household wealth between two government liabilities:
        non-interest-bearing **cash** (`Hh`) and interest-bearing **bills** (`Bh`). The
        letters "PC" stand for _portfolio choice_: the central new behaviour is how
        households divide their wealth between the two.

        The economy still has the SIM sectors — **households**, **production firms** and
        **government** — but adds a **central bank** that buys whatever bills households
        do not want (`Bcb`) and issues cash against them. The new ingredients relative to
        SIM are:

        - **bills paying interest** at the policy rate `r`, so households now receive
          interest income `lag(r) * lag(Bh)`;
        - a **portfolio (liquidity-preference) decision**: the share of wealth held as
          bills rises with the interest rate and falls with the income-to-wealth ratio
          (Tobin-style);
        - a **central bank** that fixes `r` and accommodates household portfolio choices,
          so the interest rate is a _policy instrument_, not a market price.

        This notebook adapts `gl2-pc.Rmd` into executable cells. It builds up the PC
        balance-sheet, transactions-flow and account-transaction matrices, the baseline
        model, the chapter-4 experiments (a higher interest rate; a higher propensity to
        consume), and three extensions: `PCEX1` (the role of mistaken expectations with a
        stored random-shock sequence), `PCEX2` (adaptive expectations), and `PCEX3` (an
        interest-sensitive propensity to consume).
  - matrix:
      id: balance-sheet
      accountingKind: balance-sheet
      title: PC balance sheet
      description: Balance-sheet matrix for model PC following the article structure.
      note: Validated against the baseline simulation from the source vignette.
      sourceRunCellId: baseline-run
      columns: [Households, Firms, Government, Central bank, Sum]
      sectors: [Households, Firms, Government, Central bank, ""]
      rows:
        - [Money, Money, +Hh, "", "", -Hs, "0"]
        - [Bills, Bills, +Bh, "", -Bs, +Bcb, "0"]
        - ["", Balance, -V, "", +V, "", "0"]
        - [Sum, Sum, "0", "0", "0", "0", "0"]
      more: |
        This is the PC **balance sheet** (Table 4.1 in Godley & Lavoie). Compared with
        SIM there are now two assets and a fourth sector:

        - **Households** hold their wealth `V` as cash `+Hh` and bills `+Bh`.
        - **Government** owes the whole bill stock `-Bs`.
        - The **central bank** holds bills `+Bcb` as the asset backing the cash it issues
          `-Hs`, so its net worth is zero.
        - **Firms** own nothing and owe nothing — all income is distributed, exactly as
          in SIM.

        The accounting conventions are unchanged: **assets are positive, liabilities
        negative**, every row sums across sectors to zero, and the net-worth (balance)
        row closes each column. Households' wealth `V` is the mirror image of the
        government's net debt (`V = Bs - Bcb + Hh - ...`), and in the solved baseline it
        settles at `V ≈ 85.34`, split into `Bh ≈ 53.45` of bills and `Hh ≈ 31.90` of
        cash.
  - matrix:
      id: transaction-flow
      accountingKind: transaction-flow
      title: PC transactions-flow matrix
      description: Transactions-flow matrix for model PC following the article structure.
      note: Validated against the baseline simulation from the source vignette.
      sourceRunCellId: baseline-run
      columns: [Households, Firms, Government, CB current, CB capital, Sum]
      sectors: [Households, Firms, Government, Central bank, Central bank, ""]
      rows:
        - [Consumption, Consumption, -C, +C, "", "", "", "0"]
        - label: Govt. expenditures
          values:
            - ""
            - +G
            - -G
            - ""
            - ""
            - "0"
        - [Income, Income, +Y, -Y, "", "", "", "0"]
        - [Interest, Interest payments, +lag(r) * lag(Bh), "", -lag(r) * lag(Bs), +lag(r) * lag(Bcb), "", "0"]
        - [Profits, CB profits, "", "", +lag(r) * lag(Bcb), -lag(r) * lag(Bcb), "", "0"]
        - [Taxes, Taxes, -TX, "", +TX, "", "", "0"]
        - [Money, Change money, -(Hh - lag(Hh)), "", "", "", +(Hs - lag(Hs)), "0"]
        - [Bills, Change bills, -(Bh - lag(Bh)), "", +(Bs - lag(Bs)), "", -(Bcb - lag(Bcb)), "0"]
        - [Sum, Sum, "0", "0", "0", "0", "0", "0"]
      more: |
        The **transactions-flow matrix** (Table 4.2 in Godley & Lavoie) is the heart of
        the SFC method. Every cell is a payment _out of_ one sector (a minus) that is
        simultaneously a receipt _into_ another (a plus), so **every row and every column
        sums to zero** — Godley's quadruple-entry principle.

        PC adds two features SIM did not have:

        - **Interest flows.** The row `lag(r) * lag(Bh)` pays interest on last period's
          bills from the government to households, while the central bank rebates the
          interest it earns on its own bills (`lag(r) * lag(Bcb)`) back to the government
          as _central-bank profits_. The central bank therefore makes zero net income.
        - **A capital (flow-of-funds) account split** for the central bank, separating
          its current account (interest in, profits out) from its capital account (the
          change in its bill holdings funding the change in cash).

        The bottom stock-change rows are where flows meet stocks: household saving is
        allocated between the change in cash `-(Hh - lag(Hh))` and the change in bills
        `-(Bh - lag(Bh))`, mirrored by the issuers. That mirroring is the model's
        consistency check (see the solver note).
  - matrix:
      id: account-transactions
      collapsed: false
      sourceRunCellId: baseline-run
      title: PC account transactions
      description: Account-level transaction matrix for PC with hierarchical sector and account columns.
      note: Columns group balance-sheet accounts by sector. Use Expand all / Collapse all or click sector headers to show or hide account columns.
      columns: [Deposits, Bills, Equity, Current, Equity, Current, Bills (Bs), Equity, Current, Bills, Equity, Sum]
      sectors: [Households (HH), Households (HH), Households (HH), Firms, Firms, Government (Govt), Government (Govt), Government (Govt), Central_bank (CB), Central_bank (CB), Central_bank (CB), ""]
      columnBadges: [asset, asset, equity, asset, equity, asset, liability, equity, liability, asset, equity, ""]
      accountingKind: account-transactions
      rows:
        - [Consumption, Consumption, -C, "", -C, +C, +C, "", "", "", "", "", "", "0"]
        - [Govt, Govt. expenditures, "", "", "", +G, +G, -G, "", -G, "", "", "", "0"]
        - [Income, Income, +Y, "", +Y, -Y, -Y, "", "", "", "", "", "", "0"]
        - [Interest, Interest payments, +lag(r) * lag(Bh), "", +r'•Bh', "", "", -lag(r) * lag(Bs), "", -r'•Bs', +r'•Bcb', "", +r'•Bcb', "0"]
        - [Profits, CB profits, "", "", "", "", "", +r'*Bcb, "", +r'•Bcb, -r'*Bcb', "", -r'•Bcb', "0"]
        - [Taxes, Taxes, -TX, "", -TX, "", "", +TX, "", +TX, "", "", "", "0"]
        - [Money, Change money, "", "", "", "", "", "", "", "", "", "", "", "0"]
        - [Bills, Change bills, -d(Bh), +d(Bh), "", "", "", +d(Bs), -d(Bs), "", -d(Bcb), +d(Bcb), "", "0"]
        - [Sum, Sum, Mh, Bh, HH_eq, "", "", "", Deficit, "", "", Hs, "", "0"]
      more: |
        This is the same period's transactions expanded to the **account level**:
        balance-sheet accounts (deposits/cash, bills, equity) are grouped under each
        sector, so you can trace a single transaction across the specific accounts it
        touches. Use **Expand all / Collapse all**, or click a sector header, to show or
        hide the account columns under each sector.

        It is the most granular view of the quadruple-entry structure: every row still
        sums to zero across accounts, and the closing **Sum** row reports the
        end-of-period stocks (household cash `Mh`, bills `Bh`, the government deficit, and
        issued cash `Hs`) that carry into the next period.

  - sequence:
      id: transaction-flow-sequence
      title: PC transaction flow sequence
      source:
        kind: matrix
        matrixCellId: transaction-flow
      description: Sequence view generated from the PC transactions-flow matrix at the selected simulation period.
      more: |
        This reads the transactions-flow matrix **column by column** at the selected
        period, as each sector's budget identity. Following the columns shows the
        _circuit_ of money and bills within a single period: government spending and
        interest payments inject purchasing power; consumption and taxes withdraw it; and
        whatever households do not consume is allocated between additional cash and
        additional bills according to the portfolio rule.
  - equations:
      id: equations
      title: PC model
      modelId: pc-baseline
      collapsed: false
      rows:
        - [Y, C + G, "National income.", $/year, flow, identity]
        - [YD, Y - TX + lag(r) * lag(Bh), "Disposable income including interest on bills.", $/year, flow, identity]
        - [TX, theta * (Y + lag(r) * lag(Bh)), "Taxes levied on income and bill interest.", $/year, flow, identity]
        - [V, I(YD - C), "Household wealth.", $, stock, accumulation]
        - [C, alpha1 * YD + alpha2 * lag(V), "Consumption depends on disposable income and lagged wealth.", $/year, flow, identity]
        - [Hh, V - Bh, "Household money holdings.", $, stock, accumulation]
        - [Hh_Tobin, V * ((1 - lambda0) - lambda1 * r + lambda2 * (YD / V)), "Alternative Tobin's portfolio-choice definition for money holdings.", $, stock, accumulation, eq-6-Hh1]
        - [Bh, V * (lambda0 + lambda1 * r - lambda2 * (YD / V)), "Household bill holdings.", $, stock, accumulation]
        - [Bs, I(G + lag(r) * lag(Bs) - TX - lag(r) * lag(Bcb)), "Government bill supply.", $, stock, accumulation]
        - [Hs, I(d(Bcb)), "High-powered money supplied by the central bank.", $, stock, accumulation]
        - [Bcb, Bs - Bh, "Central-bank bill holdings.", $, stock, accumulation]
        - [Mh, I(Households.Deposits), "", "", "", "", eq-cddd7630-9e5a-44fb-aeaf-f95ecd2a071c]
        - [BGs, BGs' + Government.Bills * dt, "", "", "", "", eq-786f7c2b-e729-4710-9109-79e5787910a9]
        - [Bcbs, I(Central_bank.Bills), "", "", "", "", eq-a50bd039-4cea-42e2-b9c0-f6a08dacb824]
      more: |
        These are the equations of model PC, following Godley & Lavoie chapter 4
        (eqs. 4.1–4.11). They fall into natural groups:

        - **Output and income.** `Y = C + G` (eq. 4.1); disposable income now _includes
          interest on bills_, `YD = Y - TX + lag(r) * lag(Bh)` (eq. 4.2); taxes fall on
          income _and_ interest receipts, `TX = theta * (Y + lag(r) * lag(Bh))`
          (eq. 4.3).
        - **The behavioural core.** Consumption `C = alpha1 * YD + alpha2 * lag(V)`
          (eq. 4.5) is the SIM consumption function with _wealth_ `V` replacing money;
          wealth accumulates as `V = lag(V) + (YD - C)` (eq. 4.4).
        - **The portfolio choice (the new content of chapter 4).**
          `Bh = V * (lambda0 + lambda1 * r - lambda2 * (YD / V))` (eq. 4.7) is the
          Tobinesque bill-demand function: the _share_ of wealth held as bills rises with
          the interest rate `r` and falls with the income-to-wealth ratio `YD / V`. Cash
          is the residual, `Hh = V - Bh` (eq. 4.6) — money is what is left after the
          portfolio decision.
        - **Government and central bank.** Bill supply grows with the deficit,
          `Bs = lag(Bs) + (G + lag(r) * lag(Bs)) - (TX + lag(r) * lag(Bcb))` (eq. 4.8);
          the central bank takes up the residual bills `Bcb = Bs - Bh` (eq. 4.10) and
          issues cash to match, `Hs = lag(Hs) + d(Bcb)` (eq. 4.9).
        - **`Hh_Tobin`** is the _alternative_ expression for cash from the full Tobin
          system, `V * ((1 - lambda0) - lambda1 * r + lambda2 * (YD / V))`. It is shown
          to demonstrate the adding-up constraint: the money and bill shares must sum to
          one, so this equals `V - Bh`.

        **The redundant equation.** As in SIM, the system has one equation more than it
        needs. The redundant relation is `Hh = Hs`: the cash households end up holding
        equals the cash the central bank has issued. It is never imposed on the solver —
        it _emerges_, and checking it holds is how we know the accounting is watertight.
  - solver:
      id: solver
      title: Solver
      modelId: pc-baseline
      collapsed: true
      method: gauss-seidel
      tolerance: "1e-10"
      maxIterations: 200
      defaultInitialValue: "1e-15"
      hiddenLeftVariable: Hh
      hiddenRightVariable: Hs
      hiddenTolerance: "0.00001"
      relativeHiddenTolerance: false
      more: |
        PC is solved period by period with **Gauss–Seidel** iteration: lagged stocks
        (`lag(V)`, `lag(Bh)`, `lag(Bcb)`, …) are known from the previous period, and the
        within-period equations are iterated to convergence for the current flows and
        end-of-period stocks.

        The solver's **hidden variables** `Hh` and `Hs` implement the redundant-equation
        check. Because one equation is redundant, the equality `Hh = Hs` is _not_ used to
        find the solution — the solver instead verifies, to tolerance `hiddenTolerance`,
        that the independently computed household cash and central-bank cash agree every
        period. If they ever diverged, money would be leaking somewhere. This is the
        numerical embodiment of Godley & Lavoie's "watertight" claim.
  - externals:
      id: externals-equations
      title: Externals
      modelId: pc-baseline
      collapsed: true
      rows:
        - [r, 0.025, "Interest rate on bills.", 1/year, aux]
        - [G, 20, "Government expenditure.", $/year, aux]
        - [alpha1, 0.6, "Propensity to consume out of disposable income.", "", aux]
        - [alpha2, 0.4, "Propensity to consume out of lagged wealth.", 1/year, aux]
        - [theta, 0.2, "Tax rate.", "", aux]
        - [lambda0, 0.635, "Portfolio parameter for bills.", "", aux]
        - [lambda1, 0.05, "Interest sensitivity of bill demand.", year, aux]
        - [lambda2, 0.01, "Income sensitivity of bill demand.", year, aux]
      more: |
        These are the exogenous parameters and policy levers of model PC:

        - `r` = 0.025 — the bills rate, set by the central bank as a **policy
          instrument** (the variable shocked in Scenario 1).
        - `G` = 20 — government expenditure.
        - `alpha1` = 0.6, `alpha2` = 0.4 — propensities to consume out of disposable
          income and out of lagged wealth.
        - `theta` = 0.2 — the tax rate.
        - `lambda0` = 0.635, `lambda1` = 0.05, `lambda2` = 0.01 — the portfolio
          parameters: the autonomous bill share, its sensitivity to the interest rate,
          and its sensitivity to the income/wealth ratio.

        **A parameter caveat.** Godley & Lavoie (and the R fixture) use `lambda1 = 5`,
        which makes the portfolio strongly interest-sensitive; this notebook uses
        `lambda1 = 0.05`. With the small value the steady-state bill share is
        `lambda0 + lambda1 * r - lambda2 * (YD / V) ≈ 0.635 + 0.00125 - 0.01 ≈ 0.626`,
        matching the solved `Bh / V ≈ 0.626`. The consequence — visible in Scenario 1 — is
        that a change in `r` barely moves the _composition_ of the portfolio here, so the
        interest-income channel dominates.
  - initial-values:
      id: initial-values-equations
      title: Initial values
      modelId: pc-baseline
      collapsed: true
      rows: []
  - run:
      id: baseline-run
      title: Baseline run
      description: Baseline PC simulation with the hidden-equation condition Hh = Hs.
      mode: baseline
      periods: 70
      resultKey: gl2_pc_baseline
      sourceModelId: pc-baseline
      more: |
        The baseline integrates model PC forward for 70 periods, starting from low
        stocks, with the bills rate `r` held at `0.025` and `G` at `20`. With little
        wealth inherited from the past the economy starts well below its stationary state
        and climbs toward it, converging to a state in which stocks stop growing and the
        government budget (inclusive of interest) is balanced. This run also supplies the
        "last-period" state that every scenario below starts from.
  - chart:
      id: baseline-chart
      title: Baseline headline variables
      variables:
        - Y
        - YD
        - C
        - V
        - Bh
        - Hh
      axisMode: shared
      axisSnapTolarance: 0.5
      sourceRunCellId: baseline-run
      more: |
        In the baseline, `r` and `G` are constant and every aggregate converges to a
        **stationary state**. The solved values are:

        - output `Y ≈ 105.34`;
        - disposable income, consumption and wealth all `≈ 85.34` (`YD = C = V` in the
          stationary state, because `V` stops changing only when `YD = C`);
        - bills `Bh ≈ 53.45` and cash `Hh ≈ 31.90`, a bill share of about `62.6%`.

        Output exceeds SIM's `Y* = 100` because households now earn **interest income** on
        their bills, which adds to disposable income and hence to demand. The portfolio
        split (`Bh ≈ 53.45`, `Hh ≈ 31.90`) is the visible signature of chapter 4: wealth
        is no longer held as a single asset.
  - table:
      id: baseline-table
      title: Baseline variable summary
      variables:
        - Y
        - YD
        - TX
        - C
        - V
        - Bh
        - Hh
        - Bcb
      sourceRunCellId: baseline-run
      more: |
        The table makes the convergence concrete. Watch `V`, `Bh` and `Hh` flatten as the
        increments `YD - C` shrink toward zero. Two identities to check against the
        accounting:

        - `Hh = Bcb = Hs` in every row (here all `≈ 31.90` at the stationary state) —
          this is the redundant equation `Hh = Hs` holding period by period, together with
          the central bank's `Bcb = Hs`.
        - `Bh + Bcb = Bs` — household plus central-bank bill holdings exhaust the
          government's bill supply (`53.45 + 31.90 ≈ 85.34`).
  - markdown:
      id: scenario-1-note
      title: Interest-rate scenario
      source: This scenario raises the bills rate `r` from `0.025` to `0.035` between periods 5 and 60, matching the first deterministic experiment in the vignette.
      more: |
        Scenario 1 reproduces Godley & Lavoie's first chapter-4 experiment (R scenario 2):
        a permanent **increase in the bills rate** `r` from `0.025` to `0.035`, applied
        from period 5. It is the experiment behind the book's Figures 4.3–4.4 on the
        evolution of portfolio shares and of income.
  - run:
      id: scenario-1-run
      title: "Scenario 1: higher bills rate"
      mode: scenario
      scenario:
        shocks:
          - rangeInclusive:
              - 5
              - 60
            variables:
              r:
                kind: constant
                value: 0.035
      baselineRunCellId: baseline-run
      periods: 60
      resultKey: gl2_pc_s1
      sourceModelId: pc-baseline
  - chart:
      id: scenario-1-chart
      title: Scenario 1 portfolio adjustment
      variables:
        - Y
        - YD
        - C
        - Bh
        - Hh
      axisMode: shared
      axisSnapTolarance: 0.5
      sourceRunCellId: scenario-1-run
      more: |
        After the rate rise the economy moves to a **higher** stationary state: output
        climbs from `Y ≈ 105.34` to `≈ 107.69`, with disposable income and consumption
        rising in step to `≈ 87.69`. This is Godley & Lavoie's initially _puzzling_
        result — a higher interest rate is **expansionary** here, because the extra
        interest the government pays on bills is income to households, which they partly
        spend.

        The _portfolio_ response, by contrast, is barely visible in this notebook: the
        bill share moves only from about `62.62%` to `62.67%`. In the book (with
        `lambda1 = 5`) the same experiment shifts the bill share by roughly a full
        percentage point — the headline of Figure 4.3. Here the small `lambda1 = 0.05`
        mutes the composition effect, so what you see is almost entirely the
        interest-income channel. (Raise `lambda1` toward `5` to recover the textbook-sized
        portfolio swing.)
  - markdown:
      id: scenario-2-note
      title: Higher propensity to consume
      source: "This scenario raises the propensity to consume out of income `alpha1` from `0.6` to `0.7` between periods 5 and 60 on the baseline PC model, reproducing Godley & Lavoie's third chapter-4 experiment on the model without expectations."
      more: |
        Scenario 2 reproduces Godley & Lavoie's other chapter-4 experiment (R scenario 3):
        a permanent rise in the **propensity to consume out of income** `alpha1` from
        `0.6` to `0.7`, applied to the baseline PC model from period 5. Unlike the
        adaptive run further down, this is the _plain_ model with within-period
        expectations, so it isolates the pure dynamics of a thriftiness shock.
  - run:
      id: scenario-2-run
      title: "Scenario 2: higher propensity to consume"
      mode: scenario
      scenario:
        shocks:
          - rangeInclusive:
              - 5
              - 60
            variables:
              alpha1:
                kind: constant
                value: 0.7
      baselineRunCellId: baseline-run
      periods: 60
      resultKey: gl2_pc_s2
      sourceModelId: pc-baseline
  - chart:
      id: scenario-2-chart
      title: Scenario 2 income and wealth
      variables:
        - Y
        - C
        - YD
        - V
      axisMode: shared
      axisSnapTolarance: 0.5
      sourceRunCellId: scenario-2-run
      more: |
        This experiment shows the **two-speed** nature of the consumption multiplier and a
        genuine _paradox of thrift in reverse_:

        - **Short run.** Spending more out of income gives an immediate boom — output
          spikes to a peak of `Y ≈ 124.7` (around period 4), with consumption and
          disposable income jumping with it. This matches the rise toward `≈ 125` shown in
          the book's GDP figure for this experiment.
        - **Long run.** Consuming more means _saving_ less, so wealth `V` is run down —
          from `≈ 85.34` to `≈ 62.94`. Lower wealth means fewer bills and therefore _less_
          interest income, which drags demand back. The economy settles at a stationary
          output of `Y ≈ 103.92`, **below** the original baseline `105.34`.

        So a higher propensity to consume buys a transitory boom at the cost of a
        permanently smaller stock of wealth and a slightly lower long-run income — the
        mirror image of the result that _more_ thrift would raise long-run wealth and
        interest income.
  - markdown:
      id: pcex1-note
      title: PCEX1
      source: This section mirrors the random-shock experiment from `gl2-pc.Rmd`, but uses a fixed stored `Ra` sequence instead of runtime randomness so that browser regressions remain deterministic.
      more: |
        This section mirrors the **role of expectations** in Godley & Lavoie chapter 4
        (model PCEX). Households must decide their portfolio _before_ they know their
        actual disposable income, so they act on **expected** disposable income `YDE`.
        The book draws `YDE` from a random process; to keep the browser results
        reproducible, this notebook feeds a **fixed stored shock series** `Ra` instead of
        live randomness, with `YDE = YD * (1 + Ra)`.
  - equations:
      id: pcex1-equations
      title: PCEX1 fixed-shock model
      modelId: pc-pcex1
      collapsed: true
      rows:
        - [Y, C + G, "National income.", $/year, flow, "", p1-eq-0-Y]
        - [YD, Y - TX + lag(r) * lag(Bh), "Disposable income including lagged bill interest.", $/year, flow, "", p1-eq-1-YD]
        - [TX, theta * (Y + lag(r) * lag(Bh)), "Taxes on income and interest receipts.", $/year, flow, "", p1-eq-2-TX]
        - [V, I(YD - C), "Household wealth.", $, stock, "", p1-eq-3-V]
        - [C, alpha1 * YDE + alpha2 * lag(V), "Consumption based on expected disposable income and lagged wealth.", $/year, flow, "", p1-eq-4-C]
        - [Hh, V - Bh, "Household money holdings.", $, stock, "", p1-eq-5-Hh]
        - [Hh1, V * ((1 - lambda0) - lambda1 * r + lambda2 * (YD / V)), "Alternative portfolio-choice definition for money holdings.", $, stock, "", p1-eq-6-Hh1]
        - [Bh, Bd, "Realized household bill holdings.", $, stock, "", p1-eq-7-Bh]
        - [Bs, I(G + lag(r) * lag(Bs) - TX - lag(r) * lag(Bcb)), "Government bill supply.", $, stock, "", p1-eq-8-Bs]
        - [Hs, I(d(Bcb)), "High-powered money supplied by the central bank.", $, stock, "", p1-eq-9-Hs]
        - [Bcb, Bs - Bh, "Central-bank bill holdings.", $, stock, "", p1-eq-10-Bcb]
        - [Hd, VE - Bd, "Desired household money holdings.", $, stock, "", p1-eq-11-Hd]
        - [VE, lag(V) + (YDE - C) * dt, "Expected household wealth.", $, stock, "", p1-eq-12-VE]
        - [Bd, VE * (lambda0 + lambda1 * r - lambda2 * (YDE / VE)), "Desired household bill holdings.", $, stock, "", p1-eq-13-Bd]
        - [YDE, YD * (1 + Ra), "Expected disposable income with the fixed shock sequence.", $/year, flow, "", p1-eq-14-YDE]
      more: |
        PCEX1 rewrites the portfolio block in terms of **expected** magnitudes, which is
        the substance of Godley & Lavoie's expectations discussion:

        - Consumption is driven by _expected_ income, `C = alpha1 * YDE + alpha2 * lag(V)`.
        - Households plan their wealth and holdings on expectations: expected wealth
          `VE = lag(V) + (YDE - C) * dt`, **desired** bills
          `Bd = VE * (lambda0 + lambda1 * r - lambda2 * (YDE / VE))`, and **desired** cash
          `Hd = VE - Bd`.
        - The key behavioural assumption: **bills are acquired as planned**, `Bh = Bd`,
          so _all_ the surprise in realised income lands on **cash**. Realised cash is the
          residual `Hh = V - Bh`.
        - `YDE = YD * (1 + Ra)` injects the stored expectation error each period.

        The economic point is that **money is the buffer**: because bills are fixed at
        their desired level, unexpected income is absorbed entirely by money balances.
  - solver:
      id: pcex1-solver
      title: Solver
      modelId: pc-pcex1
      collapsed: true
      method: gauss-seidel
      tolerance: "1e-10"
      maxIterations: 200
      defaultInitialValue: "1e-15"
      hiddenLeftVariable: Hh
      hiddenRightVariable: Hs
      hiddenTolerance: "0.00001"
      relativeHiddenTolerance: false
  - externals:
      id: pcex1-externals
      title: Externals
      modelId: pc-pcex1
      collapsed: true
      rows:
        - [r, 0.025, "Interest rate on bills.", 1/year, aux, p1-ext-0-r]
        - [G, 20, "Government expenditure.", $/year, aux, p1-ext-1-G]
        - [alpha1, 0.6, "Propensity to consume out of expected disposable income.", "", aux, p1-ext-2-alpha1]
        - [alpha2, 0.4, "Propensity to consume out of lagged wealth.", 1/year, aux, p1-ext-3-alpha2]
        - [theta, 0.2, "Tax rate.", "", aux, p1-ext-4-theta]
        - [lambda0, 0.635, "Portfolio parameter for bills.", "", aux, p1-ext-5-lambda0]
        - [lambda1, 0.05, "Interest sensitivity of bill demand.", year, aux, p1-ext-6-lambda1]
        - [lambda2, 0.01, "Income sensitivity of bill demand.", year, aux, p1-ext-7-lambda2]
        - id: p1-ext-8-Ra
          name: Ra
          desc: Fixed shock sequence for expected disposable income.
          kind: series
          valueText: -0.028023782328, -0.011508874474, 0.077935415707, 0.003525419571, 0.006464386758, 0.085753249344, 0.023045810299, -0.06325306173, -0.034342642595, -0.022283098505, 0.061204089872, 0.017990691353, 0.02003857253, 0.005534135797, -0.027792056738, 0.08934565684, 0.024892523911, -0.098330857831, 0.035067795078, -0.023639570386, -0.053391185299, -0.010898745733, -0.051300222415, -0.036444561465, -0.031251963392, -0.084334665537, 0.041889352225, 0.007668655892, -0.056906846851, 0.062690746053, 0.021323211074, -0.01475357415, 0.044756283052, 0.043906674377, 0.041079054082, 0.034432012705, 0.027695882677, -0.003095585529, -0.015298133187, -0.019023550051, -0.034735348946, -0.010395863901, -0.063269817578, 0.108447798267, 0.060398099915, -0.05615542916, -0.020144241765, -0.023332767681, 0.038998255917, -0.004168453324, 0.0126659257, -0.001427337767, -0.002143522865, 0.068430114201, -0.011288549283, 0.075823530221, -0.077437640212, 0.029230687482, 0.006192712192, 0.010797078437
          unitMeta:
            stockFlow: aux
          type: aux
  - initial-values:
      id: pcex1-initial-values
      title: Initial values
      modelId: pc-pcex1
      collapsed: true
      rows: []
  - run:
      id: pcex1-baseline-run
      title: PCEX1 baseline run
      mode: baseline
      periods: 60
      resultKey: gl2_pc_pcex1_baseline
      description: PCEX1 with a stored `Ra` shock series and the hidden-equation condition Hh = Hs.
      sourceModelId: pc-pcex1
  - chart:
      id: pcex1-baseline-chart
      title: PCEX1 stocks and desired holdings
      variables:
        - Hh
        - Hd
        - Bh
        - Bd
        - YDE
      axisMode: shared
      axisSnapTolarance: 0.5
      sourceRunCellId: pcex1-baseline-run
      more: |
        The chart contrasts **realised** holdings (`Hh`, `Bh`) with **desired** holdings
        (`Hd`, `Bd`) as the stored `Ra` shocks buffet expected income `YDE`. Two features
        reproduce the chapter's message:

        - `Bh` tracks `Bd` exactly — bills are always acquired as planned.
        - `Hh` and `Hd` come apart: realised cash diverges from desired cash by as much as
          `≈ 10.4` over the run. That gap **is** the accumulated expectation error,
          absorbed by money as the residual asset.

        When expectations happen to be correct (`Ra = 0`), `Hh` and `Hd` coincide; every
        deviation is the model showing money doing its buffer-stock job.
  - table:
      id: pcex1-baseline-table
      title: PCEX1 variable summary
      variables:
        - Y
        - YD
        - YDE
        - C
        - V
        - Hh
        - Hd
        - Bh
        - Bd
      sourceRunCellId: pcex1-baseline-run
      more: |
        The table lets you line up `YD` against `YDE` and `Hh` against `Hd` period by
        period. Where `YDE > YD` (households over-estimated income) they planned to hold
        more bills than warranted and end up with _less_ cash than desired; where
        `YDE < YD` the reverse. Bills (`Bh = Bd`) never carry the error — confirming the
        buffer role of money numerically.
  - markdown:
      id: adaptive-note
      title: Adaptive expectations
      source: The next model follows the adaptive-expectations section of `gl2-pc.Rmd`. Expected disposable income is set to `lag(YD)`, and the wealth-allocation equations are rewritten in terms of desired bills `Bd` and expected wealth `VE`.
      more: |
        This model follows the **adaptive-expectations** variant (PCEX2). Instead of a
        random draw, expected disposable income is simply **last period's actual income**,
        `YDE = lag(YD)`. The portfolio block is otherwise the PCEX1 block (desired bills
        `Bd`, expected wealth `VE`, cash as residual), so money still buffers expectation
        errors — but now the errors are systematic lags rather than random noise.
  - equations:
      id: adaptive-equations
      title: PCEX2 adaptive model
      modelId: pc-adaptive
      collapsed: true
      rows:
        - [Y, C + G, "National income.", $/year, flow, "", ad-eq-0-Y]
        - [YD, Y - TX + lag(r) * lag(Bh), "Disposable income including lagged bill interest.", $/year, flow, "", ad-eq-1-YD]
        - [TX, theta * (Y + lag(r) * lag(Bh)), "Taxes on income and interest receipts.", $/year, flow, "", ad-eq-2-TX]
        - [V, I(YD - C), "Household wealth.", $, stock, "", ad-eq-3-V]
        - [C, alpha1 * YDE + alpha2 * lag(V), "Consumption based on expected disposable income and lagged wealth.", $/year, flow, "", ad-eq-4-C]
        - [Hh, V - Bh, "Household money holdings.", $, stock, "", ad-eq-5-Hh]
        - [Hh1, V * ((1 - lambda0) - lambda1 * r + lambda2 * (YD / V)), "Alternative portfolio-choice definition for money holdings.", $, stock, "", ad-eq-6-Hh1]
        - [Bh, Bd, "Realized household bill holdings.", $, stock, "", ad-eq-7-Bh]
        - [Bs, I(G + lag(r) * lag(Bs) - TX - lag(r) * lag(Bcb)), "Government bill supply.", $, stock, "", ad-eq-8-Bs]
        - [Hs, I(Bcb - lag(Bcb)), "High-powered money supplied by the central bank.", $, stock, "", ad-eq-9-Hs]
        - [Bcb, Bs - Bh, "Central-bank bill holdings.", $, stock, "", ad-eq-10-Bcb]
        - [Hd, VE - Bd, "Desired household money holdings.", $, stock, "", ad-eq-11-Hd]
        - [VE, lag(V) + (YDE - C) * dt, "Expected household wealth.", $, stock, "", ad-eq-12-VE]
        - [Bd, VE * (lambda0 + lambda1 * r - lambda2 * (YDE / VE)), "Desired household bill holdings.", $, stock, "", ad-eq-13-Bd]
        - [YDE, lag(YD), "Expected disposable income formed adaptively.", $/year, flow, "", ad-eq-14-YDE]
      more: |
        The equations are the PCEX1 block with one change: `YDE = lag(YD)` replaces the
        random-shock rule. Because expectations equal last period's outcome, in any
        **stationary** state `YDE = YD` and the model collapses to ordinary PC — which is
        why the adaptive baseline converges to the same `Y ≈ 105.34` steady state as the
        plain model. The adaptive structure matters only _out of_ steady state, during
        transitions, where it slows and smooths the response.
  - solver:
      id: adaptive-solver
      title: Solver
      modelId: pc-adaptive
      collapsed: true
      method: gauss-seidel
      tolerance: "1e-10"
      maxIterations: 200
      defaultInitialValue: "1e-15"
      hiddenLeftVariable: ""
      hiddenRightVariable: ""
      hiddenTolerance: "0.00001"
      relativeHiddenTolerance: false
  - externals:
      id: adaptive-externals
      title: Externals
      modelId: pc-adaptive
      collapsed: true
      rows:
        - [r, 0.025, "Interest rate on bills.", 1/year, aux, ad-ext-0-r]
        - [G, 20, "Government expenditure.", $/year, aux, ad-ext-1-G]
        - [alpha1, 0.6, "Propensity to consume out of expected disposable income.", "", aux, ad-ext-2-alpha1]
        - [alpha2, 0.4, "Propensity to consume out of lagged wealth.", 1/year, aux, ad-ext-3-alpha2]
        - [theta, 0.2, "Tax rate.", "", aux, ad-ext-4-theta]
        - [lambda0, 0.635, "Portfolio parameter for bills.", "", aux, ad-ext-5-lambda0]
        - [lambda1, 0.05, "Interest sensitivity of bill demand.", year, aux, ad-ext-6-lambda1]
        - [lambda2, 0.01, "Income sensitivity of bill demand.", year, aux, ad-ext-7-lambda2]
  - initial-values:
      id: adaptive-initial-values
      title: Initial values
      modelId: pc-adaptive
      collapsed: true
      rows: []
  - run:
      id: adaptive-baseline-run
      title: Adaptive baseline run
      mode: baseline
      periods: 60
      resultKey: gl2_pc_adaptive_baseline
      description: Adaptive-expectations PC model with expected disposable income set to lagged income.
      sourceModelId: pc-adaptive
  - chart:
      id: adaptive-baseline-chart
      title: Adaptive baseline headline variables
      variables:
        - Y
        - YDE
        - C
        - V
        - Bd
        - Hd
      axisMode: shared
      axisSnapTolarance: 0.5
      sourceRunCellId: adaptive-baseline-run
      more: |
        The adaptive baseline converges to the **same stationary state** as the plain PC
        model — `Y ≈ 105.34`, `YDE = C = V ≈ 85.34`, desired bills `Bd ≈ 53.45`, desired
        cash `Hd ≈ 31.90` — because once income stops changing, `lag(YD) = YD` and
        expectations are correct. The interest of this model is purely dynamic: it is the
        baseline against which the adaptive _thrift_ scenario below is read.
  - markdown:
      id: adaptive-scenario-note
      title: Paradox of thrift experiment
      source: This scenario raises `alpha1` from `0.6` to `0.7` between periods 5 and 60, matching the thrift experiment in the adaptive-expectations section.
      more: |
        This scenario raises `alpha1` from `0.6` to `0.7` between periods 5 and 60 on the
        **adaptive** model — the same thriftiness shock as Scenario 2, but now filtered
        through `YDE = lag(YD)`. Comparing the two shows how adaptive expectations damp
        the impact multiplier.
  - run:
      id: adaptive-scenario-run
      title: "Adaptive scenario: higher alpha1"
      mode: scenario
      scenario:
        shocks:
          - rangeInclusive:
              - 5
              - 60
            variables:
              alpha1:
                kind: constant
                value: 0.7
      baselineRunCellId: adaptive-baseline-run
      periods: 60
      resultKey: gl2_pc_adaptive_s1
      sourceModelId: pc-adaptive
  - chart:
      id: adaptive-scenario-chart
      title: Adaptive scenario income and wealth
      variables:
        - Y
        - C
        - YDE
        - V
      axisMode: shared
      axisSnapTolarance: 0.5
      sourceRunCellId: adaptive-scenario-run
      more: |
        The qualitative story matches Scenario 2 — a short-run boom followed by a lower
        long-run state — but the **adaptive lag softens the peak**: output rises to a peak
        of `Y ≈ 119.1` (around period 6) rather than the `≈ 124.7` spike of the plain
        model, because consumption responds to _last_ period's income rather than the
        contemporaneous jump. The long-run landing point is identical: `Y ≈ 103.92` and
        wealth `V ≈ 62.94`, since in the stationary state expectations are correct and the
        adaptive model reduces to PC. The lesson is that the _expectations rule_ changes
        the transition path, not the steady state.
  - markdown:
      id: interest-sensitive-note
      title: Interest-sensitive consumption
      source: "The final model follows the vignette extension where the propensity to consume is endogenous: `alpha1 = alpha10 - iota * lag(r)`."
      more: |
        The final model (PCEX3) follows the chapter-4 extension in which the **propensity
        to consume itself depends on the interest rate**: `alpha1 = alpha10 - iota *
        lag(r)`. A higher rate now discourages consumption directly (a positive interest
        _elasticity of saving_), on top of its portfolio and interest-income effects.
  - equations:
      id: interest-sensitive-equations
      title: PCEX3 interest-sensitive model
      modelId: pc-interest-sensitive
      collapsed: true
      rows:
        - [Y, C + G, "National income.", $/year, flow, "", is-eq-0-Y]
        - [YD, Y - TX + lag(r) * lag(Bh), "Disposable income including lagged bill interest.", $/year, flow, "", is-eq-1-YD]
        - [TX, theta * (Y + lag(r) * lag(Bh)), "Taxes on income and interest receipts.", $/year, flow, "", is-eq-2-TX]
        - [V, I(YD - C), "Household wealth.", $, stock, "", is-eq-3-V]
        - [C, alpha1 * YDE + alpha2 * lag(V), "Consumption based on endogenous alpha1 and expected disposable income.", $/year, flow, "", is-eq-4-C]
        - [Hh, V - Bh, "Household money holdings.", $, stock, "", is-eq-5-Hh]
        - [Hh1, V * ((1 - lambda0) - lambda1 * r + lambda2 * (YD / V)), "Alternative portfolio-choice definition for money holdings.", $, stock, "", is-eq-6-Hh1]
        - [Bh, Bd, "Realized household bill holdings.", $, stock, "", is-eq-7-Bh]
        - [Bs, I(G + lag(r) * lag(Bs) - TX - lag(r) * lag(Bcb)), "Government bill supply.", $, stock, "", is-eq-8-Bs]
        - [Hs, I(Bcb - lag(Bcb)), "High-powered money supplied by the central bank.", $, stock, "", is-eq-9-Hs]
        - [Bcb, Bs - Bh, "Central-bank bill holdings.", $, stock, "", is-eq-10-Bcb]
        - [Hd, VE - Bd, "Desired household money holdings.", $, stock, "", is-eq-11-Hd]
        - [VE, lag(V) + (YDE - C) * dt, "Expected household wealth.", $, stock, "", is-eq-12-VE]
        - [Bd, VE * (lambda0 + lambda1 * r - lambda2 * (YDE / VE)), "Desired household bill holdings.", $, stock, "", is-eq-13-Bd]
        - [YDE, lag(YD), "Expected disposable income formed adaptively.", $/year, flow, "", is-eq-14-YDE]
        - [alpha1, alpha10 - iota * lag(r), "Propensity to consume responds negatively to the lagged bills rate.", "", aux, "", is-eq-15-alpha1]
      more: |
        This is the adaptive model plus one extra equation,
        `alpha1 = alpha10 - iota * lag(r)`, with `alpha10 = 0.7` and `iota = 4`. At the
        baseline rate `r = 0.025` this delivers `alpha1 = 0.7 - 4 * 0.025 = 0.6`, exactly
        the value used everywhere else — so the **baseline is unchanged** (`Y ≈ 105.34`).
        The endogenous `alpha1` only bites when the rate moves, which is the point of the
        scenario.
  - solver:
      id: interest-sensitive-solver
      title: Solver
      modelId: pc-interest-sensitive
      collapsed: true
      method: gauss-seidel
      tolerance: "1e-10"
      maxIterations: 200
      defaultInitialValue: "1e-15"
      hiddenLeftVariable: ""
      hiddenRightVariable: ""
      hiddenTolerance: "0.00001"
      relativeHiddenTolerance: false
  - externals:
      id: interest-sensitive-externals
      title: Externals
      modelId: pc-interest-sensitive
      collapsed: true
      rows:
        - [r, 0.025, "Interest rate on bills.", 1/year, aux, is-ext-0-r]
        - [G, 20, "Government expenditure.", $/year, aux, is-ext-1-G]
        - [alpha2, 0.4, "Propensity to consume out of lagged wealth.", 1/year, aux, is-ext-2-alpha2]
        - [theta, 0.2, "Tax rate.", "", aux, is-ext-3-theta]
        - [lambda0, 0.635, "Portfolio parameter for bills.", "", aux, is-ext-4-lambda0]
        - [lambda1, 0.05, "Interest sensitivity of bill demand.", year, aux, is-ext-5-lambda1]
        - [lambda2, 0.01, "Income sensitivity of bill demand.", year, aux, is-ext-6-lambda2]
        - [alpha10, 0.7, "Intercept for the endogenous propensity to consume.", "", aux, is-ext-7-alpha10]
        - [iota, 4, "Sensitivity of alpha1 to the lagged interest rate.", year, aux, is-ext-8-iota]
  - initial-values:
      id: interest-sensitive-initial-values
      title: Initial values
      modelId: pc-interest-sensitive
      collapsed: true
      rows: []
  - run:
      id: interest-sensitive-baseline-run
      title: Interest-sensitive baseline run
      mode: baseline
      periods: 60
      resultKey: gl2_pc_interest_baseline
      description: Adaptive-expectations PC model with endogenous alpha1.
      sourceModelId: pc-interest-sensitive
  - chart:
      id: interest-sensitive-baseline-chart
      title: Interest-sensitive baseline headline variables
      variables:
        - alpha1
        - Y
        - YDE
        - C
        - V
      axisMode: shared
      axisSnapTolarance: 0.5
      sourceRunCellId: interest-sensitive-baseline-run
      more: |
        With `r` fixed at `0.025`, the endogenous rule pins `alpha1` at exactly `0.6`, so
        this baseline is indistinguishable from the plain and adaptive baselines:
        `Y ≈ 105.34`, `YDE = C = V ≈ 85.34`. The chart includes `alpha1` so you can see it
        sitting flat at `0.6` — confirming that the extension is calibrated to nest the
        standard model at the baseline rate.
  - markdown:
      id: interest-sensitive-scenario-note
      title: Bills-rate shock revisited
      source: This scenario reapplies the bills-rate increase to the interest-sensitive model, raising `r` from `0.025` to `0.035` between periods 5 and 60.
      more: |
        This scenario reapplies the bills-rate increase (`r`: `0.025` → `0.035`, periods
        5–60) to the interest-sensitive model. Now the rate rise does _three_ things at
        once: it raises interest income (expansionary), nudges the portfolio toward bills
        (small here), and **lowers** the propensity to consume via
        `alpha1 = alpha10 - iota * lag(r)` (contractionary on impact, but saving-building
        in the long run).
  - run:
      id: interest-sensitive-scenario-run
      title: "Interest-sensitive scenario: higher bills rate"
      mode: scenario
      scenario:
        shocks:
          - rangeInclusive:
              - 5
              - 60
            variables:
              r:
                kind: constant
                value: 0.035
      baselineRunCellId: interest-sensitive-baseline-run
      periods: 60
      resultKey: gl2_pc_interest_s1
      sourceModelId: pc-interest-sensitive
  - chart:
      id: interest-sensitive-scenario-chart
      title: Interest-sensitive scenario output and public finances
      variables:
        - alpha1
        - Y
        - YD
        - C
        - TX
      axisMode: shared
      axisSnapTolarance: 0.5
      sourceRunCellId: interest-sensitive-scenario-run
      more: |
        The endogenous propensity falls from `alpha1 = 0.6` to
        `0.7 - 4 * 0.035 = 0.56`. The combined long-run effect is **more** expansionary
        than the plain interest-rate experiment: output settles at `Y ≈ 108.56`, above
        Scenario 1's `≈ 107.69`. The reason is that the lower `alpha1` means households
        save more, building a larger stock of wealth and bills, which earns _more_
        interest income — reinforcing the direct interest-income channel. Disposable
        income rises to `≈ 88.56` and taxes to `≈ 22.14` as the larger tax base feeds the
        government's accounts.
  - sequence:
      id: equation-dependency-graph
      title: PC  dependency graph
      source:
        kind: dependency
        modelId: pc-baseline
        showAccountingStrips: true
        showExogenous: false
      description: Dependency view of the pc equations organized by sector strips and accounting bands.
      note: ""
      collapsed: true
      more: |
        This is the **dependency graph** of the baseline PC equations, organised by
        sector strips and accounting bands. It shows the _order of determination_ within a
        period: output and income are pinned down first, then taxes and wealth, then the
        portfolio split (`Bh`, `Hh`), and finally the government and central-bank residual
        identities (`Bs`, `Bcb`, `Hs`). Following the arrows is a quick way to see why the
        system is simultaneous — `C` depends on `YD`, which depends on `Y`, which depends
        back on `C` — and hence why it is solved iteratively rather than by substitution.
