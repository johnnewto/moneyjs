format: sfcr-notebook-yaml
formatVersion: 1
id: gl6-dis-rentier-notebook
title: GL6 DIS Rentier Notebook
metadata:
  version: 1
  template: gl6-dis-rentier
cells:
  - markdown:
      id: intro
      title: Overview
      source: This notebook adds a distributive DIS variant with two household classes. Workers receive wages and maintain a high propensity to consume, while rentiers receive firms' profits and bond interest, save more heavily, and allocate wealth between money and government bonds. Government spending supports demand, taxes withdraw income from both classes, and deficits accumulate as money and bonds held by the private sector.
  - matrix:
      id: balance-sheet
      title: DIS rentier balance sheet
      description: Stylized balance-sheet matrix for the distributive DIS model with workers, rentiers, and the government.
      note: Workers hold their saving as money, while rentiers split wealth between money and government bonds.
      sourceRunCellId: baseline-run
      columns: [Workers, Rentiers, Government, Sum]
      sectors: [Workers, Rentiers, Government, ""]
      rows:
        - [Money, Money, +Mhw, +Mhr, -Hs, "0"]
        - [Bonds, Government bonds, "", +Bh, -Bs, "0"]
        - [Net worth, Net worth, -Vw, -Vr, +D, "0"]
        - [Sum, Sum, "0", "0", "0", "0"]
  - matrix:
      id: transaction-flow
      title: DIS rentier transactions-flow matrix
      description: Transactions-flow matrix for the rentier extension, showing class-based income distribution and government-liability financing.
      note: The money-versus-bonds split appears only on the rentier side, reflecting class-based portfolio behavior.
      sourceRunCellId: baseline-run
      columns: [Workers, Rentiers, Firms, Government, Sum]
      sectors: [Workers, Rentiers, Firms, Government, ""]
      rows:
        - [Consumption, Consumption, -Cw, -Cr, +C, "", "0"]
        - [Government, Government spending, "", "", +G, -G, "0"]
        - [Wages, Wages, +WB, "", -WB, "", "0"]
        - [Profits, Profits, "", +F, -F, "", "0"]
        - [Taxes, Taxes, -Tw, -Tr, "", +T, "0"]
        - [Bond interest, Bond interest, "", +lag(rb) * lag(Bh), "", -lag(rb) * lag(Bs), "0"]
        - [Money, Change money, -d(Mhw), -d(Mhr), "", +d(Hs), "0"]
        - [Bonds, Change bonds, "", -d(Bh), "", +d(Bs), "0"]
        - [Sum, Sum, "0", "0", "0", "0", "0"]
  - sequence:
      id: transaction-flow-sequence
      title: DIS rentier transaction flow sequence
      source:
        kind: matrix
        matrixCellId: transaction-flow
      description: Sequence view of the distributive DIS accounting flows for the selected period.
  - equations:
      id: equations
      title: DIS rentier model
      modelId: equations
      collapsed: true
      rows:
        - [lambda_b, lambda0 + lambda1 * rb, "Rentier target share of wealth allocated to government bonds."]
        - [C, Cw + Cr, "Total consumption demand."]
        - [Y, C + G, "Output set by aggregate demand."]
        - [WB, omega * Y, "Wage bill paid to workers."]
        - [F, Y - WB, "Firms' profits distributed to rentiers."]
        - [Tw, theta_w * WB, "Taxes paid by workers."]
        - [Tr, theta_r * (F + lag(rb) * lag(Bh)), "Taxes paid by rentiers on profit and bond income."]
        - [YDw, WB - Tw, "Workers' disposable income."]
        - [YDr, F + lag(rb) * lag(Bh) - Tr, "Rentiers' disposable income."]
        - [Cw, alpha_w * YDw + alpha_wv * lag(Vw), "Workers' consumption out of income and lagged money balances."]
        - [Cr, alpha_r * YDr + alpha_rv * lag(Vr), "Rentiers' consumption out of income and lagged wealth."]
        - [Vw, lag(Vw) + YDw - Cw, "Workers' money wealth."]
        - [Vr, lag(Vr) + YDr - Cr, "Rentiers' total wealth."]
        - [V, Vw + Vr, "Total private wealth."]
        - [Bh, lambda_b * Vr, "Rentiers' holdings of government bonds."]
        - [Mhr, Vr - Bh, "Rentiers' money balances."]
        - [Mhw, Vw, "Workers' money balances."]
        - [Mh, Mhw + Mhr, "Aggregate money holdings of households."]
        - [T, Tw + Tr, "Total taxes collected by government."]
        - [D, lag(D) + G + lag(rb) * lag(Bs) - T, "Government debt accumulated from the deficit plus bond interest."]
        - [Bs, Bh, "Government bond supply, supplied on demand to rentiers."]
        - [Hs, D - Bs, "Government money liability as the residual part of debt."]
        - [gap, Mh - Hs, "Accounting gap between private money demand and government money supply."]
        - [profit_share, F / Y, "Share of output accruing as profits."]
        - [worker_share, WB / Y, "Share of output accruing as wages."]
  - solver:
      id: solver
      title: Solver
      modelId: equations
      collapsed: true
      method: newton
      tolerance: "1e-10"
      maxIterations: 200
      defaultInitialValue: "1e-15"
      hiddenLeftVariable: ""
      hiddenRightVariable: ""
      hiddenTolerance: "0.00001"
      relativeHiddenTolerance: false
  - externals:
      id: externals-equations
      title: Externals
      modelId: equations
      collapsed: true
      rows:
        - [G, 25, "Government spending."]
        - [rb, 0.02, "Interest rate on government bonds."]
        - [omega, 0.72, "Wage share in current output."]
        - [theta_w, 0.2, "Tax rate on wage income."]
        - [theta_r, 0.3, "Tax rate on rentier income."]
        - [alpha_w, 0.96, "Workers' propensity to consume out of current disposable income."]
        - [alpha_wv, 0.02, "Workers' propensity to consume out of lagged wealth."]
        - [alpha_r, 0.55, "Rentiers' propensity to consume out of current disposable income."]
        - [alpha_rv, 0.03, "Rentiers' propensity to consume out of lagged wealth."]
        - [lambda0, 0.35, "Base portfolio preference for government bonds."]
        - [lambda1, 2.5, "Interest sensitivity of rentier bond demand."]
  - initial-values:
      id: initial-values-equations
      title: Initial values
      modelId: equations
      collapsed: true
      rows:
        - [Vw, 5]
        - [Vr, 60]
        - [Bh, 24]
        - [Bs, 24]
        - [D, 65]
        - [Mhw, 5]
        - [Mhr, 36]
        - [Mh, 41]
        - [Hs, 41]
  - run:
      id: baseline-run
      title: Baseline run
      description: Baseline distributive DIS simulation with workers, rentiers, taxes, and a bond-money portfolio split.
      mode: baseline
      periods: 80
      resultKey: gl6_dis_rentier_baseline
      sourceModelId: equations
  - chart:
      id: baseline-chart
      title: Baseline distribution and portfolio variables
      variables:
        - Y
        - Cw
        - Cr
        - Vr
        - Bh
        - Mh
        - gap
      axisMode: separate
      axisSnapTolarance: 0.5
      seriesRanges:
        gap:
          includeZero: true
      sourceRunCellId: baseline-run
  - table:
      id: baseline-table
      title: Baseline variable summary
      variables:
        - Y
        - WB
        - F
        - YDw
        - YDr
        - Vw
        - Vr
        - Bh
        - Mh
        - D
        - gap
      sourceRunCellId: baseline-run
  - markdown:
      id: scenario-1-note
      title: Scenario 1
      source: Scenario 1 raises government spending `G` from 25 to 30 between periods 10 and 40 to show how a larger deficit supports demand, profits, and private wealth.
  - run:
      id: scenario-1-run
      title: "Scenario 1: fiscal expansion"
      mode: scenario
      scenario:
        shocks:
          - rangeInclusive:
              - 10
              - 40
            variables:
              G:
                kind: constant
                value: 30
      baselineRunCellId: baseline-run
      periods: 50
      resultKey: gl6_dis_rentier_s1
      sourceModelId: equations
  - chart:
      id: scenario-1-chart
      title: Scenario 1 output and wealth
      variables:
        - Y
        - F
        - Vr
        - D
      axisMode: separate
      axisSnapTolarance: 0.5
      sourceRunCellId: scenario-1-run
  - markdown:
      id: scenario-2-note
      title: Scenario 2
      source: Scenario 2 raises the base rentier preference for government bonds `lambda0` from 0.35 to 0.5 between periods 10 and 45, shifting wealth away from money and toward bonds.
  - run:
      id: scenario-2-run
      title: "Scenario 2: stronger bond preference"
      mode: scenario
      scenario:
        shocks:
          - rangeInclusive:
              - 10
              - 45
            variables:
              lambda0:
                kind: constant
                value: 0.5
      baselineRunCellId: baseline-run
      periods: 55
      resultKey: gl6_dis_rentier_s2
      sourceModelId: equations
  - chart:
      id: scenario-2-chart
      title: Scenario 2 portfolio composition
      variables:
        - Bh
        - Mh
        - Vr
        - gap
      axisMode: separate
      axisSnapTolarance: 0.5
      seriesRanges:
        gap:
          includeZero: true
      sourceRunCellId: scenario-2-run
  - sequence:
      id: equation-dependency-graph
      title: DIS rentier equation dependency graph
      source:
        kind: dependency
        modelId: equations
        stripSectorSource: columns
        showAccountingStrips: true
        showExogenous: false
      description: Dependency view showing how wages, profits, taxes, government debt, and portfolio allocation interact in the rentier variant.
      note: The largest same-period feedback block comes from output, disposable incomes, and class-specific consumption.
      collapsed: true
