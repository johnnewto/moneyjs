format: sfcr-notebook-yaml
formatVersion: 1
id: werner-qtc-explainer
title: "Werner QTC: Credit Allocation Explainer"
metadata:
  version: 1
  template: werner-qtc-explainer
cells:
  - markdown:
      id: intro
      title: Overview
      source: |-
        # Richard A. Werner's Quantity Theory of Credit

        This notebook gives a fresh, explanatory version of Werner's Quantity Theory of Credit (QTC). The core claim is that the primary impulse behind economic activity is not broad money in the abstract, but bank credit creation and its destination.

        QTC separates newly created bank credit into two circuits:

        - Credit for real-economy transactions, which finances current production and is linked to nominal GDP.
        - Credit for financial or existing-asset transactions, which circulates outside GDP and is linked to asset prices.

        The same act of bank lending can therefore have very different macroeconomic effects depending on where the borrower spends the newly created purchasing power.
  - markdown:
      id: two-equations
      title: Two credit circuits
      source: |-
        ## The two QTC equations

        Werner rewrites the quantity-theory idea by separating credit into two uses.

        **Real-economy credit**

        `Cr * Vr = P * Yr = Y`

        This is Werner's `CRVR = PRQR = PRY` real circulation. In this notebook, `Cr` is bank credit used for GDP transactions, `Vr` is the velocity of real-economy credit, `P`/`PR` is the price level for GDP transactions, `Yr`/`QR` is real output or income, and `Y`/`PRY` is nominal GDP.

        **Financial-transaction credit**

        `Cf * Vf = PA * AQty = PAQ`

        This is Werner's `CFVF = PFQF` financial circulation. In this notebook, `Cf` is credit used for non-GDP financial transactions, `Vf` is the velocity of financial credit, `PA`/`PF` is the asset-price index, `AQty`/`QF` is the quantity of financial assets traded, and `PAQ`/`PFQF` is the total value of asset transactions.
  - markdown:
      id: growth-form
      title: Growth form
      source: |-
        ## Growth-rate interpretation

        If the relevant velocity and transaction quantity are stable, the equations imply Werner's growth logic:

        - `DeltaNominalGDP = Vr * DeltaCr`, corresponding to `Delta(PRY) = VR * DeltaCR`.
        - `DeltaFinancialValue = Vf * DeltaCf`, corresponding to `Delta(PFQF) = VF * DeltaCF`.

        The rate versions shown in charts are:

        - Faster growth of `Cr` tends to raise nominal GDP growth.
        - Faster growth of `Cf` tends to raise asset-price growth.

        The notebook's growth-rate indicators are:

        - `gCrActual = (Cr - lag(Cr)) / lag(Cr)`
        - `gCfActual = (Cf - lag(Cf)) / lag(Cf)`
        - `gY = (Y - lag(Y)) / lag(Y)`
        - `gPA = (PA - lag(PA)) / lag(PA)`
  - markdown:
      id: implications
      title: Implications
      source: |-
        ## Key implications

        **Causality.** QTC treats bank credit creation as the binding constraint. The causal emphasis runs from bank credit creation to nominal GDP and asset prices.

        **Asset bubbles.** Credit directed toward existing assets can inflate asset prices without producing a matching rise in current output.

        **Quantitative easing.** In Werner's framing, monetary stimulus is not defined by reserves alone. It works when it increases credit creation for GDP transactions.
  - matrix:
      id: balance-sheet
      title: Balance sheet
      description: Stylized balance-sheet view of loan-created deposits and existing asset values.
      sourceRunCellId: baseline-run
      columns: [Households, Production firms, Banks, Sum]
      sectors: [Households, Firms, Banks, ""]
      rows:
        - [Deposits, Bank deposits, +M, "", -M, "0"]
        - [Loans, Real-economy loans, "", -Lr, +Lr, "0"]
        - [Loans, Asset-market loans, -Lf, "", +Lf, "0"]
        - [Assets, Existing assets, +AssetStockValue, "", "", +AssetStockValue]
        - [Net worth, Net worth, -NetWorth, +Lr, "-BankNetWorth", "0"]
        - [Sum, Sum, "0", "0", "0", "0"]
  - matrix:
      id: transaction-matrix
      title: Credit allocation transaction matrix
      description: Transactions-flow view separating GDP credit from financial-transaction credit.
      sourceRunCellId: baseline-run
      columns: [Households, Production firms, Banks, Sum]
      sectors: [Households, Firms, Banks, ""]
      rows:
        - [GDP transactions, Income paid by firms, +Y, -Y, "", "0"]
        - [GDP transactions, Consumption spending, -C, +C, "", "0"]
        - [GDP transactions, Productive spending financed by credit, "", +NewCr, +NewCr, +NewCr]
        - [Asset transactions, Asset purchases financed by credit, -NewCf, "", +NewCf, "0"]
        - [Interest, Interest on real-economy loans, "", "-rr[-1] * Lr[-1]", "+rr[-1] * Lr[-1]", "0"]
        - [Interest, Interest on asset loans, "-rf[-1] * Lf[-1]", "", "+rf[-1] * Lf[-1]", "0"]
        - [Sum, Sum, "0", "0", "0", "0"]
  - sequence:
      id: transaction-sequence
      title: Transaction sequence
      description: Sequence view generated from the credit-allocation transaction matrix.
      source:
        kind: matrix
        matrixCellId: transaction-matrix
  - equations:
      id: qtc-explainer-equations
      title: Explainer model equations
      modelId: qtc-explainer-model
      rows:
        - [gCredit, gCredit_s, "Growth rate of total bank credit.", "", "", definition, eq-gcredit]
        - [RealCreditShare, RealCreditShare_s, "Share of bank credit directed to GDP transactions.", "", "", definition, eq-real-share]
        - [FinancialCreditShare, 1 - RealCreditShare, "Share of bank credit directed to financial transactions.", "", "", definition, eq-fin-share]
        - [Vr, Vr_s, "Velocity of real-economy credit.", "", "", definition, eq-vr]
        - [Vf, Vf_s, "Velocity of financial-transaction credit.", "", "", definition, eq-vf]
        - [TotalCredit, lag(TotalCredit) * (1 + gCredit), "Total bank credit created for the two circuits.", "", "", accumulation, eq-total-credit]
        - [Cr, TotalCredit * RealCreditShare, "Credit circulating through GDP transactions.", "", "", identity, eq-cr]
        - [Cf, TotalCredit * FinancialCreditShare, "Credit circulating through financial transactions.", "", "", identity, eq-cf]
        - [Y, Cr * Vr, "Nominal GDP from Cr * Vr = P * Yr.", "", "", identity, eq-y]
        - [PAQ, Cf * Vf, "Total financial-transaction value from Cf * Vf = PA * AQty.", "", "", identity, eq-paq]
        - [PA, PAQ / AQty, "Asset-price index implied by financial credit and asset turnover.", "", "", identity, eq-pa]
        - [NewCredit, TotalCredit - lag(TotalCredit), "Net new bank credit.", "", "", definition, eq-new-credit]
        - [NewCr, Cr - lag(Cr), "Delta CR: change in credit for GDP transactions.", "", "", definition, eq-new-cr]
        - [NewCf, Cf - lag(Cf), "Delta CF: change in credit for financial transactions.", "", "", definition, eq-new-cf]
        - [DeltaNominalGDP, Vr * NewCr, "Werner growth equation Delta(PRY) = VR * DeltaCR.", "", "", identity, eq-delta-y]
        - [DeltaFinancialValue, Vf * NewCf, "Werner growth equation Delta(PFQF) = VF * DeltaCF.", "", "", identity, eq-delta-paq]
        - [Lr, lag(Lr) + NewCr, "Stock of real-economy loans.", "", "", accumulation, eq-lr]
        - [Lf, lag(Lf) + NewCf, "Stock of financial-transaction loans.", "", "", accumulation, eq-lf]
        - [Loans, Lr + Lf, "Total loan stock.", "", "", identity, eq-loans]
        - [M, lag(M) + NewCredit, "Deposits created by new bank credit.", "", "", accumulation, eq-m]
        - [C, c1 * lag(Y) + c2 * lag(NetWorth), "Consumption demand in the real economy.", "", "", behavioral, eq-c]
        - [InvestmentGap, Y - C, "Residual GDP demand other than consumption.", "", "", identity, eq-investment-gap]
        - [AssetStockValue, PA * AQty, "Value of the existing asset stock.", "", "", definition, eq-asset-stock]
        - [NetWorth, M + AssetStockValue - Lf, "Household net worth after asset loans.", "", "", identity, eq-net-worth]
        - [DebtToGDP, Loans / Y, "Total loans relative to nominal GDP.", "", "", definition, eq-debt-gdp]
        - [AssetToGDP, AssetStockValue / Y, "Existing asset value relative to nominal GDP.", "", "", definition, eq-asset-gdp]
        - [gCrActual, (Cr - lag(Cr)) / lag(Cr), "Real-economy credit growth.", "", "", definition, eq-gcr]
        - [gCfActual, (Cf - lag(Cf)) / lag(Cf), "Financial-credit growth.", "", "", definition, eq-gcf]
        - [gY, (Y - lag(Y)) / lag(Y), "Nominal GDP growth.", "", "", definition, eq-gy]
        - [gPA, (PA - lag(PA)) / lag(PA), "Asset-price growth.", "", "", definition, eq-gpa]
        - [BankNetWorth, Loans - M, "Illustrative bank net worth from loans minus deposits.", "", "", definition, eq-bank-net-worth]
  - solver:
      id: qtc-explainer-solver
      title: Solver
      modelId: qtc-explainer-model
      method: gauss-seidel
      tolerance: "1e-8"
      maxIterations: 200
      defaultInitialValue: "1e-15"
      hiddenLeftVariable: ""
      hiddenRightVariable: ""
      hiddenTolerance: "1e-5"
      relativeHiddenTolerance: false
  - externals:
      id: qtc-explainer-externals
      title: Externals
      modelId: qtc-explainer-model
      rows:
        - [gCredit_s, 0.04, "Baseline total credit growth.", "", "", ext-gcredit]
        - [RealCreditShare_s, 0.65, "Baseline share of credit directed to GDP transactions.", "", "", ext-real-share]
        - [Vr_s, 5, "Velocity of real-economy credit.", "", "", ext-vr]
        - [Vf_s, 5, "Velocity of financial-transaction credit.", "", "", ext-vf]
        - [AQty, 1, "Quantity of existing assets traded.", "", "", ext-aqty]
        - [c1, 0.72, "Propensity to consume out of lagged income.", "", "", ext-c1]
        - [c2, 0.02, "Propensity to consume out of lagged net worth.", "", "", ext-c2]
        - [rr, 0.04, "Interest rate on real-economy loans.", "", "", ext-rr]
        - [rf, 0.05, "Interest rate on financial-transaction loans.", "", "", ext-rf]
  - initial-values:
      id: qtc-explainer-initial-values
      title: Initial values
      modelId: qtc-explainer-model
      rows:
        - [TotalCredit, 40, init-total-credit]
        - [Cr, 26, init-cr]
        - [Cf, 14, init-cf]
        - [Y, 130, init-y]
        - [PAQ, 70, init-paq]
        - [PA, 70, init-pa]
        - [Lr, 80, init-lr]
        - [Lf, 35, init-lf]
        - [Loans, 115, init-loans]
        - [M, 115, init-m]
        - [NetWorth, 150, init-net-worth]
        - [DebtToGDP, 0.88, init-debt-gdp]
        - [AssetToGDP, 0.54, init-asset-gdp]
  - run:
      id: baseline-run
      title: "Baseline: credit mainly funds GDP transactions"
      description: Baseline run with most credit allocated to real-economy transactions.
      sourceModelId: qtc-explainer-model
      mode: baseline
      periods: 60
      resultKey: qtc_explainer_baseline
  - chart:
      id: baseline-chart
      title: "Baseline: GDP and asset-price channels"
      variables:
        - Y
        - Cr
        - PA
        - Cf
      axisMode: separate
      axisSnapTolarance: 0.1
      niceScale: true
      sourceRunCellId: baseline-run
  - chart:
      id: baseline-growth-chart
      title: Baseline growth rates
      variables:
        - gCrActual
        - gY
        - gCfActual
        - gPA
      axisMode: separate
      axisSnapTolarance: 0.1
      niceScale: true
      sourceRunCellId: baseline-run
  - table:
      id: baseline-table
      title: Baseline summary
      variables:
        - TotalCredit
        - RealCreditShare
        - FinancialCreditShare
        - Y
        - PA
        - DebtToGDP
        - AssetToGDP
      sourceRunCellId: baseline-run
  - markdown:
      id: asset-bubble-note
      title: Scenario 1
      source: |-
        ## Scenario 1: credit turns toward assets

        This scenario keeps total credit growth positive but lowers the real-economy credit share. In QTC terms, more credit enters the financial circulation, so asset prices rise faster than nominal GDP.
  - run:
      id: asset-bubble-run
      title: "Scenario 1: asset-credit boom"
      description: More credit is allocated to financial transactions rather than GDP transactions.
      sourceModelId: qtc-explainer-model
      mode: scenario
      scenario:
        shocks:
          - rangeInclusive:
              - 1
              - 60
            variables:
              RealCreditShare_s:
                kind: constant
                value: 0.35
              gCredit_s:
                kind: constant
                value: 0.06
      baselineRunCellId: baseline-run
      periods: 60
      resultKey: qtc_explainer_asset_boom
  - chart:
      id: asset-bubble-chart
      title: "Scenario 1: asset boom vs baseline"
      variables:
        - Y
        - PA
        - DebtToGDP
        - AssetToGDP
      axisMode: separate
      axisSnapTolarance: 0.1
      niceScale: true
      referenceTrace: baseline
      sourceRunCellId: asset-bubble-run
  - markdown:
      id: qe-note
      title: Scenario 2
      source: |-
        ## Scenario 2: Werner-style QE

        This scenario models the policy idea that stimulus works when it raises credit creation for GDP transactions. Total credit growth rises, but the allocation is tilted toward real-economy credit rather than asset purchases.
  - run:
      id: qe-run
      title: "Scenario 2: real-economy credit easing"
      description: Total credit growth rises and the real-economy credit share increases.
      sourceModelId: qtc-explainer-model
      mode: scenario
      scenario:
        shocks:
          - rangeInclusive:
              - 1
              - 60
            variables:
              RealCreditShare_s:
                kind: constant
                value: 0.8
              gCredit_s:
                kind: constant
                value: 0.06
      baselineRunCellId: baseline-run
      periods: 60
      resultKey: qtc_explainer_qe
  - chart:
      id: qe-chart
      title: "Scenario 2: real-economy credit easing"
      variables:
        - Y
        - PA
        - DebtToGDP
        - AssetToGDP
      axisMode: separate
      axisSnapTolarance: 0.1
      niceScale: true
      referenceTrace: baseline
      sourceRunCellId: qe-run
  - sequence:
      id: dependency-graph
      title: Equation dependency graph
      description: Dependency view showing how credit creation and allocation feed GDP, asset prices, deposits, and leverage.
      source:
        kind: dependency
        modelId: qtc-explainer-model
        showAccountingStrips: true
        showExogenous: false
        stripMapping:
          transactionMatrixCellId: transaction-matrix
          balanceMatrixCellId: balance-sheet
  - markdown:
      id: interpretation
      title: Reading the results
      source: |-
        ## Reading the results

        The model is deliberately small. It is not a full empirical Werner model, but it makes the QTC mechanism visible.

        When credit is allocated to `Cr`, nominal GDP `Y` rises through the real-economy equation. When credit is allocated to `Cf`, the asset-price index `PA` rises through the financial-transaction equation. The key object is therefore not only how much credit banks create, but where that credit is spent.
