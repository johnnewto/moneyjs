format: sfcr-notebook-yaml
formatVersion: 1
id: interbank-liquidity-risk-notebook
title: Interbank Liquidity Risk Notebook
metadata:
  version: 1
  template: interbank-liquidity-risk
  description: "This notebook is a runnable browser-first template inspired by Jessica Reale's *Interbank Market and Funding Liquidity Risk in a Stock-Flow Consistent Model* (2019). It keeps the paper's institutional structure in compact form: households, firms, government, a central bank, and two heterogeneous banks linked by overnight and term interbank funding."
modelId: interbank-liquidity-risk
introCell:
  id: intro
  title: Overview
sectors: [Households, Firms, Government, Central bank, Banks, Banks, ""]
