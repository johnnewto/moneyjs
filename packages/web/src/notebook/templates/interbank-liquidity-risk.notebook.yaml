cells:
  - id: scope-note
    type: markdown
    title: Template Scope
    source: "The original paper develops a much larger calibrated system. This template is a starter model rather than a full replication. It preserves the core mechanisms we usually want to extend first in the editor: reserve requirements, deposit splitting across two banks, a borrowing bank's maturity choice between overnight and term funding, a lending bank's overnight-versus-term preference, and a central-bank backstop through a refinancing facility."
  - id: transaction-flow-sequence
    type: sequence
    title: Interbank transaction flow sequence
    source:
      kind: matrix
      matrixCellId: transaction-flow
    description: Sequence view generated from the Table 5 transaction-flow matrix.
  - id: scenario-note
    type: markdown
    title: Scenario 1
    source: This scenario reproduces the paper's uncertainty experiment by increasing `PDU` from `0.1` to `0.6` from period 15 onward.
  - id: stress-run
    type: run
    title: Perceived uncertainty shock
    mode: scenario
    scenario:
      shocks:
        - rangeInclusive:
            - 15
            - 38
          variables:
            PDU:
              kind: constant
              value: 0.6
    baselineRunCellId: baseline-run
    periods: 38
    resultKey: interbank_liquidity_risk_stress
    sourceModelId: interbank-liquidity-risk
  - id: stress-chart
    type: chart
    title: Uncertainty-shock dynamics
    sourceRunCellId: stress-run
    variables:
      - IBon
      - IBterm
      - theta
      - LbW
      - ion_ib
      - iterm_ib
      - Rcb_d
      - Rcb_l
    axisMode: separate
    axisSnapTolarance: 0.1
    niceScale: true
  - id: scenario-2-note
    type: markdown
    title: Scenario 2
    source: This scenario reproduces the contractionary monetary-policy experiment by raising `ilcb` from `0.006` to `0.106` and `idcb` from `0.002` to `0.102` from period 15 onward.
  - id: policy-run
    type: run
    title: Contractionary monetary policy shock
    mode: scenario
    scenario:
      shocks:
        - rangeInclusive:
            - 15
            - 38
          variables:
            ilcb:
              kind: constant
              value: 0.106
            idcb:
              kind: constant
              value: 0.102
    baselineRunCellId: baseline-run
    periods: 38
    resultKey: interbank_liquidity_risk_policy
    sourceModelId: interbank-liquidity-risk
  - id: policy-chart
    type: chart
    title: Monetary-policy-shock dynamics
    sourceRunCellId: policy-run
    variables:
      - IBon
      - IBterm
      - ion_ib
      - iterm_ib
      - ilh
      - ilf
      - C
      - I
    axisMode: separate
    axisSnapTolarance: 0.1
    niceScale: true
  - id: equation-dependency-graph
    type: sequence
    title: Interbank liquidity dependency graph
    source:
      kind: dependency
      modelId: interbank-liquidity-risk
      showAccountingStrips: true
      showExogenous: false
    description: Dependency view of the full paper model organized around central-bank operations, interbank funding, bank portfolios, and the real economy.
    collapsed: true
