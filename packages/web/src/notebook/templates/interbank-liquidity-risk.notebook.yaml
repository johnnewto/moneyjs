equations: |-
  # Reserve requirement of bank j.
  HPMj ~ mu * lag(Dh)

  # Reserve requirement of bank k.
  HPMk ~ mu * lag(Df)

  # Aggregate reserve requirement.
  HPM ~ HPMj + HPMk

  # Accommodating overdrafts supplied by the central bank.
  Ovd ~ DOvd

  # Target policy rate at the midpoint of the corridor.
  itcb ~ (ilcb + idcb) / 2

  # Central-bank profits transferred to government.
  Pcb ~ itcb * (lag(MROj) + lag(MROk)) + ib * lag(Bcb) + ilcb * lag(Rcb_l) - idcb * lag(Rcb_d)

  # Main refinancing operations to bank j.
  MROj ~ HPMj

  # Main refinancing operations to bank k.
  MROk ~ HPMk

  # Total main refinancing operations.
  MRO ~ MROj + MROk

  # Bills held by the central bank.
  Bcb ~ B - Bj - Bk

  # Bank-j degree of stability.
  DSm ~ Lm - (bm / am) * Am

  # Total liabilities entering the degree-of-stability measure.
  Lm ~ lag(Dh) + lag(MROj) + lag(Ovd) + lag(IBon) + lag(IBterm) + lag(Rcb_l)

  # Total assets entering the degree-of-stability measure.
  Am ~ lag(Lh) + lag(HPMj) + lag(Bj) + lag(Blr) + lag(Mh)

  # Available-stable-funds fraction.
  am ~ (m5 * lag(Dh) + m6 * lag(IBterm)) / Lm

  # Required-stable-funds fraction.
  bm ~ (m1 * lag(Lh) + m2 * lag(Mh) + m3 * lag(Bj) + m4 * lag(Blr)) / Am

  # Demand for overdrafts by bank j.
  DOvd ~ if (C >= lag(HPMj)) { C - lag(HPMj) } else { 0 }

  # Total interbank funding demand by bank j.
  IBD ~ DOvd

  # Demand for overnight interbank loans.
  IBonD ~ IBD * theta

  # Demand for term interbank loans.
  IBtermD ~ IBD - IBonD

  # Bank-j willingness to borrow overnight.
  theta ~ max(0, min(1, alpha * (ilcb - ion_ib) + alpha1 * (iterm_ib - ion_ib) + alpha2 * (DSm / abs(lag(Vbj))) - alpha3 * (ilcb - iterm_ib) - alpha4 * PDU))

  # Loanable funds of bank k.
  LFk ~ C + lag(Rcb_d)

  # Total interbank funding supply.
  IBS ~ LFk

  # Supply of overnight interbank loans.
  IBonS ~ IBS * LbW

  # Supply of term interbank loans.
  IBtermS ~ IBS - IBonS

  # Bank-k willingness to lend overnight.
  LbW ~ max(0, min(1, sigma + sigma1 * PDU + sigma2 * (ion_ib - idcb) + sigma3 * (abs(DERj) - gamma) - sigma4 * (iterm_ib - ion_ib) - sigma5 * (iterm_ib - idcb) - sigma6 * QR))

  # Debt-to-equity ratio of bank j.
  DERj ~ (lag(Ovd) + lag(IBon) + lag(IBterm) + lag(MROj)) / lag(Vbj)

  # Quick ratio of bank j.
  QR ~ (lag(Lh) + lag(Bj) + lag(HPMj)) / (lag(Ovd) + lag(MROj) + lag(IBon) + lag(Rcb_l))

  # Use of the lending facility under interbank frictions.
  Rcb_l ~ if (((theta <= 0) && (LbW >= 1)) || ((theta >= 1) && (LbW <= 0))) { IBD } else { if ((theta > 0 && theta < 1) && (LbW <= 0)) { IBonD } else { if ((theta > 0 && theta < 1) && (LbW >= 1)) { IBtermD } else { 0 } } }

  # Use of the deposit facility under interbank frictions.
  Rcb_d ~ if (((theta <= 0) && (LbW >= 1)) || ((theta >= 1) && (LbW <= 0))) { IBS } else { if ((theta <= 0) && (LbW > 0 && LbW < 1)) { IBonS } else { if ((theta >= 1) && (LbW > 0 && LbW < 1)) { IBtermS } else { 0 } } }

  # Stock of overnight interbank loans determined on the short side of the market.
  IBon ~ min(IBonD, IBonS)

  # Stock of term interbank loans determined on the short side of the market.
  IBterm ~ min(IBtermD, IBtermS)

  # Overnight interbank rate.
  ion_ib ~ idcb + (ilcb - idcb) / (1 + exp(-(sigmaib * eps_on)))

  # Excess demand in the overnight segment.
  eps_on ~ IBonD - IBonS

  # Term interbank rate.
  iterm_ib ~ eta1 + eta2 / (1 + exp(-(sigmaib * eps_term)))

  # Excess demand in the term segment.
  eps_term ~ IBtermD - IBtermS

  # Loans supplied by bank j to households.
  Lh ~ (lambda10 + lambda11 * ilh - lambda12 * ilrb - lambda13 * imh - lambda14 * ib) * Fj

  # Loans supplied by bank k to firms.
  Lf ~ (beta10 + beta11 * ilf - beta12 * ib) * Fk

  # External finance supplied by bank j.
  Fj ~ lag(Fj) + (LDh + MhD - lag(Fj)) * (1 - CRh)

  # Credit rationing toward households.
  CRh ~ omega1 * PDU + omega2 * ((lag(Lh) + lag(Mh)) / lag(Vh))

  # External finance supplied by bank k.
  Fk ~ lag(Fk) + (LDf - lag(Fk)) * (1 - CRf)

  # Credit rationing toward firms.
  CRf ~ omega1 * PDU + omega2 * (lag(Lf) / lag(K))

  # Long-term government bonds demanded by bank j.
  Bjlr ~ (lambda20 - lambda21 * ilh + lambda22 * ilrb - lambda23 * imh - lambda24 * ib) * Fj

  # Mortgages supplied by bank j.
  Mh ~ (lambda30 - lambda31 * ilh - lambda32 * ilrb + lambda33 * imh - lambda34 * ib) * Fj

  # Short-term bills demanded by bank j.
  Bj ~ Fj - Lh - Bjlr - Mh

  # Short-term bills demanded by bank k.
  Bk ~ Fk - Lf

  # Funding cost of bank j.
  fcj ~ (itcb + iib_star + icb_star) / zeta

  # Effective interbank cost faced by bank j.
  iib_star ~ if (((theta >= 1) && (LbW >= 1)) || ((theta > 0 && theta < 1) && (LbW >= 1)) || ((theta >= 1) && (LbW > 0 && LbW < 1))) { ion_ib } else { if (((theta <= 0) && (LbW <= 0)) || ((theta > 0 && theta < 1) && (LbW <= 0)) || ((theta <= 0) && (LbW > 0 && LbW < 1))) { iterm_ib } else { if ((theta > 0 && theta < 1) && (LbW > 0 && LbW < 1)) { (ion_ib + iterm_ib) / 2 } else { 0 } } }

  # Effective standing-facility cost faced by bank j.
  icb_star ~ if (Rcb_l != 0) { ilcb } else { 0 }

  # Number of cost components entering bank-j average funding costs.
  zeta ~ if ((iib_star == 0) && (icb_star == 0)) { 1 } else { if (((iib_star == 0) && (icb_star != 0)) || ((iib_star != 0) && (icb_star == 0))) { 2 } else { 3 } }

  # Interest rate on household loans.
  ilh ~ fcj + chi1

  # Interest rate on household deposits.
  idh ~ fcj - chi2

  # Interest rate on mortgages.
  imh ~ iterm_ib + chi3

  # Interest rate on firm loans.
  ilf ~ itcb + chi1

  # Interest rate on firm deposits.
  idf ~ itcb - chi2

  # Profits of bank j.
  Pbj ~ ib * lag(Bj) + lag(ilh) * lag(Lh) + ilrb * lag(Blr) + lag(imh) * lag(Mh) - itcb * lag(MROj) - lag(idh) * lag(Dh) - ilcb * lag(Rcb_l) - lag(ion_ib) * lag(IBon) - lag(iterm_ib) * lag(IBterm)

  # Profits of bank k.
  Pbk ~ idcb * lag(Rcb_d) + lag(ilf) * lag(Lf) + ib * lag(Bk) + lag(ion_ib) * lag(IBon) + lag(iterm_ib) * lag(IBterm) - lag(idf) * lag(Df) - itcb * lag(MROk)

  # Distributed profits of bank j.
  Divbj ~ sj * Pbj

  # Distributed profits of bank k.
  Divbk ~ sk * Pbk

  # Undistributed profits of bank j.
  Pbju ~ Pbj - Divbj

  # Undistributed profits of bank k.
  Pbku ~ Pbk - Divbk

  # Net worth of bank j.
  Vbj ~ lag(Vbj) + (HPMj - lag(HPMj)) + (Bj - lag(Bj)) + (Bjlr - lag(Bjlr)) + (Lh - lag(Lh)) + (Mh - lag(Mh)) - Pbju - (Dh - lag(Dh)) - (Ovd - lag(Ovd)) - (IBon - lag(IBon)) - (IBterm - lag(IBterm)) - (MROj - lag(MROj)) - (Rcb_l - lag(Rcb_l))

  # Net worth of bank k.
  Vbk ~ lag(Vbk) + (Bk - lag(Bk)) + (HPMk - lag(HPMk)) + (Lf - lag(Lf)) + (IBon - lag(IBon)) + (IBterm - lag(IBterm)) + (Rcb_d - lag(Rcb_d)) - Pbku - (MROk - lag(MROk)) - (Df - lag(Df))

  # Government expenditure grows with income.
  G ~ lag(G) * (1 + lag(gy))

  # Growth rate of national income.
  gy ~ (Y - lag(Y)) / lag(Y)

  # National income.
  Y ~ C + I + G + ph * (Hh - lag(Hh))

  # Taxes on wages.
  T ~ tau * lag(W)

  # Government bills financed through the budget identity.
  B ~ lag(B) + ib * lag(B) + G + ilrb * lag(Blr) - T - Pcb - (Blr - lag(Blr))

  # Long-term government bonds supplied to match bank-j demand.
  Blr ~ Bjlr

  # Interest rate on bills equals the policy target.
  ib ~ itcb

  # Household consumption.
  C ~ a1 * Yda + a2 * lag(Vh)

  # Household net worth identity.
  Vh ~ lag(Vh) + Yd + (Lh - lag(Lh)) + (Mh - lag(Mh)) - C - ph * (Hh - lag(Hh)) - (Dh - lag(Dh))

  # Expected disposable income of households.
  Yda ~ lag(Yd) + phi * (lag(Yd) - lag(Yda))

  # Disposable income of households.
  Yd ~ W + lag(idh) * lag(Dh) + Divf + Divbj + Divbk - T - lag(ilh) * lag(Lh) - lag(imh) * lag(Mh)

  # Household deposits at bank j.
  Dh ~ sw * Yd - (C - lag(C))

  # Demand for household loans.
  LDh ~ b * Yd

  # Housing demand of households.
  Hh ~ delta0 - delta1 * ph - delta2 * lag(imh)

  # Demand for mortgages.
  MhD ~ delta3 - delta4 * lag(imh)

  # Capital stock of firms.
  K ~ lag(K) - delta * lag(K) + I

  # Desired investment of firms.
  Id ~ gk * lag(K)

  # Net business investment identity.
  I ~ Pfu + (Lf - lag(Lf)) - (Df - lag(Df))

  # Wages paid to households.
  W ~ Y / (1 + rho)

  # Profits of firms.
  Pf ~ Y + ph * (Hh - lag(Hh)) + lag(idf) * lag(Df) - W - lag(ilf) * lag(Lf)

  # Distributed profits of firms.
  Divf ~ s * Pf

  # Undistributed profits of firms.
  Pfu ~ Pf - Divf

  # Demand for firm external finance.
  LDf ~ lag(LDf) - lag(Lf) + Id

  # Firm deposits at bank k.
  Df ~ sw * W + (C - lag(C))

  # Central-bank capital-account identity.
  Vcb ~ MRO + Ovd + Bcb + Rcb_l - Rcb_d - HPM
equationCell:
  id: equations
  title: Interbank liquidity risk model
  collapsed: true
balance:
  id: balance-sheet
  title: "Table 4: Balance Sheet Matrix"
  description: Article-style balance-sheet matrix adapted from Table 4 of the paper.
  note: This accounting table preserves the paper's full institutional structure. Some symbols shown here go beyond the reduced-form starter equations and are included as a modeling scaffold.
  columns: [Households, Firms, Government, Central bank, Bank j, Bank k, Sum]
  sectors: [Households, Firms, Government, Central bank, Banks, Banks, ""]
  rows:
    - [Real assets, Capital stock (K), "", +K, "", "", "", "", +K]
    - [Real assets, Houses (H), +ph * Hh, "", "", "", "", "", +ph * Hh]
    - [Deposits, Deposits (D), +Dh, +Df, "", "", -Dh, -Df, "0"]
    - [Loans, Loans (L), -Lh, -Lf, "", "", +Lh, +Lf, "0"]
    - [Mortgages, Mortgages (M), -Mh, "", "", "", +Mh, "", "0"]
    - [Bills, Bills (B), "", "", -B, +Bcb, +Bj, +Bk, "0"]
    - [Bonds, Bonds (Blr), "", "", -Blr, "", +Blr, "", "0"]
    - [Central bank, Overdrafts (Ovd), "", "", "", +Ovd, -Ovd, "", "0"]
    - [Reserves, Required reserves (HPM), "", "", "", -HPM, +HPMj, +HPMk, "0"]
    - [Interbank, Overnight interbank loan (IBon), "", "", "", "", -IBon, +IBon, "0"]
    - [Interbank, Term interbank loan (IBterm), "", "", "", "", -IBterm, +IBterm, "0"]
    - [Central bank, Main refinancing operations (MRO), "", "", "", +MRO, -MROj, -MROk, "0"]
    - [Central bank, Lending facility reserves (Rcb_l), "", "", "", +Rcb_l, -Rcb_l, "", "0"]
