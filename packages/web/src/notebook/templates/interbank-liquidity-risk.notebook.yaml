  lambda22:
    description: Bank-j bond demand response to the bond rate.
  lambda23:
    description: Bank-j bond demand response to the mortgage rate.
  lambda24:
    description: Bank-j bond demand response to the bills rate.
  lambda30:
    description: Liquidity-preference parameter of bank j for mortgages.
  lambda31:
    description: Bank-j mortgage demand response to the loan rate.
  lambda32:
    description: Bank-j mortgage demand response to the bond rate.
  lambda33:
    description: Bank-j mortgage demand response to the mortgage rate.
  lambda34:
    description: Bank-j mortgage demand response to the bills rate.
