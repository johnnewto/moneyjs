  description: Article-style transaction-flow matrix adapted from Table 5 of the paper.
  note: This matrix follows the paper's accounting layout and keeps article notation where helpful. It is meant as a structural modeling template, not a strict one-for-one rendering of the reduced-form executable equations above.
  columns: [Households, Firms current, Firms capital, Government, Bank j current, Bank j capital, Central bank current, Bank k current, Bank k capital, Sum]
  sectors: [Households, Firms, Firms, Government, Banks, Banks, Central bank, Banks, Banks, ""]
  rows:
    - [Consumption, Consumption, -C, +C, "", "", "", "", "", "", "", "0"]
    - [Government, Government expenditure, "", +G, "", -G, "", "", "", "", "", "0"]
    - [Investment, Business investments, "", "", -I, "", "", "", "", +I, "", "0"]
    - [Investment, Housing investments, -ph * d(Hh), +ph * d(Hh), "", "", "", "", "", "", "", "0"]
    - [Wages, Wages, +W, -W, "", "", "", "", "", "", "", "0"]
    - [Taxes, Taxes, -T, "", "", +T, "", "", "", "", "", "0"]
    - [Interest, Interest on bills, "", "", "", "-ib[-1] * B[-1]", "+ib[-1] * Bj[-1]", "", "+ib[-1] * Bcb[-1]", "+ib[-1] * Bk[-1]", "", "0"]
    - [Interest, Interest on bonds, "", "", "", "-ilrb[-1] * Blr[-1]", "+ilrb[-1] * Blr[-1]", "", "", "", "", "0"]
    - [Interest, Interest on loans, "-ilh[-1] * Lh[-1]", "-ilf[-1] * Lf[-1]", "", "", "+ilh[-1] * Lh[-1]", "", "", "+ilf[-1] * Lf[-1]", "", "0"]
    - [Interest, Interest on deposits, "+idh[-1] * Dh[-1]", "+idf[-1] * Df[-1]", "", "", "-idh[-1] * Dh[-1]", "", "", "-idf[-1] * Df[-1]", "", "0"]
