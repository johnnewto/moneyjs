format: sfcr-notebook-yaml
formatVersion: 1
id: opensimplest-notebook
title: OPENSIMPLEST Open Economy SFC Model (Levy WP 1105)
metadata:
  version: 1
  template: opensimplest
  description: "A compact one-country open-economy stock-flow consistent model with four sectors: private, government, central bank, and rest of world. The notebook includes a balance sheet, a transactions-flow matrix, a sequence outline, behavioral and accounting equations, a baseline calibration, and a simple export-shock scenario."
modelId: opensimplest
introCell:
  id: overview
  title: Overview
sectors: [Private, Government, Central bank, Rest of world, ""]
variables:
  YDr:
    description: Private disposable income before valuation gains.
  YDhs:
    description: Disposable income including foreign-asset valuation gains.
  V:
    description: Private sector net worth.
  T:
    description: Taxes on income and interest receipts.
  Y:
    description: Open-economy goods-market equilibrium.
  PE:
    description: Private expenditure from income and lagged wealth.
  NAFA:
    description: Net acquisition of financial assets.
  X:
    description: Exports as a function of the lagged exchange rate and foreign income.
  IM:
    description: Imports as a function of the lagged exchange rate and domestic income.
  TB:
    description: Trade balance.
  CA:
    description: Current account.
  NFA:
    description: Net foreign assets.
  Bw:
    description: Rest-of-world holdings of domestic bills.
  Bp:
    description: Private demand for domestic bills.
  BWp:
    description: Private demand for foreign bills.
  Hp:
    description: Private money holdings.
  FCB:
    description: Central-bank profits from domestic bills.
  Bcb:
    description: Central-bank bill holdings.
  Hs:
    description: High-powered money supplied by the central bank.
  PSBR:
    description: Public-sector borrowing requirement.
  Bs:
    description: Government bill supply.
  XR:
    description: Exchange rate adjusted by the lagged current account.
  sectoral_check:
    description: Accounting check for sectoral balances.
  dHp:
    description: Change in private money holdings.
  dHs:
    description: Change in supplied money.
  dBp:
    description: Change in private domestic bills.
  dBs:
    description: Change in government bill supply.
  dBcb:
    description: Change in central-bank bill holdings.
  dBw:
    description: Change in rest-of-world domestic bills.
  dBWp:
    description: Change in private foreign bills.
  dV:
    description: Change in private net worth.
  dNFA:
    description: Change in net foreign assets.
  dXR:
    description: Change in the exchange rate.
  G:
    description: Government expenditure.
  r:
    description: Interest rate on domestic bills.
  rf:
    description: Interest rate on foreign bills.
  Yf:
    description: Foreign income.
  alpha1:
    description: Propensity to spend out of disposable income.
  alpha2:
    description: Propensity to spend out of lagged wealth.
  theta:
    description: Tax rate.
  eps0:
    description: Export intercept.
  eps1:
    description: Exchange-rate elasticity of exports.
  eps2:
    description: Foreign-income elasticity of exports.
  mu0:
    description: Import intercept.
  mu1:
    description: Exchange-rate elasticity of imports.
  mu2:
    description: Income elasticity of imports.
  lambda10:
    description: Domestic-bills portfolio intercept.
  lambda11:
    description: Domestic-rate sensitivity of domestic bills.
  lambda12:
    description: Foreign-rate sensitivity of domestic bills.
  lambda20:
    description: Foreign-bills portfolio intercept.
  lambda21:
    description: Domestic-rate sensitivity of foreign bills.
  lambda22:
    description: Foreign-rate sensitivity of foreign bills.
  phi:
    description: Exchange-rate adjustment speed.
equations: |-
  # Private disposable income before valuation gains.
  YDr ~ Y + r * lag(Bp) + rf * lag(BWp) * XR - T

  # Disposable income including foreign-asset valuation gains.
  YDhs ~ YDr + dXR * lag(BWp)

  # Private sector net worth.
  V ~ lag(V) + YDhs - PE

  # Taxes on income and interest receipts.
  T ~ theta * (Y + r * lag(Bp) + rf * lag(BWp) * XR)

  # Open-economy goods-market equilibrium.
  Y ~ PE + G + X - IM

  # Private expenditure from income and lagged wealth.
  PE ~ alpha1 * YDhs + alpha2 * lag(V)

  # Net acquisition of financial assets.
  NAFA ~ PSBR + CA

  # Exports as a function of the lagged exchange rate and foreign income.
  X ~ exp(eps0 + eps1 * log(lag(XR)) + eps2 * log(Yf))

  # Imports as a function of the lagged exchange rate and domestic income.
  IM ~ exp(mu0 - mu1 * log(lag(XR)) + mu2 * log(Y))

  # Trade balance.
  TB ~ X - IM

  # Current account.
  CA ~ TB + rf * lag(BWp) * XR - r * lag(Bw)

  # Net foreign assets.
  NFA ~ lag(NFA) + CA + dXR * lag(BWp)

  # Rest-of-world holdings of domestic bills.
  Bw ~ BWp * XR - NFA

  # Private demand for domestic bills.
  Bp ~ V * (lambda10 + lambda11 * r - lambda12 * rf)

  # Private demand for foreign bills.
  BWp ~ V * (lambda20 - lambda21 * r + lambda22 * rf) / XR

  # Private money holdings.
  Hp ~ V - Bp - BWp * XR

  # Central-bank profits from domestic bills.
  FCB ~ r * lag(Bcb)

  # Central-bank bill holdings.
  Bcb ~ Bs - Bp - Bw

  # High-powered money supplied by the central bank.
  Hs ~ Bcb

  # Public-sector borrowing requirement.
  PSBR ~ G + r * lag(Bs) - T - FCB

  # Government bill supply.
  Bs ~ lag(Bs) + PSBR

  # Exchange rate adjusted by the lagged current account.
  XR ~ lag(XR) + phi * (-lag(CA))

  # Accounting check for sectoral balances.
  sectoral_check ~ NAFA - PSBR - CA

  # Change in private money holdings.
  dHp ~ Hp - lag(Hp)

  # Change in supplied money.
  dHs ~ Hs - lag(Hs)

  # Change in private domestic bills.
  dBp ~ Bp - lag(Bp)

  # Change in government bill supply.
  dBs ~ Bs - lag(Bs)

  # Change in central-bank bill holdings.
  dBcb ~ Bcb - lag(Bcb)

  # Change in rest-of-world domestic bills.
  dBw ~ Bw - lag(Bw)

  # Change in private foreign bills.
  dBWp ~ BWp - lag(BWp)

  # Change in private net worth.
  dV ~ V - lag(V)

  # Change in net foreign assets.
  dNFA ~ NFA - lag(NFA)

  # Change in the exchange rate.
  dXR ~ XR - lag(XR)
equationCell:
  id: model-equations
  title: OPENSIMPLEST model
  collapsed: true
balance:
  id: balance-sheet
  title: Balance sheet matrix
  description: Compact balance-sheet view for the OPENSIMPLEST open-economy model.
  columns: [Private, Government, Central bank, Rest of world, Sum]
  sectors: [Private, Government, Central bank, Rest of world, ""]
  rows:
    - [financial-assets, High-powered money, +Hp, "", -Hs, "", "0"]
    - [financial-assets, Domestic bills, +Bp, -Bs, +Bcb, +Bw, "0"]
    - [financial-assets, Foreign bills (domestic value), +BWp * XR, "", "", -BWp * XR, "0"]
    - [net-worth, Net worth, -V, +Bs, "", +NFA, "0"]
    - [Sum, Sum, "0", "0", "0", "0", "0"]
transactions:
  id: transactions-flow
  title: Transactions-flow matrix
  description: Transactions-flow matrix for the OPENSIMPLEST open-economy model.
  columns: [Production, Private, Government, Central bank, Rest of world, Sum]
  sectors: [Private, Government, Central bank, Rest of world, "", ""]
  rows:
    - [current, Government expenditure, +G, "", -G, "", "", "0"]
    - [current, Private expenditure, +PE, -PE, "", "", "", "0"]
    - [current, Taxes, "", -T, +T, "", "", "0"]
    - [external, Exports, +X, "", "", "", -X, "0"]
    - [external, Imports, -IM, "", "", "", +IM, "0"]
    - [income, GDP income, -Y, +Y, "", "", "", "0"]
    - [income, Interest on domestic bills, "", +r * lag(Bp), -r * lag(Bs), +r * lag(Bcb), +r * lag(Bw), "0"]
    - [income, Interest on foreign bills, "", +rf * lag(BWp) * XR, "", "", -rf * lag(BWp) * XR, "0"]
    - [revaluation, Valuation gains, "", +dXR * lag(BWp), "", "", -dXR * lag(BWp), "0"]
    - [income, Central-bank profits, "", "", +FCB, -FCB, "", "0"]
    - [balances, Sectoral balances, "", +NAFA, -PSBR, "", -CA, "0"]
    - [financial, Change in money, "", +dHp, "", -dHs, "", "0"]
    - [financial, Change in domestic bills, "", +dBp, -dBs, +dBcb, +dBw, "0"]
    - [financial, Change in foreign bills, "", +dBWp * XR, "", "", -dBWp * XR, "0"]
    - [balances, Change in net worth, "", -dV, +dBs, "", +dNFA, "0"]
    - [Sum, Sum, "0", "0", "0", "0", "0", "0"]
parameters:
  G: 16
  r: 0.03
  rf: 0.03
  Yf: 80
  alpha1: 0.75
  alpha2: 0.13333
  theta: 0.2
  eps0: -2.1
  eps1: 0.7
  eps2: 1.2
  mu0: -2.1
  mu1: 0.7
  mu2: 1.2
  lambda10: 0.7
  lambda11: 5
  lambda12: 5
  lambda20: 0.25
  lambda21: 5
  lambda22: 5
  phi: 0.01
parametersCell:
  id: model-externals
  title: Externals
  collapsed: true
