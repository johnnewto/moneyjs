solver:
  method: newton
  tolerance: "1e-8"
  maxIterations: 200
  defaultInitialValue: "1e-15"
  hiddenLeftVariable: ""
  hiddenRightVariable: ""
  hiddenTolerance: "0.00001"
  relativeHiddenTolerance: false
solverCell:
  id: model-solver
  title: Solver
  collapsed: true
baselineRun:
  id: baseline-run
  title: Baseline
  description: Baseline OPENSIMPLEST simulation over 40 periods.
  resultKey: opensimplest_baseline
  periods: 40
charts:
  - id: baseline-chart
    title: Baseline dynamics
    variables:
      - Y
      - X
      - IM
      - CA
      - XR
      - V
    axisMode: separate
    axisSnapTolarance: 0.5
cells:
  - id: model-sequence
    type: sequence
    title: model sequence
    source:
      kind: matrix
      matrixCellId: transactions-flow
    description: Canvas-rendered sequence view generated from the transactions-flow matrix at the selected simulation period.
    note: Use Reset and Next step to manually reveal flows in order.
  - id: scenario-note
    type: markdown
    title: Scenario
    source: A permanent adverse export shock is introduced from period 5 by lowering the export intercept `eps0` from `-2.1` to `-2.2`. This reduces exports on impact, weakens the current account, and induces exchange-rate depreciation, which then partly stabilizes activity through the trade channel.
  - id: export-shock-run
    type: run
    title: Export shock
    mode: scenario
    scenario:
      shocks:
        - rangeInclusive:
            - 5
            - 40
          variables:
            eps0:
              kind: constant
              value: -2.2
    baselineRunCellId: baseline-run
    periods: 40
    resultKey: opensimplest_export_shock
    sourceModelId: opensimplest
  - id: scenario-chart
    type: chart
    title: Scenario dynamics
    sourceRunCellId: export-shock-run
    variables:
      - Y
      - X
      - IM
      - CA
      - XR
      - V
    axisMode: separate
    axisSnapTolarance: 0.5
  - id: equation-dependency-graph
    type: sequence
    title: dependency graph
    source:
      kind: dependency
      modelId: opensimplest
      showAccountingStrips: true
      showExogenous: false
    description: Dependency view of the equations organized by sector strips and accounting bands.
    note: Use this alongside the transaction-flow sequence to compare accounting flows with equation structure.
    collapsed: true
