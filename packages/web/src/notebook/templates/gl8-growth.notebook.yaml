format: sfcr-notebook-yaml
formatVersion: 1
id: gl8-growth-g1
title: g1
metadata:
  version: 1
  template: gl8-growth
  sourceFileName: gl8-growth-g1 (1).notebook.yaml
cells:
  - markdown:
      id: intro
      title: "Godley and Lavoie' s  Chapter 11 GROWTH:  Overview"
      source: "This notebook adapts the `gl8-growth.Rmd` article into executable browser cells. It includes the full GROWTH baseline, the balance-sheet and transactions-flow matrices, and three representative policy experiments from the article: a higher target real wage, a one-period fiscal-growth shock, and a rise in non-performing loans. "
      more: |
        Godley and Lavoie's Chapter 11 GROWTH model is the large stock-flow consistent growth model in _Monetary Economics_. It combines production, inventories, fixed capital, wage bargaining, household portfolio choice, government debt, central-bank accommodation, and commercial-bank balance sheets.

        The implementation here follows the local `gl8-growth.Rmd` reference, which notes that this model is especially sensitive to exact equations and initial values. The browser version keeps the same baseline calibration and validates the model against the R regression fixture for selected baseline and scenario checkpoints
        The key Chapter 11 idea is that "growth" is not a single exogenous trend. Productivity grows at `GRpr`, government spending grows at `GRg`, capital grows through `gr`, and nominal balance sheets grow through the interaction of prices, quantities, lending, retained earnings, and portfolio choices.

        The baseline is therefore best read through stabilising ratios: utilisation `U`, inflation `PI`, capital growth `gr`, bank liquidity `BLR`, capital adequacy `CAR`, government debt `GD`, and the balance-sheet residuals. Because most nominal stocks grow over time, raw levels can look explosive even when the model has settled into balanced growth
  - matrix:
      id: balance-sheet
      sourceRunCellId: baseline-run
      title: Balance sheet
      description: Balance-sheet matrix for model GROWTH following the gl8 article.
      note: Validated against the baseline simulation in the R vignette fixture.
      more: |
        This matrix shows the Chapter 11 stock positions at a point in time. Firms hold inventories `IN` and fixed capital `K`; households hold money, bills, bonds, equities, and bank capital while owing household loans `L_hd`; banks issue deposits `Ms`, hold loans and bills, and carry own funds `OF_b`.

        The final `Sum` row is the accounting check. If the model has solved consistently, every financial asset has a matching liability and the nonfinancial assets `IN + K` are matched by sector net worth.
      columns: [Households, Firms, Govt, Central Bank, Banks, Sum]
      sectors: [Households, Firms, Govt, Central Bank, Banks, ""]
      accountingKind: balance-sheet
      rows:
        - [Inventories, Inventories, "", +IN, "", "", "", +IN]
        - [Money, Fixed capital, "", +K, "", "", "", +K]
        - [Money, HPM, +H_hd, "", "", -H_s, +H_bd, "0"]
        - [Money, Money, +M_h, "", "", "", -Ms, "0"]
        - [Bills, Bills, +B_hd, "", -B_s, +B_cbd, +B_bd, "0"]
        - [Bonds, Bonds, +BL_d * P_bl, "", -BL_s * P_bl, "", "", "0"]
        - [Loans, Loans, -L_hd, -L_fd, "", "", +L_s, "0"]
        - [Equities, Equities, +e_d * Pe, -e_s * Pe, "", "", "", "0"]
        - [Liabilities, Bank capital, +OF_b, "", "", "", -OF_b, "0"]
        - [Balance, Balance, -V, -V_f, GD, "", "", -(IN + K)]
        - [Sum, Sum, "0", "0", "0", "0", "0", "0"]
  - matrix:
      id: transaction-flow
      sourceRunCellId: baseline-run
      title: GROWTH transactions-flow matrix
      description: Transactions-flow matrix for model GROWTH following the gl8 article.
      note: Validated against the baseline simulation in the R vignette fixture.
      more: |
        The transactions-flow matrix connects production, income, finance, and changes in stocks. Notice the separate current and capital accounts for firms, the current and capital accounts for the central bank, and the current and capital accounts for banks.

        The loan-default row is important for Chapter 11. `NPL` is a source to firms' capital account and a loss to banks' capital account, so a credit-quality shock changes both firms' financing need and banks' own funds without breaking stock-flow consistency.
      columns: [Households, Firms curr., Firms cap., Govt., CB curr., CB cap., Banks curr., Banks cap., Sum]
      sectors: [Households, Firms, Firms, Govt, Central Bank, Central Bank, Banks, Banks, ""]
      accountingKind: transaction-flow
      rows:
        - [Consumption, Consumption, -C, +C, "", "", "", "", "", "", "0"]
        - [Government, Govt. exp., "", +G, "", -G, "", "", "", "", "0"]
        - [Investment, Investment, "", +INV, -INV, "", "", "", "", "", "0"]
        - [Inventories, Inventories, "", "+(IN - IN[-1])", "-(IN - IN[-1])", "", "", "", "", "", "0"]
        - [Taxes, Taxes, -TX, "", "", +TX, "", "", "", "", "0"]
        - [Wages, Wages, +WB, -WB, "", "", "", "", "", "", "0"]
        - [Inventories, Inventory financing cost, "", "-r_l[-1] * IN[-1]", "", "", "", "", "+r_l[-1] * IN[-1]", "", "0"]
        - [Profits, Entrepreneurial profits, +FD_f, -F_f, +FU_f, "", "", "", "+r_l[-1] * (L_fs[-1] - IN[-1] - NPL)", "", "0"]
        - [Profits, Banks profits, +FD_b, "", "", "", "", "", -F_b, +FU_b, "0"]
        - [Loans, Int. hh loans, "-r_l[-1] * L_hd[-1]", "", "", "", "", "", "+r_l[-1] * L_hs[-1]", "", "0"]
        - [Deposits, Int. deposits, "+r_m[-1] * M_h[-1]", "", "", "", "", "", "-r_m[-1] * Ms[-1]", "", "0"]
        - [Bills, Int. bills, "+R_b[-1] * B_hd[-1]", "", "", "-R_b[-1] * B_s[-1]", "+R_b[-1] * B_cbd[-1]", "", "+R_b[-1] * B_bd[-1]", "", "0"]
        - [Bonds, Int. bonds, "+BL_d[-1]", "", "", "-BL_d[-1]", "", "", "", "", "0"]
        - [Loans, Ch. loans, +d(L_hd), "", +d(L_fd), "", "", "", "", -d(L_s), "0"]
        - [Cash, Ch. cash, -d(H_hd), "", "", "", "", +d(H_s), "", -d(H_bd), "0"]
        - [Deposits, Ch. deposits, -d(M_h), "", "", "", "", "", "", +d(Ms), "0"]
        - [Bills, Ch. bills, -d(B_hd), "", "", +d(B_s), "", -d(B_cbd), "", -d(B_bd), "0"]
        - [Bonds, Ch. bonds, -d(BL_d) * P_bl, "", "", +d(BL_s) * P_bl, "", "", "", "", "0"]
        - [Equities, Ch. equities, -d(e_d) * Pe, "", +d(e_s) * Pe, "", "", "", "", "", "0"]
        - [Loans, Loan defaults, "", "", +NPL, "", "", "", "", -NPL, "0"]
        - [Sum, Sum, "0", "0", "0", "0", "0", "0", "0", "0", "0"]
  - sequence:
      id: transaction-flow-sequence
      title: GROWTH transaction flow sequence
      source:
        kind: matrix
        matrixCellId: transaction-flow
      description: Sequence view generated from the GROWTH transactions-flow matrix at the selected simulation period.
  - equations:
      id: equations
      title: GROWTH model
      modelId: equations
      collapsed: false
      more: |
        The equations follow the Chapter 11 blocks: production and inventories, wage and price setting, firm finance, household income and portfolio choice, government debt issuance, central-bank accommodation, and commercial-bank pricing and capital.

        A few translation choices mirror the reference implementation rather than the printed textbook alone. The local R article explicitly says that the model only simulated reliably with Zezza-style equations and exact initial values, so the browser template preserves that calibration and then checks selected results against the R fixture.
      rows:
        - Production and capital
        - [y, "s^e + (in^e - in[-1]) / dt", "Real output", items/year]
        - [s^e, "beta * s + (1 - beta) * s[-1] * (1 + (GRpr + RA))", "Expected real sales", items/year, "", "", eq-2-se]
        - [in^e, "in[-1] + gamma * (in^T - in[-1])", "Expected real inventories", items, "", "", eq-3-ine]
        - [in^T, sigmat * s^e, "Target level of real inventories", items, "", "", eq-4-int]
        - [in, "in[-1] + (y - s - NPL / UC) *dt", "Real inventories", items]
        - [k, k' * (1 + gr), "Real capital stock", items]
        - [gr, "gamma0 + gammau * U[-1] - gammar * RRl", "growth_mod of real capital stock", 1/year, aux]
        - [U, "y / k[-1]", "Capital utilization proxy", 1/year, aux]
        - [RRl, ((1 + r_l) / (1 + PI)) - 1, "Real interest rate on loans"]
        - [PI, d(P) / P', "Price inflation", 1/year, aux]
        - [i, d(k) + delta * k', "Gross investment in real terms", items/year, flow, identity]
        - Sales and nominal GDP
        - [s, c + g + i, "Real sales", items/year, flow, identity]
        - [S, s * P, "Sales at current prices", $/year, "", identity]
        - [IN, in * UC, "Stock of inventories at current costs", $, stock, accumulation]
        - [INV, i * P, "Gross investment", $/year, flow, identity]
        - [K, k * P, "Capital stock", $, stock, accumulation]
        - [Y, s * P + d(in) * UC, "Output at current prices (nominal GDP ", $/year, flow, identity]
        - Wages and unit costs
        - [omegat, exp(omega0 + omega1 * log(PR) + omega2 * log(ER + z3 * (1 - ER) - z4 * BANDt + z5 * BANDb)), "Target real wage for workers"]
        - [ER, "N[-1] / Nfe[-1]", "Employment rate"]
        - [z3a, "if (ER > (1 - BANDb)) {1} else {0}"]
        - [z3b, "if (ER <= (1 + BANDt)) {1} else {0}"]
        - [z3, z3a * z3b, "Parameter in wage aspiration equation"]
        - [z4, "if (ER > (1 + BANDt)) {1} else {0}", "Parameter in wage aspiration equation"]
        - [z5, "if (ER < (1 - BANDb)) {1} else {0}", "Parameter in wage aspiration equation"]
        - [W, "W[-1] + omega3 * (omegat * P[-1] - W[-1])", "Wage rate", $/year, flow, identity]
        - [PR, "PR[-1] * (1 + GRpr)", "Lobor productivity"]
        - [Nt, y / PR, "Desired employment level"]
        - [N, "N[-1] + etan * (Nt - N[-1])", "Employment level"]
        - [WB, N * W, "The wage bill", $/year, flow, identity]
        - [UC, WB / y, "Unit costs", $/item, aux]
        - [NUC, W / PR, "Normal unit cost", $/item, aux]
        - [NHUC, "(1 - sigman) * NUC + sigman * (1 + Rln[-1]) * NUC[-1]", "Normal historic unit cost"]
        - Pricing and mark-ups
        - [P, (1 + phi) * NHUC, "Price level", $/item, aux]
        - [phi, "phi[-1] + eps2 * (phit[-1] - phi[-1])", "Mark-up on unit costs"]
        - [phit, "(FU_f^T + FD_f + r_l[-1] * (L_fd[-1] - IN[-1])) / ((1 - sigmas^e) * s^e * UC + (1 + r_l[-1]) * sigmas^e * s^e * UC[-1])", "Ideal mark-up on unit costs"]
        - [HCe, "(1 - sigmas^e) * s^e * UC + (1 + r_l[-1]) * sigmas^e * s^e * UC[-1]", "Expected historical costs"]
        - [sigmas^e, "in[-1] / s^e", "Opening inventories to expected sales ratio", "", "", "", eq-40-sigmase]
        - [F_f^T, "FU_f^T + FD_f + r_l[-1] * (L_fd[-1] - IN[-1])", "Planned entrepreneurial profits", "", "", "", eq-41-Fft]
        - [FU_f^T, "psiu * INV[-1]", "Planned retained earnings of firms", "", "", "", eq-42-FUft]
        - [FD_f, "psid * F_f[-1]", "Dividends of firms", $/year, flow, identity, eq-43-FDf]
        - Profits and firm finance
        - [F_f, "S - WB + (IN - IN[-1]) - r_l[-1] * IN[-1]", "Realized entrepreneurial profits", $/year, flow, identity, eq-45-Ff]
        - [FU_f, F_f - FD_f - r_l'*(L_fd'-IN') + r_l'*NPL*dt, "Retained earnings of firms", $/year, flow, identity, eq-46-FUf]
        - [L_fd, "L_fd[-1] + (INV + d(IN) - FU_f - d(e_s) * Pe - NPL)*dt", "Demand for loans by firms", $, stock, accumulation, eq-47-Lfd]
        - [NPL, "npl * L_fs[-1]", "Non-Performing loans", $/year, flow, identity]
        - [e_s, "e_s[-1] + ((1 - psiu) * INV[-1]) / Pe", "Number of equities supplied by firms", items, stock, accumulation, eq-49-Eks]
        - [Rk, "FD_f / (Pe[-1] * e_d[-1])", "Dividend yield of firms"]
        - [PE, "Pe / (F_f / e_s[-1])", "Price earnings ratio"]
        - [Q, (e_s * Pe + L_fd) / (K + IN), "Tobin's Q"]
        - Households
        - [YP, "WB + FD_f + FD_b + r_m[-1] * M_h[-1] + R_b[-1] * B_hd[-1] + BL_s[-1]", "Personal income"]
        - [TX, theta * YP, "Taxes", $/year, flow, identity]
        - [YD_r, "YP - TX - r_l[-1] * L_hd[-1]", "Regular disposable income", $/year, flow, identity, eq-56-YDr]
        - [YD_hs, YD_r + CG, "Haig-Simons measure of disposable income", $/year, flow, identity, eq-57-YDhs]
        - [CG, "(P_bl - P_bl[-1]) * BL_d[-1] + (Pe - Pe[-1]) * e_d[-1] + (OF_b - OF_b[-1])", "Capital gains on government bonds", $/year, flow, identity]
        - [V, "V[-1] + YD_hs - C", "Wealth of households", $, stock, accumulation]
        - [v, V / P, "Real wealth of households", items, stock, accumulation]
        - [C, c * P, "Consumption at current prices", $/year, flow, identity, eq-61-CONS]
        - [c, "alpha1 * (ydr^e + nl) + alpha2 * v[-1]", "Real consumption", items/year, flow, identity]
        - [ydr^e, "eps * ydr + (1 - eps) * (ydr[-1] * (1 + GRpr))", "Expected regular real disposable income", items/year, flow, identity, eq-63-ydre]
        - [ydr, (YD_r - d(P) * v') / P, "Regular real disposable income", items/year, flow, identity]
        - Household credit
        - [GL, eta * YD_r, "Gross amount of new personal loans"]
        - [eta, eta0 - etar * RRl, "Ratio of new loans to personal income"]
        - [NL, GL - REP, "Net flow of new loans to the household sector"]
        - [REP, "deltarep * L_hd[-1]", "Personal loans repayments"]
        - [L_hd, "L_hd[-1] + GL - REP", "Demand for loans by households", $, stock, accumulation, eq-70-Lhd]
        - [nl, NL / P, "Real flow of new loans to the household sector"]
        - [BUR, "(REP + r_l[-1] * L_hd[-1]) / YD_r[-1]", "Burden of personal debt"]
        - Portfolio decisions
        - [B_hd, "V_fma[-1] * (lambda20 + lambda22 * R_b[-1] - lambda21 * r_m[-1] - lambda24 * Rk[-1] - lambda23 * R_bl[-1] - lambda25 * (YD_r / V))", "Demand for government bills from households", $, stock, accumulation, eq-74-Bhd]
        - [BL_d, "V_fma[-1] * (lambda30 - lambda32 * R_b[-1] - lambda31 * r_m[-1] - lambda34 * Rk[-1] + lambda33 * R_bl[-1] - lambda35 * (YD_r / V)) / P_bl", "Demand for government bonds", $/year, flow, identity, eq-75-BLd]
        - [Pe, "V_fma[-1] * (lambda40 - lambda42 * R_b[-1] - lambda41 * r_m[-1] + lambda44 * Rk[-1] - lambda43 * R_bl[-1] - lambda45 * (YD_r / V)) / e_d", "Price of equities", $/item, aux]
        - [M_h, V_fma - B_hd - Pe * e_d - P_bl * BL_d + L_hd, "Deposits demanded by households", $, stock, accumulation, eq-77-Mh]
        - [V_fma, V - H_hd - OF_b, "Investible wealth of households", $, stock, accumulation, eq-78-Vfma]
        - [VfmaA, M_h + B_hd + P_bl * BL_d + Pe * e_d]
        - [H_hd, lambdac * C, "Households demand for cash", $, stock, accumulation]
        - [e_d, e_s, "Number of equities demanded", items, stock, accumulation, eq-81-Ekd]
        - Government
        - [G, g * P, "Government expenditures", $/year, flow, identity]
        - [g, "g[-1] * (1 + GRg)", "Real government expenditures", items/year, flow, identity]
        - [PSBR, "G + BL_s[-1] + R_b[-1] * (B_bs[-1] + B_hs[-1]) - TX", "Government deficit", $/year, flow, identity]
        - [B_s, "B_s[-1] + G - TX - (BL_s - BL_s[-1]) * P_bl + R_b[-1] * (B_hs[-1] + B_bs[-1]) + BL_s[-1]", "Supply of government bills", $, stock, accumulation, eq-86-Bs]
        - [GD, B_bs + B_hs + BL_s * P_bl + H_s, "Government debt", $, stock, accumulation]
        - Central bank
        - [F_cb, "R_b[-1] * B_cbd[-1]", "Central bank \"profits\"", $/year, flow, identity, eq-89-Fcb]
        - [BL_s, BL_d, "Supply of government bonds", $/year, flow, identity, eq-90-BLs]
        - [B_hs, B_hd, "Government bills supplied to households", $, stock, accumulation, eq-91-Bhs]
        - [H_hs, H_hd, "Cash supplied to households", $, stock, accumulation, eq-92-Hhs]
        - [H_bs, H_bd, "Cash supplied to banks", $, stock, accumulation, eq-93-Hbs]
        - [H_s, H_bs + H_hs, "Total supply of cash", $, stock, accumulation, eq-94-Hs]
        - [B_cbd, H_s, "Government bills demanded by Central bank", $, stock, accumulation, eq-95-Bcbd]
        - [B_cbs, B_cbd, "Government bills supplied by Central bank", $, stock, accumulation, eq-96-Bcbs]
        - [R_b, Rbbar, "Interest rate on government bills", 1/year, aux, "", eq-97-Rb]
        - [R_bl, R_b + ADDbl, "Interest rate on bonds", 1/year, aux, "", eq-98-Rbl]
        - [P_bl, 1 / R_bl, "Price of government bonds", "", "", "", eq-99-Pbl]
        - Commercial banks
        - [Ms, M_h, "Deposits supplied by banks", $, stock, accumulation]
        - [L_fs, L_fd, "Supply of loans to firms", $, stock, accumulation, eq-102-Lfs]
        - [L_hs, L_hd, "Loans supplied to households", $, stock, accumulation, eq-103-Lhs]
        - [H_bd, ro * Ms, "Cash required by banks", $, stock, accumulation, eq-104-Hbd]
        - [B_bs, B_bs' + (d(B_s) - d(B_hs) - d(B_cbs)) *dt, "Government bills supplied to commercial banks", $, stock, accumulation, eq-105-Bbs]
        - [B_bd, Ms + OF_b - L_fs - L_hs - H_bd, "Government bills demanded by commercial banks", $, stock, accumulation, eq-106-Bbd]
        - [BLR, B_bd / Ms, "Gross bank liquidity ratio"]
        - [r_m, "r_m[-1] + z1a * xim1 + z1b * xim2 - z2a * xim1 - z2b * xim2", "Interest rate on deposits", 1/year, aux, "", eq-108-Rm]
        - [z2a, "if (BLR[-1] > (top + 0.05)) {1} else {0}", "Is one if bank liquidity ratio is above top range"]
        - [z2b, "if (BLR[-1] > top) {1} else {0}", "Is one if bank liquidity ratio is above top range"]
        - [z1a, "if (BLR[-1] <= bot) {1} else {0}", "Is one if bank liquidity ratio is below bottom range"]
        - [z1b, "if (BLR[-1] <= (bot - 0.05)) {1} else {0}", "Is one if bank liquidity ratio is below bottom range"]
        - Bank profits and capital
        - [r_l, r_m + ADDl, "Interest rate on loans", 1/year, aux, "", eq-114-Rl]
        - [OFb^T, "NCAR * (L_fs[-1] + L_hs[-1])", "Long-run target for banks own funds", $, stock, accumulation, eq-115-OFbt]
        - [OFb^e, "OF_b[-1] + betab * (OFb^T - OF_b[-1])", "Short-run target for banks own funds", $, stock, accumulation, eq-116-OFbe]
        - [FU_b^T, "OFb^e - OF_b[-1] + npl^e * L_fs[-1]", "Targt retained earnings of banks", $, stock, accumulation, eq-117-FUbt]
        - [npl^e, "epsb * npl^e[-1] + (1 - epsb) * npl[-1]", "Expected proportion of Non-Performing Loans", "", "", "", eq-118-nple]
        - [FD_b, F_b - FU_b, "Dividends of banks", $/year, flow, identity, eq-119-FDb]
        - [Fb^T, "lambdab * Y[-1] + (OFb^e - OF_b[-1] + npl^e * L_fs[-1])", "Target profits of banks", "", "", "", eq-120-Fbt]
        - [F_b, r_l' * (L_fs' + L_hs' - NPL) + R_b' * B_bd' - r_m' * Ms', "Realized banks profits", $/year, flow, identity, eq-121-Fb]
        - [ADDl, "(Fb^T - R_b[-1] * B_bd[-1] + r_m[-1] * (Ms[-1] - (1 - npl^e) * L_fs[-1] - L_hs[-1])) / ((1 - npl^e) * L_fs[-1] + L_hs[-1])", "Spread between interest rate on loans and rate on deposits", 1/year, aux]
        - [FU_b, "F_b - lambdab * Y[-1]", "Retained earnings of banks", $/year, flow, identity, eq-123-FUb]
        - [OF_b, "OF_b[-1] + (FU_b - NPL) *dt", "Own funds of banks", $, stock, accumulation, eq-124-OFb]
        - [CAR, OF_b / (L_fs + L_hs), "Capital adequacy ratio of banks"]
        - [V_f, IN + K - L_fd - e_d * Pe, "", $, stock, accumulation, eq-126-Vf]
        - [L_s, L_fs + L_hs, "", $, stock, accumulation, eq-127-Ls]
  - solver:
      id: solver
      title: Solver
      modelId: equations
      collapsed: true
      more: |
        Chapter 11's GROWTH model has a dense simultaneous system. The hidden equation checks the banks' bills position, comparing `B_bs` with `B_bd`.

        In the R reference, the absolute discrepancy grows with the scale of the economy, so the check is relative rather than absolute. This notebook uses the same idea through `relativeHiddenTolerance: true` and a hidden tolerance of `0.000001`.
      method: gauss-seidel
      tolerance: "1e-15"
      maxIterations: 350
      defaultInitialValue: "1e-15"
      hiddenLeftVariable: B_bs
      hiddenRightVariable: B_bd
      hiddenTolerance: "0.000001"
      relativeHiddenTolerance: true
  - externals:
      id: externals
      title: Externals
      modelId: equations
      collapsed: false
      rows:
        - [alpha1, 0.75, "Propensity to consume out of income"]
        - [alpha2, 0.064, "Propensity to consume out of wealth"]
        - [beta, 0.5, "Parameter in expectation formations on real sales"]
        - [betab, 0.4, "Spped of adjustment of banks own funds"]
        - [gamma, 0.15, "Speed of adjustment of inventories to the target level"]
        - [gamma0, 0.00122, "Exogenous growth_mod in the real stock of capital"]
        - [gammar, 0.1, "Relation between the real interest rate and growth_mod in the stock of capital"]
        - [gammau, 0.05, "Relation between the utilization rate and growth_mod in the stock of capital"]
        - [delta, 0.10667, "Rate of depreciation of fixed capital"]
        - [deltarep, 0.1, "Ratio of personal loans repayments to stock of loans"]
        - [eps, 0.5, "Parameter in expectation formations on real disposable income"]
        - [eps2, 0.8, "Speed of adjustment of mark-up"]
        - [epsb, 0.25, "Speed of adjustment in expected proportion of non-performing loans"]
        - [epsrb, 0.9, "Speed of adjustment in the real interest rate on bills"]
        - [eta0, 0.07416, "Ratio of new loans to personal income - exogenous component"]
        - [etan, 0.6, "Speed of adjustment of actual employment to desired employment"]
        - [etar, 0.4, "Relation between the ratio of new loans to personal income and the interest rate on loans"]
        - [theta, 0.22844, "Income tax rate"]
        - [lambda20, 0.25, "Parameter in households demand for bills"]
        - [lambda21, 2.2, "Parameter in households demand for bills"]
        - [lambda22, 6.6, "Parameter in households demand for bills"]
        - [lambda23, 2.2, "Parameter in households demand for bills"]
        - [lambda24, 2.2, "Parameter in households demand for bills"]
        - [lambda25, 0.1, "Parameter in households demand for bills"]
        - [lambda30, -0.04341, "Parameter in households demand for bonds"]
        - [lambda31, 2.2, "Parameter in households demand for bonds"]
        - [lambda32, 2.2, "Parameter in households demand for bonds"]
        - [lambda33, 6.6, "Parameter in households demand for bonds"]
        - [lambda34, 2.2, "Parameter in households demand for bonds"]
        - [lambda35, 0.1, "Parameter in households demand for bonds"]
        - [lambda40, 0.67132, "Parameter in households demand for equities"]
        - [lambda41, 2.2, "Parameter in households demand for equities"]
        - [lambda42, 2.2, "Parameter in households demand for equities"]
        - [lambda43, 2.2, "Parameter in households demand for equities"]
        - [lambda44, 6.6, "Parameter in households demand for equities"]
