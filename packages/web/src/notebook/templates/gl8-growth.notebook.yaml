      axisMode: shared
      axisSnapTolarance: 0.5
      compareMode: relative
      referenceTrace: baseline
      sourceRunCellId: scenario-1b-run
  - markdown:
      id: scenario-2-note
      title: "Scenario 2: A one-period increase in the growth rate of pure government expenditures"
      source: "Scenario 2 applies the one-period fiscal-growth shock from the article: `GRg` rises from `0.03` to `0.035` for periods 10 to 11."
      more: |
        This is a shock to the growth rate of real government expenditure `g`, not a one-time addition to the level of `G`. The higher `GRg` applies only briefly, but because `g = g[-1] * (1 + GRg)`, the level of government spending is left on a higher path.

        Chapter 11 uses this type of experiment to show how demand, employment, debt, bank liquidity, and firm finance respond when fiscal growth temporarily outruns the baseline balanced-growth path.
  - run:
      id: scenario-2-run
      title: A one-period fiscal growth shock
      mode: scenario
      scenario:
        shocks:
          - rangeInclusive:
              - 10
              - 11
            variables:
              GRg:
                kind: constant
                value: 0.035
            startPeriodInclusive: 10
            endPeriodInclusive: 11
      baselineRunCellId: baseline-run
      periods: 100
      resultKey: gl8_growth_s2
      sourceModelId: equations
      baselineStartPeriod: 100
      more: |
        The R fixture checkpoints for this shock show the short-run adjustment rather than a new calibration: at period 10, `BLR = 0.063644153424` and `CAR = 0.091640447259`; by period 25, `BLR = 0.079214382562` and `CAR = 0.091645964037`.

        Track `PSBR` and `GD` with output because government debt is endogenous. It reflects spending, taxes, interest payments, bond issuance, bill issuance, and central-bank accommodation.
  - chart:
      id: scenario-2-chart
      title: Output and government spending, Figure 11.3A
      more: |
        The `g` series shows the fiscal impulse itself. The response of `y` captures the demand side, while `PSBR` and `GD` show how the public-sector balance sheet absorbs the shock in the accounting system.
      series:
        - expression: y
          label: Real output
        - expression: g
          label: Real government spending
      compareMode: relative
      referenceTrace: baseline
      sharedRange:
        includeZero: false
        min: 0.98
        max: 1.02
      seriesRanges:
        y:
          min: 0
          max: 2
      sourceRunCellId: scenario-2-run
  - chart:
      id: scenario-2-figure-11-3b
      title: Employment rate, Figure 11.3B
