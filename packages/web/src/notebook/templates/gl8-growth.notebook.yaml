format: sfcr-notebook-yaml
formatVersion: 1
id: gl8-growth-notebook
title: GL8 Growth Notebook
metadata:
  version: 1
  template: gl8-growth
cells:
  - markdown:
      id: intro
      title: Overview
      source: "This notebook adapts the `gl8-growth.Rmd` article into executable browser cells. It includes the full GROWTH baseline, the balance-sheet and transactions-flow matrices, and three representative policy experiments from the article: a higher target real wage, a one-period fiscal-growth shock, and a rise in non-performing loans."
  - matrix:
      id: balance-sheet
      accountingKind: balance-sheet
      title: GROWTH balance sheet
      description: Balance-sheet matrix for model GROWTH following the gl8 article.
      note: Validated against the baseline simulation in the R vignette fixture.
      sourceRunCellId: baseline-run
      columns: [Households, Firms, Govt, Central Bank, Banks, Sum]
      sectors: [Households, Firms, Govt, Central Bank, Banks, ""]
      rows:
        - [Inventories, Inventories, "", +IN, "", "", "", +IN]
        - [Money, Fixed capital, "", +K, "", "", "", +K]
        - [Money, HPM, +Hhd, "", "", -Hs, +Hbd, "0"]
        - [Money, Money, +Mh, "", "", "", -Ms, "0"]
        - [Bills, Bills, +Bhd, "", -Bs, +Bcbd, +Bbd, "0"]
        - [Bonds, Bonds, +BLd * Pbl, "", -BLs * Pbl, "", "", "0"]
        - [Loans, Loans, -Lhd, -Lfd, "", "", +Ls, "0"]
        - [Equities, Equities, +Ekd * Pe, -Eks * Pe, "", "", "", "0"]
        - [Liabilities, Bank capital, +OFb, "", "", "", -OFb, "0"]
        - [Balance, Balance, -V, -Vf, GD, "", "", -(IN + K)]
        - [Sum, Sum, "0", "0", "0", "0", "0", "0"]
  - matrix:
      id: transaction-flow
      accountingKind: transaction-flow
      title: GROWTH transactions-flow matrix
      description: Transactions-flow matrix for model GROWTH following the gl8 article.
      note: Validated against the baseline simulation in the R vignette fixture.
      sourceRunCellId: baseline-run
      columns: [Households, Firms curr., Firms cap., Govt., CB curr., CB cap., Banks curr., Banks cap., Sum]
      sectors: [Households, Firms, Firms, Govt, Central Bank, Central Bank, Banks, Banks, ""]
      rows:
        - [Consumption, Consumption, -CONS, +CONS, "", "", "", "", "", "", "0"]
        - [Government, Govt. exp., "", +G, "", -G, "", "", "", "", "0"]
        - [Investment, Investment, "", +INV, -INV, "", "", "", "", "", "0"]
        - [Inventories, Inventories, "", "+(IN - IN[-1])", "-(IN - IN[-1])", "", "", "", "", "", "0"]
        - [Taxes, Taxes, -TX, "", "", +TX, "", "", "", "", "0"]
        - [Wages, Wages, +WB, -WB, "", "", "", "", "", "", "0"]
        - [Inventories, Inventory financing cost, "", "-Rl[-1] * IN[-1]", "", "", "", "", "+Rl[-1] * IN[-1]", "", "0"]
        - [Profits, Entrepreneurial profits, +FDf, -Ff, +FUf, "", "", "", "+Rl[-1] * (Lfs[-1] - IN[-1] - NPL)", "", "0"]
        - [Profits, Banks profits, +FDb, "", "", "", "", "", -Fb, +FUb, "0"]
        - [Loans, Int. hh loans, "-Rl[-1] * Lhd[-1]", "", "", "", "", "", "+Rl[-1] * Lhs[-1]", "", "0"]
        - [Deposits, Int. deposits, "+Rm[-1] * Mh[-1]", "", "", "", "", "", "-Rm[-1] * Ms[-1]", "", "0"]
        - [Bills, Int. bills, "+Rb[-1] * Bhd[-1]", "", "", "-Rb[-1] * Bs[-1]", "+Rb[-1] * Bcbd[-1]", "", "+Rb[-1] * Bbd[-1]", "", "0"]
        - [Bonds, Int. bonds, "+BLd[-1]", "", "", "-BLd[-1]", "", "", "", "", "0"]
        - [Loans, Ch. loans, "+(Lhd - Lhd[-1])", "", "+(Lfd - Lfd[-1])", "", "", "", "", "-(Ls - Ls[-1])", "0"]
        - [Cash, Ch. cash, "-(Hhd - Hhd[-1])", "", "", "", "", "+(Hs - Hs[-1])", "", "-(Hbd - Hbd[-1])", "0"]
        - [Deposits, Ch. deposits, "-(Mh - Mh[-1])", "", "", "", "", "", "", "+(Ms - Ms[-1])", "0"]
        - [Bills, Ch. bills, "-(Bhd - Bhd[-1])", "", "", "+(Bs - Bs[-1])", "", "-(Bcbd - Bcbd[-1])", "", "-(Bbd - Bbd[-1])", "0"]
        - [Bonds, Ch. bonds, "-(BLd - BLd[-1]) * Pbl", "", "", "+(BLs - BLs[-1]) * Pbl", "", "", "", "", "0"]
        - [Equities, Ch. equities, "-(Ekd - Ekd[-1]) * Pe", "", "+(Eks - Eks[-1]) * Pe", "", "", "", "", "", "0"]
        - [Loans, Loan defaults, "", "", +NPL, "", "", "", "", -NPL, "0"]
        - [Sum, Sum, "0", "0", "0", "0", "0", "0", "0", "0", "0"]
  - sequence:
      id: transaction-flow-sequence
      title: GROWTH transaction flow sequence
      source:
        kind: matrix
        matrixCellId: transaction-flow
      description: Sequence view generated from the GROWTH transactions-flow matrix at the selected simulation period.
  - equations:
      id: equations
      title: GROWTH model
      modelId: equations
      collapsed: true
      rows:
        - [Yk, "Ske + INke - INk[-1]", "Real output"]
        - [Ske, "beta * Sk + (1 - beta) * Sk[-1] * (1 + (GRpr + RA))", "Expected real sales"]
        - [INke, "INk[-1] + gamma * (INkt - INk[-1])", "Expected real inventories"]
        - [INkt, sigmat * Ske, "Target level of real inventories"]
        - [INk, "INk[-1] + Yk - Sk - NPL / UC", "Real inventories"]
        - [Kk, "Kk[-1] * (1 + GRk)", "Real capital stock"]
        - [GRk, "gamma0 + gammau * U[-1] - gammar * RRl", "growth_mod of real capital stock"]
        - [U, "Yk / Kk[-1]", "Capital utilization proxy"]
        - [RRl, ((1 + Rl) / (1 + PI)) - 1, "Real interest rate on loans"]
        - [PI, "(P - P[-1]) / P[-1]", "Price inflation"]
        - [Ik, "(Kk - Kk[-1]) + delta * Kk[-1]", "Gross investment in real terms"]
        - [Sk, Ck + Gk + Ik, "Real sales"]
        - [S, Sk * P, "Sales at current prices"]
        - [IN, INk * UC, "Stock of inventories at current costs"]
        - [INV, Ik * P, "Gross investment"]
        - [K, Kk * P, "Capital stock"]
        - [Y, "Sk * P + (INk - INk[-1]) * UC", "Output at current prices (nominal GDP "]
        - [omegat, exp(omega0 + omega1 * log(PR) + omega2 * log(ER + z3 * (1 - ER) - z4 * BANDt + z5 * BANDb)), "Target real wage for workers"]
        - [ER, "N[-1] / Nfe[-1]", "Employment rate"]
        - [z3a, "if (ER > (1 - BANDb)) {1} else {0}"]
        - [z3b, "if (ER <= (1 + BANDt)) {1} else {0}"]
        - [z3, z3a * z3b, "Parameter in wage aspiration equation"]
        - [z4, "if (ER > (1 + BANDt)) {1} else {0}", "Parameter in wage aspiration equation"]
        - [z5, "if (ER < (1 - BANDb)) {1} else {0}", "Parameter in wage aspiration equation"]
        - [W, "W[-1] + omega3 * (omegat * P[-1] - W[-1])", "Wage rate"]
        - [PR, "PR[-1] * (1 + GRpr)", "Lobor productivity"]
        - [Nt, Yk / PR, "Desired employment level"]
        - [N, "N[-1] + etan * (Nt - N[-1])", "Employment level"]
        - [WB, N * W, "The wage bill"]
        - [UC, WB / Yk, "Unit costs"]
        - [NUC, W / PR, "Normal unit cost"]
        - [NHUC, "(1 - sigman) * NUC + sigman * (1 + Rln[-1]) * NUC[-1]", "Normal historic unit cost"]
        - [P, (1 + phi) * NHUC, "Price level"]
        - [phi, "phi[-1] + eps2 * (phit[-1] - phi[-1])", "Mark-up on unit costs"]
        - [phit, "(FUft + FDf + Rl[-1] * (Lfd[-1] - IN[-1])) / ((1 - sigmase) * Ske * UC + (1 + Rl[-1]) * sigmase * Ske * UC[-1])", "Ideal mark-up on unit costs"]
        - [HCe, "(1 - sigmase) * Ske * UC + (1 + Rl[-1]) * sigmase * Ske * UC[-1]", "Expected historical costs"]
        - [sigmase, "INk[-1] / Ske", "Opening inventories to expected sales ratio"]
        - [Fft, "FUft + FDf + Rl[-1] * (Lfd[-1] - IN[-1])", "Planned entrepreneurial profits"]
        - [FUft, "psiu * INV[-1]", "Planned retained earnings of firms"]
        - [FDf, "psid * Ff[-1]", "Dividends of firms"]
        - [Ff, "S - WB + (IN - IN[-1]) - Rl[-1] * IN[-1]", "Realized entrepreneurial profits"]
        - [FUf, "Ff - FDf - Rl[-1] * (Lfd[-1] - IN[-1]) + Rl[-1] * NPL", "Retained earnings of firms"]
        - [Lfd, "Lfd[-1] + INV + (IN - IN[-1]) - FUf - (Eks - Eks[-1]) * Pe - NPL", "Demand for loans by firms"]
        - [NPL, "NPLk * Lfs[-1]", "Non-Performing loans"]
        - [Eks, "Eks[-1] + ((1 - psiu) * INV[-1]) / Pe", "Number of equities supplied by firms"]
        - [Rk, "FDf / (Pe[-1] * Ekd[-1])", "Dividend yield of firms"]
        - [PE, "Pe / (Ff / Eks[-1])", "Price earnings ratio"]
        - [Q, (Eks * Pe + Lfd) / (K + IN), "Tobin's Q"]
        - [YP, "WB + FDf + FDb + Rm[-1] * Mh[-1] + Rb[-1] * Bhd[-1] + BLs[-1]", "Personal income"]
        - [TX, theta * YP, "Taxes"]
        - [YDr, "YP - TX - Rl[-1] * Lhd[-1]", "Regular disposable income"]
        - [YDhs, YDr + CG, "Haig-Simons measure of disposable income"]
        - [CG, "(Pbl - Pbl[-1]) * BLd[-1] + (Pe - Pe[-1]) * Ekd[-1] + (OFb - OFb[-1])", "Capital gains on government bonds"]
        - [V, "V[-1] + YDr - CONS + (Pbl - Pbl[-1]) * BLd[-1] + (Pe - Pe[-1]) * Ekd[-1] + (OFb - OFb[-1])", "Wealth of households"]
        - [Vk, V / P, "Real wealth of households"]
        - [CONS, Ck * P, "Consumption at current prices"]
        - [Ck, "alpha1 * (YDkre + NLk) + alpha2 * Vk[-1]", "Real consumption"]
        - [YDkre, "eps * YDkr + (1 - eps) * (YDkr[-1] * (1 + GRpr))", "Expected regular real disposable income"]
        - [YDkr, "YDr / P - ((P - P[-1]) * Vk[-1]) / P", "Regular real disposable income"]
        - [GL, eta * YDr, "Gross amount of new personal loans"]
        - [eta, eta0 - etar * RRl, "Ratio of new loans to personal income"]
        - [NL, GL - REP, "Net flow of new loans to the household sector"]
        - [REP, "deltarep * Lhd[-1]", "Personal loans repayments"]
        - [Lhd, "Lhd[-1] + GL - REP", "Demand for loans by households"]
        - [NLk, NL / P, "Real flow of new loans to the household sector"]
        - [BUR, "(REP + Rl[-1] * Lhd[-1]) / YDr[-1]", "Burden of personal debt"]
        - [Bhd, "Vfma[-1] * (lambda20 + lambda22 * Rb[-1] - lambda21 * Rm[-1] - lambda24 * Rk[-1] - lambda23 * Rbl[-1] - lambda25 * (YDr / V))", "Demand for government bills from households"]
        - [BLd, "Vfma[-1] * (lambda30 - lambda32 * Rb[-1] - lambda31 * Rm[-1] - lambda34 * Rk[-1] + lambda33 * Rbl[-1] - lambda35 * (YDr / V)) / Pbl", "Demand for government bonds"]
        - [Pe, "Vfma[-1] * (lambda40 - lambda42 * Rb[-1] - lambda41 * Rm[-1] + lambda44 * Rk[-1] - lambda43 * Rbl[-1] - lambda45 * (YDr / V)) / Ekd", "Price of equities"]
        - [Mh, Vfma - Bhd - Pe * Ekd - Pbl * BLd + Lhd, "Deposits demanded by households"]
        - [Vfma, V - Hhd - OFb, "Investible wealth of households"]
        - [VfmaA, Mh + Bhd + Pbl * BLd + Pe * Ekd]
        - [Hhd, lambdac * CONS, "Households demand for cash"]
        - [Ekd, Eks, "Number of equities demanded"]
        - [G, Gk * P, "Government expenditures"]
        - [Gk, "Gk[-1] * (1 + GRg)", "Real government expenditures"]
        - [PSBR, "G + BLs[-1] + Rb[-1] * (Bbs[-1] + Bhs[-1]) - TX", "Government deficit"]
        - [Bs, "Bs[-1] + G - TX - (BLs - BLs[-1]) * Pbl + Rb[-1] * (Bhs[-1] + Bbs[-1]) + BLs[-1]", "Supply of government bills"]
        - [GD, Bbs + Bhs + BLs * Pbl + Hs, "Government debt"]
        - [Fcb, "Rb[-1] * Bcbd[-1]", "Central bank \"profits\""]
        - [BLs, BLd, "Supply of government bonds"]
        - [Bhs, Bhd, "Government bills supplied to households"]
        - [Hhs, Hhd, "Cash supplied to households"]
        - [Hbs, Hbd, "Cash supplied to banks"]
        - [Hs, Hbs + Hhs, "Total supply of cash"]
        - [Bcbd, Hs, "Government bills demanded by Central bank"]
        - [Bcbs, Bcbd, "Government bills supplied by Central bank"]
        - [Rb, Rbbar, "Interest rate on government bills"]
        - [Rbl, Rb + ADDbl, "Interest rate on bonds"]
        - [Pbl, 1 / Rbl, "Price of government bonds"]
        - [Ms, Mh, "Deposits supplied by banks"]
        - [Lfs, Lfd, "Supply of loans to firms"]
        - [Lhs, Lhd, "Loans supplied to households"]
        - [Hbd, ro * Ms, "Cash required by banks"]
        - [Bbs, "Bbs[-1] + (Bs - Bs[-1]) - (Bhs - Bhs[-1]) - (Bcbs - Bcbs[-1])", "Government bills supplied to commercial banks"]
        - [Bbd, Ms + OFb - Lfs - Lhs - Hbd, "Government bills demanded by commercial banks"]
        - [BLR, Bbd / Ms, "Gross bank liquidity ratio"]
        - [Rm, "Rm[-1] + z1a * xim1 + z1b * xim2 - z2a * xim1 - z2b * xim2", "Interest rate on deposits"]
        - [z2a, "if (BLR[-1] > (top + 0.05)) {1} else {0}", "Is one if bank liquidity ratio is above top range"]
        - [z2b, "if (BLR[-1] > top) {1} else {0}", "Is one if bank liquidity ratio is above top range"]
        - [z1a, "if (BLR[-1] <= bot) {1} else {0}", "Is one if bank liquidity ratio is below bottom range"]
        - [z1b, "if (BLR[-1] <= (bot - 0.05)) {1} else {0}", "Is one if bank liquidity ratio is below bottom range"]
        - [Rl, Rm + ADDl, "Interest rate on loans"]
        - [OFbt, "NCAR * (Lfs[-1] + Lhs[-1])", "Long-run target for banks own funds"]
        - [OFbe, "OFb[-1] + betab * (OFbt - OFb[-1])", "Short-run target for banks own funds"]
        - [FUbt, "OFbe - OFb[-1] + NPLke * Lfs[-1]", "Targt retained earnings of banks"]
        - [NPLke, "epsb * NPLke[-1] + (1 - epsb) * NPLk[-1]", "Expected proportion of Non-Performing Loans"]
        - [FDb, Fb - FUb, "Dividends of banks"]
        - [Fbt, "lambdab * Y[-1] + (OFbe - OFb[-1] + NPLke * Lfs[-1])", "Target profits of banks"]
        - [Fb, "Rl[-1] * (Lfs[-1] + Lhs[-1] - NPL) + Rb[-1] * Bbd[-1] - Rm[-1] * Ms[-1]", "Realized banks profits"]
        - [ADDl, "(Fbt - Rb[-1] * Bbd[-1] + Rm[-1] * (Ms[-1] - (1 - NPLke) * Lfs[-1] - Lhs[-1])) / ((1 - NPLke) * Lfs[-1] + Lhs[-1])", "Spread between interest rate on loans and rate on deposits"]
        - [FUb, "Fb - lambdab * Y[-1]", "Retained earnings of banks"]
        - [OFb, "OFb[-1] + FUb - NPL", "Own funds of banks"]
        - [CAR, OFb / (Lfs + Lhs), "Capital adequacy ratio of banks"]
        - [Vf, IN + K - Lfd - Ekd * Pe]
        - [Ls, Lfs + Lhs]
  - solver:
      id: solver
      title: Solver
      modelId: equations
      collapsed: true
      method: gauss-seidel
      tolerance: "1e-15"
      maxIterations: 350
      defaultInitialValue: "1e-15"
      hiddenLeftVariable: Bbs
      hiddenRightVariable: Bbd
      hiddenTolerance: "0.000001"
      relativeHiddenTolerance: true
  - externals:
      id: externals
      title: Externals
      modelId: equations
      collapsed: true
      rows:
        - [alpha1, 0.75, "Propensity to consume out of income"]
        - [alpha2, 0.064, "Propensity to consume out of wealth"]
        - [beta, 0.5, "Parameter in expectation formations on real sales"]
        - [betab, 0.4, "Spped of adjustment of banks own funds"]
        - [gamma, 0.15, "Speed of adjustment of inventories to the target level"]
        - [gamma0, 0.00122, "Exogenous growth_mod in the real stock of capital"]
        - [gammar, 0.1, "Relation between the real interest rate and growth_mod in the stock of capital"]
        - [gammau, 0.05, "Relation between the utilization rate and growth_mod in the stock of capital"]
        - [delta, 0.10667, "Rate of depreciation of fixed capital"]
        - [deltarep, 0.1, "Ratio of personal loans repayments to stock of loans"]
        - [eps, 0.5, "Parameter in expectation formations on real disposable income"]
        - [eps2, 0.8, "Speed of adjustment of mark-up"]
        - [epsb, 0.25, "Speed of adjustment in expected proportion of non-performing loans"]
        - [epsrb, 0.9, "Speed of adjustment in the real interest rate on bills"]
        - [eta0, 0.07416, "Ratio of new loans to personal income - exogenous component"]
        - [etan, 0.6, "Speed of adjustment of actual employment to desired employment"]
        - [etar, 0.4, "Relation between the ratio of new loans to personal income and the interest rate on loans"]
        - [theta, 0.22844, "Income tax rate"]
        - [lambda20, 0.25, "Parameter in households demand for bills"]
        - [lambda21, 2.2, "Parameter in households demand for bills"]
        - [lambda22, 6.6, "Parameter in households demand for bills"]
        - [lambda23, 2.2, "Parameter in households demand for bills"]
        - [lambda24, 2.2, "Parameter in households demand for bills"]
        - [lambda25, 0.1, "Parameter in households demand for bills"]
        - [lambda30, -0.04341, "Parameter in households demand for bonds"]
        - [lambda31, 2.2, "Parameter in households demand for bonds"]
        - [lambda32, 2.2, "Parameter in households demand for bonds"]
        - [lambda33, 6.6, "Parameter in households demand for bonds"]
        - [lambda34, 2.2, "Parameter in households demand for bonds"]
        - [lambda35, 0.1, "Parameter in households demand for bonds"]
        - [lambda40, 0.67132, "Parameter in households demand for equities"]
        - [lambda41, 2.2, "Parameter in households demand for equities"]
        - [lambda42, 2.2, "Parameter in households demand for equities"]
        - [lambda43, 2.2, "Parameter in households demand for equities"]
        - [lambda44, 6.6, "Parameter in households demand for equities"]
        - [lambda45, 0.1, "Parameter in households demand for equities"]
        - [lambdab, 0.0153, "Parameter determining dividends of banks"]
        - [lambdac, 0.05, "Parameter in households demand for cash"]
        - [xim1, 0.0008, "Parameter in the equation for setting interest rate on deposits"]
        - [xim2, 0.0007, "Parameter in the equation for setting interest rate on deposits"]
        - [ro, 0.05, "Reserve requirement parameter"]
        - [sigman, 0.1666, "Parameter of influencing normal historic unit costs"]
        - [sigmat, 0.2, "Target inventories to sales ratio"]
        - [psid, 0.15255, "Ratio of dividends to gross profits"]
        - [psiu, 0.92, "Ratio of retained earnings to investments"]
        - [omega0, -0.20594, "Parameter influencing the target real wage for workers"]
        - [omega1, 1, "Parameter influencing the target real wage for workers"]
        - [omega2, 2, "Parameter influencing the target real wage for workers"]
        - [omega3, 0.45621, "Speed of adjustment of wages to target value"]
        - [ADDbl, 0.02, "Spread between long-term interest rate and rate on bills"]
        - [BANDt, 0.01, "Upper range of the flat Phillips curve"]
        - [BANDb, 0.01, "Lower range of the flat Phillips curve"]
        - [bot, 0.05, "Bottom value for bank net liquidity ratio"]
        - [GRg, 0.03, "growth_mod of real government expenditures"]
        - [GRpr, 0.03, "growth_mod rate of productivity"]
        - [Nfe, 87.181, "Full employment level"]
        - [NCAR, 0.1, "Normal capital adequacy ratio of banks"]
        - [NPLk, 0.02, "Proportion of Non-Performing loans"]
        - [Rbbar, 0.035, "Interest rate on bills, set exogenously"]
        - [Rln, 0.07, "Normal interest rate on loans"]
        - [RA, 0, "Random shock to expectations on real sales"]
        - [top, 0.12, "Top value for bank net liquidity ratio"]
