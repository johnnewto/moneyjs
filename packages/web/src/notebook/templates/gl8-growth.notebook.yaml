  - run:
      id: baseline-run
      title: Baseline run
      description: Baseline GROWTH simulation with the relative hidden-equation condition B_bs = B_bd.
      mode: baseline
      periods: 350
      resultKey: gl8_growth_baseline
      sourceModelId: equations
      more: |
        The baseline is a balanced-growth reference path. By period 350, the R fixture checkpoints show `gr` close to `0.03`, matching productivity and government-expenditure growth, while `PI` is about `0.00699`.

        Use this run as the counterfactual for the scenarios below. Scenario runs start from the baseline state and then apply a Chapter 11 shock over the listed periods.
  - chart:
      id: baseline-chart
      title: Baseline steady-state checks
      more: |
        This chart focuses on ratios and rates instead of nominal levels. The baseline checkpoint at period 350 has `gr = 0.029999995893`, `BLR = 0.061789629176`, and `CAR = 0.091491631401` in the R regression fixture.

        That is the practical steady-state check: the growing economy is not stationary in levels, but the central ratios have become stable.
      variables:
        - y
        - PI
        - gr
        - BLR
        - CAR
      axisMode: separate
      axisSnapTolarance: 0.5
      seriesRanges:
        PI:
          includeZero: true
        gr:
          includeZero: true
        BLR:
          includeZero: true
        CAR:
          includeZero: true
      sourceRunCellId: baseline-run
  - table:
      id: baseline-table
      title: Baseline variable summary
      more: |
        The table gives the same baseline from a level-and-ratio perspective. Output `y`, consumption `c`, and investment `i` grow with the model, while `P`, `r_l`, `BLR`, and `CAR` help diagnose inflation, lending conditions, liquidity, and bank capital.
      variables:
        - y
        - c
        - i
        - P
        - r_l
        - BLR
        - CAR
        - GD
      sourceRunCellId: baseline-run
  - markdown:
      id: scenario-1-note
      title: "Scenario 1: An autonomous increase in wage inﬂation"
      source: "Scenario 1 follows the article's first experiment: `omega0` rises from `-0.20594` to `-0.15` from period 5, raising the target real wage."
      more: |
        In Chapter 11, wage aspiration enters through `omegat`, which depends on productivity `PR`, the employment rate `ER`, and the wage-bargaining switch variables around the employment band.

        Raising `omega0` is an autonomous upward shift in the target real wage. The immediate channel is higher wage pressure, then unit costs and prices, then consumption, output, and financial ratios through the rest of the SFC system.
  - run:
      id: scenario-1-run
      title: Higher target real wage
      mode: scenario
      scenario:
        shocks:
          - rangeInclusive:
              - 5
              - 100
            variables:
              omega0:
                kind: constant
                value: -0.15
            startPeriodInclusive: 5
            endPeriodInclusive: 100
      baselineRunCellId: baseline-run
      baselineStartPeriod: 100
      periods: 100
      resultKey: gl8_growth_s1
      sourceModelId: equations
      more: |
        This scenario starts from baseline period 100 and applies the wage-aspiration shock through period 150. The R fixture checkpoints show inflation rising to `PI = 0.011977896953` at period 10 and `PI = 0.021530213648` at period 150.

        The bank ratios move too: `CAR` is `0.092908302016` at period 10 and `0.088460918334` at period 150, while `BLR` recovers from `0.018759286216` to `0.110854870595`.
  - chart:
      id: scenario-1-chart
      title: Inflation, wage, and output, Figure 11.2A
      more: |
        Compare `PI`, `W`, `y`, and `c` to see how a wage target shock propagates. The wage adjustment is not isolated: higher wages affect unit costs, prices, regular disposable income, consumption, and the investment path.
      series:
        - expression: d(W) / W'
          label: Wage inflation
        - expression: PI
          label: Price inflation
      axisMode: shared
      axisSnapTolarance: 0.5
      sourceRunCellId: scenario-1-run
  - chart:
      id: scenario-1-figure-11-2b
      title: Demand components, Figure 11.2B
      more: |
        Figure 11.2B compares investment, consumption, and output after the wage-aspiration shock. The article plots these against the benchmark continuation; this chart overlays the baseline reference and keeps the three real quantities on separate axes.
      series:
        - expression: i
          label: Real investment
        - expression: c
          label: Real consumption
        - expression: y
          label: Real output
      axisMode: shared
      axisSnapTolarance: 0.5
      compareMode: relative
      referenceTrace: baseline
      sourceRunCellId: scenario-1-run
  - markdown:
      id: scenario-1b-note
      title: "Scenario 1B: A higher target real wage with a bill-rate increase"
      source: "Scenario 1B combines the higher target real wage with a bill-rate increase: `omega0` rises to `-0.1` and `Rbbar` rises to `0.055` from periods 5 to 150."
      more: |
        The published article uses this second experiment to reproduce Figures 11.2C and 11.2D. The interest-rate shock is paired with the wage shock so the real bill rate and output response can be compared with the textbook discussion.
  - run:
      id: scenario-1b-run
      title: Wage target plus bill-rate increase
      mode: scenario
      scenario:
        shocks:
          - rangeInclusive:
              - 5
              - 100
            variables:
              omega0:
                kind: constant
                value: -0.15
            startPeriodInclusive: 5
            endPeriodInclusive: 100
          - rangeInclusive:
              - 5
              - 100
            variables:
              Rbbar:
                kind: constant
                value: 0.055
            startPeriodInclusive: 5
            endPeriodInclusive: 100
      baselineRunCellId: baseline-run
      baselineStartPeriod: 100
      periods: 100
      resultKey: gl8_growth_s1b
      sourceModelId: equations
      more: |
        This is the article's "Scenario 1, second experiment". The local R article notes that choosing the bill-rate path required trial and error, so the browser notebook keeps the published shock values rather than treating them as a policy rule.
  - chart:
      id: scenario-1b-figure-11-2c
      title: Real bill rate, Figure 11.2C
      more: |
        The article's `Rrb` helper is `R_b - PI`: the nominal bill rate net of price inflation. This chart shows whether the combined wage and bill-rate shock leaves the real bill rate close to its starting value.
      series:
        - expression: R_b - PI
          label: Real bill rate
      axisMode: shared
      axisSnapTolarance: 0.5
