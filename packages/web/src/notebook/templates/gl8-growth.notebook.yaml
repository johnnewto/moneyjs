      sourceRunCellId: scenario-2-run
  - chart:
      id: scenario-2-figure-11-3c
      title: Deficit and debt ratios, Figure 11.3C
      more: |
        The article's `DefY` and `GDY` helpers are `PSBR / Y` and `GD / Y`. These ratios keep the fiscal response readable in a growing nominal economy.
