format: sfcr-notebook-yaml
formatVersion: 1
id: gl8-growth-notebook
title: GL8 Growth Notebook
metadata:
  version: 1
  template: gl8-growth
cells:
  - markdown:
      id: intro
      title: Overview
      source: "This notebook adapts the `gl8-growth.Rmd` article into executable browser cells. It includes the full GROWTH baseline, the balance-sheet and transactions-flow matrices, and three representative policy experiments from the article: a higher target real wage, a one-period fiscal-growth shock, and a rise in non-performing loans."
  - matrix:
      id: balance-sheet
      accountingKind: balance-sheet
      title: GROWTH balance sheet
      description: Balance-sheet matrix for model GROWTH following the gl8 article.
      note: Validated against the baseline simulation in the R vignette fixture.
      sourceRunCellId: baseline-run
      columns: [Households, Firms, Govt, Central Bank, Banks, Sum]
      sectors: [Households, Firms, Govt, Central Bank, Banks, ""]
      rows:
        - [Inventories, Inventories, "", +IN, "", "", "", +IN]
        - [Money, Fixed capital, "", +K, "", "", "", +K]
        - [Money, HPM, +H_hd, "", "", -H_s, +H_bd, "0"]
        - [Money, Money, +M_h, "", "", "", -Ms, "0"]
        - [Bills, Bills, +B_hd, "", -B_s, +B_cbd, +B_bd, "0"]
        - [Bonds, Bonds, +BL_d * P_bl, "", -BL_s * P_bl, "", "", "0"]
        - [Loans, Loans, -L_hd, -L_fd, "", "", +L_s, "0"]
        - [Equities, Equities, +e_d * Pe, -e_s * Pe, "", "", "", "0"]
        - [Liabilities, Bank capital, +OF_b, "", "", "", -OF_b, "0"]
        - [Balance, Balance, -V, -V_f, GD, "", "", -(IN + K)]
        - [Sum, Sum, "0", "0", "0", "0", "0", "0"]
  - matrix:
      id: transaction-flow
      accountingKind: transaction-flow
      title: GROWTH transactions-flow matrix
      description: Transactions-flow matrix for model GROWTH following the gl8 article.
      note: Validated against the baseline simulation in the R vignette fixture.
      sourceRunCellId: baseline-run
      columns: [Households, Firms curr., Firms cap., Govt., CB curr., CB cap., Banks curr., Banks cap., Sum]
      sectors: [Households, Firms, Firms, Govt, Central Bank, Central Bank, Banks, Banks, ""]
      rows:
        - [Consumption, Consumption, -C, +C, "", "", "", "", "", "", "0"]
        - [Government, Govt. exp., "", +G, "", -G, "", "", "", "", "0"]
        - [Investment, Investment, "", +INV, -INV, "", "", "", "", "", "0"]
        - [Inventories, Inventories, "", "+(IN - IN[-1])", "-(IN - IN[-1])", "", "", "", "", "", "0"]
        - [Taxes, Taxes, -TX, "", "", +TX, "", "", "", "", "0"]
        - [Wages, Wages, +WB, -WB, "", "", "", "", "", "", "0"]
        - [Inventories, Inventory financing cost, "", "-r_l[-1] * IN[-1]", "", "", "", "", "+r_l[-1] * IN[-1]", "", "0"]
        - [Profits, Entrepreneurial profits, +FD_f, -F_f, +FU_f, "", "", "", "+r_l[-1] * (L_fs[-1] - IN[-1] - NPL)", "", "0"]
        - [Profits, Banks profits, +FD_b, "", "", "", "", "", -F_b, +FU_b, "0"]
        - [Loans, Int. hh loans, "-r_l[-1] * L_hd[-1]", "", "", "", "", "", "+r_l[-1] * L_hs[-1]", "", "0"]
        - [Deposits, Int. deposits, "+r_m[-1] * M_h[-1]", "", "", "", "", "", "-r_m[-1] * Ms[-1]", "", "0"]
        - [Bills, Int. bills, "+R_b[-1] * B_hd[-1]", "", "", "-R_b[-1] * B_s[-1]", "+R_b[-1] * B_cbd[-1]", "", "+R_b[-1] * B_bd[-1]", "", "0"]
        - [Bonds, Int. bonds, "+BL_d[-1]", "", "", "-BL_d[-1]", "", "", "", "", "0"]
        - [Loans, Ch. loans, "+d(L_hd)", "", "+d(L_fd)", "", "", "", "", "-d(L_s)", "0"]
        - [Cash, Ch. cash, "-d(H_hd)", "", "", "", "", "+d(H_s)", "", "-d(H_bd)", "0"]
        - [Deposits, Ch. deposits, "-d(M_h)", "", "", "", "", "", "", "+d(Ms)", "0"]
        - [Bills, Ch. bills, "-d(B_hd)", "", "", "+d(B_s)", "", "-d(B_cbd)", "", "-d(B_bd)", "0"]
        - [Bonds, Ch. bonds, "-d(BL_d) * P_bl", "", "", "+d(BL_s) * P_bl", "", "", "", "", "0"]
        - [Equities, Ch. equities, "-d(e_d) * Pe", "", "+d(e_s) * Pe", "", "", "", "", "", "0"]
        - [Loans, Loan defaults, "", "", +NPL, "", "", "", "", -NPL, "0"]
        - [Sum, Sum, "0", "0", "0", "0", "0", "0", "0", "0", "0"]
  - sequence:
      id: transaction-flow-sequence
      title: GROWTH transaction flow sequence
      source:
        kind: matrix
        matrixCellId: transaction-flow
      description: Sequence view generated from the GROWTH transactions-flow matrix at the selected simulation period.
  - equations:
      id: equations
      title: GROWTH model
      modelId: equations
      collapsed: true
      rows:
        - Production and capital
        - [y, "s^e + in^e - in[-1]", "Real output"]
        - [s^e, "beta * s + (1 - beta) * s[-1] * (1 + (GRpr + RA))", "Expected real sales", "", "", "", eq-2-se]
        - [in^e, "in[-1] + gamma * (in^T - in[-1])", "Expected real inventories", "", "", "", eq-3-ine]
        - [in^T, sigmat * s^e, "Target level of real inventories", "", "", "", eq-4-int]
        - [in, "in[-1] + y - s - NPL / UC", "Real inventories"]
        - [k, "k[-1] * (1 + gr)", "Real capital stock"]
        - [gr, "gamma0 + gammau * U[-1] - gammar * RRl", "growth_mod of real capital stock"]
        - [U, "y / k[-1]", "Capital utilization proxy"]
        - [RRl, ((1 + r_l) / (1 + PI)) - 1, "Real interest rate on loans"]
        - [PI, "(P - P[-1]) / P[-1]", "Price inflation"]
        - [i, "(k - k[-1]) + delta * k[-1]", "Gross investment in real terms"]
        - Sales and nominal GDP
        - [s, c + g + i, "Real sales"]
        - [S, s * P, "Sales at current prices"]
        - [IN, in * UC, "Stock of inventories at current costs"]
        - [INV, i * P, "Gross investment"]
        - [K, k * P, "Capital stock"]
        - [Y, "s * P + (in - in[-1]) * UC", "Output at current prices (nominal GDP "]
        - Wages and unit costs
        - [omegat, exp(omega0 + omega1 * log(PR) + omega2 * log(ER + z3 * (1 - ER) - z4 * BANDt + z5 * BANDb)), "Target real wage for workers"]
        - [ER, "N[-1] / Nfe[-1]", "Employment rate"]
        - [z3a, "if (ER > (1 - BANDb)) {1} else {0}"]
        - [z3b, "if (ER <= (1 + BANDt)) {1} else {0}"]
        - [z3, z3a * z3b, "Parameter in wage aspiration equation"]
        - [z4, "if (ER > (1 + BANDt)) {1} else {0}", "Parameter in wage aspiration equation"]
        - [z5, "if (ER < (1 - BANDb)) {1} else {0}", "Parameter in wage aspiration equation"]
        - [W, "W[-1] + omega3 * (omegat * P[-1] - W[-1])", "Wage rate"]
        - [PR, "PR[-1] * (1 + GRpr)", "Lobor productivity"]
        - [Nt, y / PR, "Desired employment level"]
        - [N, "N[-1] + etan * (Nt - N[-1])", "Employment level"]
        - [WB, N * W, "The wage bill"]
        - [UC, WB / y, "Unit costs"]
        - [NUC, W / PR, "Normal unit cost"]
        - [NHUC, "(1 - sigman) * NUC + sigman * (1 + Rln[-1]) * NUC[-1]", "Normal historic unit cost"]
        - Pricing and mark-ups
        - [P, (1 + phi) * NHUC, "Price level"]
        - [phi, "phi[-1] + eps2 * (phit[-1] - phi[-1])", "Mark-up on unit costs"]
        - [phit, "(FU_f^T + FD_f + r_l[-1] * (L_fd[-1] - IN[-1])) / ((1 - sigmas^e) * s^e * UC + (1 + r_l[-1]) * sigmas^e * s^e * UC[-1])", "Ideal mark-up on unit costs"]
        - [HCe, "(1 - sigmas^e) * s^e * UC + (1 + r_l[-1]) * sigmas^e * s^e * UC[-1]", "Expected historical costs"]
        - [sigmas^e, "in[-1] / s^e", "Opening inventories to expected sales ratio", "", "", "", eq-40-sigmase]
        - [F_f^T, "FU_f^T + FD_f + r_l[-1] * (L_fd[-1] - IN[-1])", "Planned entrepreneurial profits", "", "", "", eq-41-Fft]
        - [FU_f^T, "psiu * INV[-1]", "Planned retained earnings of firms", "", "", "", eq-42-FUft]
        - [FD_f, "psid * F_f[-1]", "Dividends of firms", "", "", "", eq-43-FDf]
        - Profits and firm finance
        - [F_f, "S - WB + (IN - IN[-1]) - r_l[-1] * IN[-1]", "Realized entrepreneurial profits", "", "", "", eq-45-Ff]
        - [FU_f, "F_f - FD_f - r_l[-1] * (L_fd[-1] - IN[-1]) + r_l[-1] * NPL", "Retained earnings of firms", "", "", "", eq-46-FUf]
        - [L_fd, "L_fd[-1] + INV + (IN - IN[-1]) - FU_f - (e_s - e_s[-1]) * Pe - NPL", "Demand for loans by firms", "", "", "", eq-47-Lfd]
        - [NPL, "npl * L_fs[-1]", "Non-Performing loans"]
        - [e_s, "e_s[-1] + ((1 - psiu) * INV[-1]) / Pe", "Number of equities supplied by firms", "", "", "", eq-49-Eks]
        - [Rk, "FD_f / (Pe[-1] * e_d[-1])", "Dividend yield of firms"]
        - [PE, "Pe / (F_f / e_s[-1])", "Price earnings ratio"]
        - [Q, (e_s * Pe + L_fd) / (K + IN), "Tobin's Q"]
        - Households
        - [YP, "WB + FD_f + FD_b + r_m[-1] * M_h[-1] + R_b[-1] * B_hd[-1] + BL_s[-1]", "Personal income"]
        - [TX, theta * YP, "Taxes"]
        - [YD_r, "YP - TX - r_l[-1] * L_hd[-1]", "Regular disposable income", "", "", "", eq-56-YDr]
        - [YD_hs, YD_r + CG, "Haig-Simons measure of disposable income", "", "", "", eq-57-YDhs]
        - [CG, "(P_bl - P_bl[-1]) * BL_d[-1] + (Pe - Pe[-1]) * e_d[-1] + (OF_b - OF_b[-1])", "Capital gains on government bonds"]
        - [V, "V[-1] + YD_r - C + (P_bl - P_bl[-1]) * BL_d[-1] + (Pe - Pe[-1]) * e_d[-1] + (OF_b - OF_b[-1])", "Wealth of households"]
        - [v, V / P, "Real wealth of households"]
        - [C, c * P, "Consumption at current prices", "", "", "", eq-61-CONS]
        - [c, "alpha1 * (ydr^e + nl) + alpha2 * v[-1]", "Real consumption"]
        - [ydr^e, "eps * ydr + (1 - eps) * (ydr[-1] * (1 + GRpr))", "Expected regular real disposable income", "", "", "", eq-63-ydre]
        - [ydr, "YD_r / P - ((P - P[-1]) * v[-1]) / P", "Regular real disposable income"]
        - Household credit
        - [GL, eta * YD_r, "Gross amount of new personal loans"]
        - [eta, eta0 - etar * RRl, "Ratio of new loans to personal income"]
        - [NL, GL - REP, "Net flow of new loans to the household sector"]
        - [REP, "deltarep * L_hd[-1]", "Personal loans repayments"]
        - [L_hd, "L_hd[-1] + GL - REP", "Demand for loans by households", "", "", "", eq-70-Lhd]
        - [nl, NL / P, "Real flow of new loans to the household sector"]
        - [BUR, "(REP + r_l[-1] * L_hd[-1]) / YD_r[-1]", "Burden of personal debt"]
        - Portfolio decisions
        - [B_hd, "V_fma[-1] * (lambda20 + lambda22 * R_b[-1] - lambda21 * r_m[-1] - lambda24 * Rk[-1] - lambda23 * R_bl[-1] - lambda25 * (YD_r / V))", "Demand for government bills from households", "", "", "", eq-74-Bhd]
        - [BL_d, "V_fma[-1] * (lambda30 - lambda32 * R_b[-1] - lambda31 * r_m[-1] - lambda34 * Rk[-1] + lambda33 * R_bl[-1] - lambda35 * (YD_r / V)) / P_bl", "Demand for government bonds", "", "", "", eq-75-BLd]
        - [Pe, "V_fma[-1] * (lambda40 - lambda42 * R_b[-1] - lambda41 * r_m[-1] + lambda44 * Rk[-1] - lambda43 * R_bl[-1] - lambda45 * (YD_r / V)) / e_d", "Price of equities"]
        - [M_h, V_fma - B_hd - Pe * e_d - P_bl * BL_d + L_hd, "Deposits demanded by households", "", "", "", eq-77-Mh]
        - [V_fma, V - H_hd - OF_b, "Investible wealth of households", "", "", "", eq-78-Vfma]
        - [VfmaA, M_h + B_hd + P_bl * BL_d + Pe * e_d]
        - [H_hd, lambdac * C, "Households demand for cash"]
        - [e_d, e_s, "Number of equities demanded", "", "", "", eq-81-Ekd]
        - Government
        - [G, g * P, "Government expenditures"]
        - [g, "g[-1] * (1 + GRg)", "Real government expenditures"]
        - [PSBR, "G + BL_s[-1] + R_b[-1] * (B_bs[-1] + B_hs[-1]) - TX", "Government deficit"]
        - [B_s, "B_s[-1] + G - TX - (BL_s - BL_s[-1]) * P_bl + R_b[-1] * (B_hs[-1] + B_bs[-1]) + BL_s[-1]", "Supply of government bills", "", "", "", eq-86-Bs]
        - [GD, B_bs + B_hs + BL_s * P_bl + H_s, "Government debt"]
        - Central bank
        - [F_cb, "R_b[-1] * B_cbd[-1]", "Central bank \"profits\"", "", "", "", eq-89-Fcb]
        - [BL_s, BL_d, "Supply of government bonds", "", "", "", eq-90-BLs]
        - [B_hs, B_hd, "Government bills supplied to households", "", "", "", eq-91-Bhs]
        - [H_hs, H_hd, "Cash supplied to households", "", "", "", eq-92-Hhs]
        - [H_bs, H_bd, "Cash supplied to banks", "", "", "", eq-93-Hbs]
        - [H_s, H_bs + H_hs, "Total supply of cash", "", "", "", eq-94-Hs]
        - [B_cbd, H_s, "Government bills demanded by Central bank", "", "", "", eq-95-Bcbd]
        - [B_cbs, B_cbd, "Government bills supplied by Central bank", "", "", "", eq-96-Bcbs]
        - [R_b, Rbbar, "Interest rate on government bills", "", "", "", eq-97-Rb]
        - [R_bl, R_b + ADDbl, "Interest rate on bonds", "", "", "", eq-98-Rbl]
        - [P_bl, 1 / R_bl, "Price of government bonds", "", "", "", eq-99-Pbl]
        - Commercial banks
        - [Ms, M_h, "Deposits supplied by banks"]
        - [L_fs, L_fd, "Supply of loans to firms", "", "", "", eq-102-Lfs]
        - [L_hs, L_hd, "Loans supplied to households", "", "", "", eq-103-Lhs]
        - [H_bd, ro * Ms, "Cash required by banks", "", "", "", eq-104-Hbd]
        - [B_bs, "B_bs[-1] + (B_s - B_s[-1]) - (B_hs - B_hs[-1]) - (B_cbs - B_cbs[-1])", "Government bills supplied to commercial banks", "", "", "", eq-105-Bbs]
        - [B_bd, Ms + OF_b - L_fs - L_hs - H_bd, "Government bills demanded by commercial banks", "", "", "", eq-106-Bbd]
        - [BLR, B_bd / Ms, "Gross bank liquidity ratio"]
        - [r_m, "r_m[-1] + z1a * xim1 + z1b * xim2 - z2a * xim1 - z2b * xim2", "Interest rate on deposits", "", "", "", eq-108-Rm]
        - [z2a, "if (BLR[-1] > (top + 0.05)) {1} else {0}", "Is one if bank liquidity ratio is above top range"]
        - [z2b, "if (BLR[-1] > top) {1} else {0}", "Is one if bank liquidity ratio is above top range"]
        - [z1a, "if (BLR[-1] <= bot) {1} else {0}", "Is one if bank liquidity ratio is below bottom range"]
        - [z1b, "if (BLR[-1] <= (bot - 0.05)) {1} else {0}", "Is one if bank liquidity ratio is below bottom range"]
        - Bank profits and capital
        - [r_l, r_m + ADDl, "Interest rate on loans", "", "", "", eq-114-Rl]
        - [OFb^T, "NCAR * (L_fs[-1] + L_hs[-1])", "Long-run target for banks own funds", "", "", "", eq-115-OFbt]
        - [OFb^e, "OF_b[-1] + betab * (OFb^T - OF_b[-1])", "Short-run target for banks own funds", "", "", "", eq-116-OFbe]
        - [FU_b^T, "OFb^e - OF_b[-1] + npl^e * L_fs[-1]", "Targt retained earnings of banks", "", "", "", eq-117-FUbt]
        - [npl^e, "epsb * npl^e[-1] + (1 - epsb) * npl[-1]", "Expected proportion of Non-Performing Loans", "", "", "", eq-118-nple]
        - [FD_b, F_b - FU_b, "Dividends of banks", "", "", "", eq-119-FDb]
        - [Fb^T, "lambdab * Y[-1] + (OFb^e - OF_b[-1] + npl^e * L_fs[-1])", "Target profits of banks", "", "", "", eq-120-Fbt]
        - [F_b, "r_l[-1] * (L_fs[-1] + L_hs[-1] - NPL) + R_b[-1] * B_bd[-1] - r_m[-1] * Ms[-1]", "Realized banks profits", "", "", "", eq-121-Fb]
        - [ADDl, "(Fb^T - R_b[-1] * B_bd[-1] + r_m[-1] * (Ms[-1] - (1 - npl^e) * L_fs[-1] - L_hs[-1])) / ((1 - npl^e) * L_fs[-1] + L_hs[-1])", "Spread between interest rate on loans and rate on deposits"]
        - [FU_b, "F_b - lambdab * Y[-1]", "Retained earnings of banks", "", "", "", eq-123-FUb]
        - [OF_b, "OF_b[-1] + FU_b - NPL", "Own funds of banks", "", "", "", eq-124-OFb]
        - [CAR, OF_b / (L_fs + L_hs), "Capital adequacy ratio of banks"]
        - [V_f, IN + K - L_fd - e_d * Pe, "", "", "", "", eq-126-Vf]
        - [L_s, L_fs + L_hs, "", "", "", "", eq-127-Ls]
  - solver:
      id: solver
      title: Solver
      modelId: equations
      collapsed: true
      method: gauss-seidel
      tolerance: "1e-15"
      maxIterations: 350
      defaultInitialValue: "1e-15"
      hiddenLeftVariable: B_bs
      hiddenRightVariable: B_bd
      hiddenTolerance: "0.000001"
      relativeHiddenTolerance: true
  - externals:
      id: externals
      title: Externals
      modelId: equations
      collapsed: true
      rows:
        - [alpha1, 0.75, "Propensity to consume out of income"]
        - [alpha2, 0.064, "Propensity to consume out of wealth"]
        - [beta, 0.5, "Parameter in expectation formations on real sales"]
        - [betab, 0.4, "Spped of adjustment of banks own funds"]
        - [gamma, 0.15, "Speed of adjustment of inventories to the target level"]
        - [gamma0, 0.00122, "Exogenous growth_mod in the real stock of capital"]
        - [gammar, 0.1, "Relation between the real interest rate and growth_mod in the stock of capital"]
        - [gammau, 0.05, "Relation between the utilization rate and growth_mod in the stock of capital"]
        - [delta, 0.10667, "Rate of depreciation of fixed capital"]
        - [deltarep, 0.1, "Ratio of personal loans repayments to stock of loans"]
        - [eps, 0.5, "Parameter in expectation formations on real disposable income"]
        - [eps2, 0.8, "Speed of adjustment of mark-up"]
        - [epsb, 0.25, "Speed of adjustment in expected proportion of non-performing loans"]
        - [epsrb, 0.9, "Speed of adjustment in the real interest rate on bills"]
        - [eta0, 0.07416, "Ratio of new loans to personal income - exogenous component"]
        - [etan, 0.6, "Speed of adjustment of actual employment to desired employment"]
        - [etar, 0.4, "Relation between the ratio of new loans to personal income and the interest rate on loans"]
        - [theta, 0.22844, "Income tax rate"]
        - [lambda20, 0.25, "Parameter in households demand for bills"]
        - [lambda21, 2.2, "Parameter in households demand for bills"]
        - [lambda22, 6.6, "Parameter in households demand for bills"]
        - [lambda23, 2.2, "Parameter in households demand for bills"]
        - [lambda24, 2.2, "Parameter in households demand for bills"]
        - [lambda25, 0.1, "Parameter in households demand for bills"]
        - [lambda30, -0.04341, "Parameter in households demand for bonds"]
        - [lambda31, 2.2, "Parameter in households demand for bonds"]
        - [lambda32, 2.2, "Parameter in households demand for bonds"]
        - [lambda33, 6.6, "Parameter in households demand for bonds"]
        - [lambda34, 2.2, "Parameter in households demand for bonds"]
        - [lambda35, 0.1, "Parameter in households demand for bonds"]
        - [lambda40, 0.67132, "Parameter in households demand for equities"]
        - [lambda41, 2.2, "Parameter in households demand for equities"]
        - [lambda42, 2.2, "Parameter in households demand for equities"]
        - [lambda43, 2.2, "Parameter in households demand for equities"]
        - [lambda44, 6.6, "Parameter in households demand for equities"]
        - [lambda45, 0.1, "Parameter in households demand for equities"]
        - [lambdab, 0.0153, "Parameter determining dividends of banks"]
        - [lambdac, 0.05, "Parameter in households demand for cash"]
        - [xim1, 0.0008, "Parameter in the equation for setting interest rate on deposits"]
        - [xim2, 0.0007, "Parameter in the equation for setting interest rate on deposits"]
        - [ro, 0.05, "Reserve requirement parameter"]
        - [sigman, 0.1666, "Parameter of influencing normal historic unit costs"]
        - [sigmat, 0.2, "Target inventories to sales ratio"]
        - [psid, 0.15255, "Ratio of dividends to gross profits"]
        - [psiu, 0.92, "Ratio of retained earnings to investments"]
        - [omega0, -0.20594, "Parameter influencing the target real wage for workers"]
        - [omega1, 1, "Parameter influencing the target real wage for workers"]
        - [omega2, 2, "Parameter influencing the target real wage for workers"]
        - [omega3, 0.45621, "Speed of adjustment of wages to target value"]
        - [ADDbl, 0.02, "Spread between long-term interest rate and rate on bills"]
        - [BANDt, 0.01, "Upper range of the flat Phillips curve"]
        - [BANDb, 0.01, "Lower range of the flat Phillips curve"]
        - [bot, 0.05, "Bottom value for bank net liquidity ratio"]
        - [GRg, 0.03, "growth_mod of real government expenditures"]
        - [GRpr, 0.03, "growth_mod rate of productivity"]
        - [Nfe, 87.181, "Full employment level"]
        - [NCAR, 0.1, "Normal capital adequacy ratio of banks"]
        - [npl, 0.02, "Proportion of Non-Performing loans"]
        - [Rbbar, 0.035, "Interest rate on bills, set exogenously"]
        - [Rln, 0.07, "Normal interest rate on loans"]
        - [RA, 0, "Random shock to expectations on real sales"]
        - [top, 0.12, "Top value for bank net liquidity ratio"]
  - initial-values:
      id: initial-values
      title: Initial values
      modelId: equations
      collapsed: true
      rows:
        - [sigmas^e, 0.16667]
        - [eta, 0.04918]
        - [phi, 0.26417]
        - [phit, 0.26417]
        - [ADDbl, 0.02]
        - [BANDt, 0.01]
        - [BANDb, 0.01]
        - [bot, 0.05]
        - [GRg, 0.03]
        - [GRpr, 0.03]
        - [Nfe, 87.181]
        - [NCAR, 0.1]
        - [npl, 0.02]
        - [Rbbar, 0.035]
        - [Rln, 0.07]
        - [RA, 0]
        - [top, 0.12]
        - [ADDl, 0.04592]
        - [BLR, 0.1091]
        - [BUR, 0.06324]
        - [c, 7334240]
        - [CAR, 0.09245]
        - [C, 52603100]
        - [ER, 1]
        - [F_b, 1744130]
        - [Fb^T, 1744140]
        - [F_f, 18081100]
        - [F_f^T, 18013600]
        - [FD_b, 1325090]
        - [FD_f, 2670970]
        - [FU_b, 419039]
        - [FU_f, 15153800]
