  - markdown:
      id: scenario-10-note
      title: "Scenario 10: Banks capital adequacy ratios"
      source: "Scenario 10 raises non-performing loans as in the article: `npl` rises from `0.02` to `0.05` from periods 10 to 150."
      more: |
        The Chapter 11 banking block treats defaults as both a flow loss and an expectation problem. Actual non-performing loans are `NPL = npl * L_fs[-1]`, expected default intensity evolves through `npl^e`, and banks use that expectation when setting target retained earnings and loan spreads.

        This makes the shock a balance-sheet stress experiment. It lowers bank own funds through `OF_b = OF_b[-1] + (FU_b - NPL) * dt`, changes the target profit calculation, and eventually feeds into the lending rate `r_l`.
  - run:
      id: scenario-10-run
      title: Higher non-performing loans
      mode: scenario
      scenario:
        shocks:
          - rangeInclusive:
              - 10
              - 100
            variables:
              npl:
                kind: constant
                value: 0.05
            startPeriodInclusive: 10
            endPeriodInclusive: 100
      baselineRunCellId: baseline-run
      periods: 100
      resultKey: gl8_growth_s10
      sourceModelId: equations
      baselineStartPeriod: 100
      more: |
        The R fixture shows the stress clearly. At period 10, `CAR = 0.078014236581`; by period 150, `r_l = 0.079990862443`, `BLR = 0.102248956781`, and `PI = -0.000108494375`.

        The shock is temporary, but expectations and accumulated bank capital make the response persistent. Use this run to inspect how the commercial-bank block transmits credit losses into interest rates and real activity.
  - chart:
      id: scenario-10-chart
      title: Capital adequacy, Figure 11.11A
      more: |
        The chart places the direct default flow `NPL` beside bank capital adequacy `CAR`, the loan rate `r_l`, and bank own funds `OF_b`. This is the banking channel that distinguishes Chapter 11 from simpler growth models without commercial-bank capital.
      series:
        - expression: CAR
          label: Capital adequacy ratio
      axisMode: shared
      axisSnapTolarance: 0.5
      sourceRunCellId: scenario-10-run
  - chart:
      id: scenario-10-figure-11-11b
      title: Deposit and loan rates, Figure 11.11B
      more: |
        Figure 11.11B follows the interest-rate response to higher non-performing loans. Expected defaults raise banks' desired retained earnings and feed into the lending spread.
