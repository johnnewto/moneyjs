  - id: scenario-1-note
    type: markdown
    title: Scenario 1
    source: |-
      # Scenario 1 follows the article's first experiment: `omega0` rises from `-0.20594` to `-0.1` from periods 5 to 150, raising the target real wage.
      - [x] Write the press release
      - [ ] Update the website
      - [ ] Contact the media
  - id: scenario-1-run
    type: run
    title: "Scenario 1: higher target real wage"
    mode: scenario
    scenario:
      shocks:
        - variables:
            omega0:
              kind: constant
              value: -0.1
          rangeInclusive:
            - 5
            - 150
    baselineRunCellId: baseline-run
    baselineStartPeriod: 100
    periods: 250
    resultKey: gl8_growth_s1
    sourceModelId: equations
  - id: scenario-1-chart
    type: chart
    title: Scenario 1 inflation, wage, and output
    sourceRunCellId: scenario-1-run
    variables:
      - PI
      - W
      - Yk
      - Ck
    axisMode: separate
    axisSnapTolarance: 0.5
    seriesRanges:
      PI:
        includeZero: true
  - id: scenario-2-note
    type: markdown
    title: Scenario 2
    source: "Scenario 2 applies the one-period fiscal-growth shock from the article: `GRg` rises from `0.03` to `0.035` for periods 10 to 11."
  - id: scenario-2-run
    type: run
    title: "Scenario 2: one-period fiscal growth shock"
    mode: scenario
    scenario:
      shocks:
        - variables:
            GRg:
              kind: constant
              value: 0.035
          rangeInclusive:
            - 10
            - 11
    baselineRunCellId: baseline-run
    periods: 350
    resultKey: gl8_growth_s2
    sourceModelId: equations
