equations: |-
  # Real output
  Yk ~ Ske + INke - INk[-1]

  # Expected real sales
  Ske ~ beta * Sk + (1 - beta) * Sk[-1] * (1 + (GRpr + RA))

  # Expected real inventories
  INke ~ INk[-1] + gamma * (INkt - INk[-1])

  # Target level of real inventories
  INkt ~ sigmat * Ske

  # Real inventories
  INk ~ INk[-1] + Yk - Sk - NPL / UC

  # Real capital stock
  Kk ~ Kk[-1] * (1 + GRk)

  # growth_mod of real capital stock
  GRk ~ gamma0 + gammau * U[-1] - gammar * RRl

  # Capital utilization proxy
  U ~ Yk / Kk[-1]

  # Real interest rate on loans
  RRl ~ ((1 + Rl) / (1 + PI)) - 1

  # Price inflation
  PI ~ (P - P[-1]) / P[-1]

  # Gross investment in real terms
  Ik ~ (Kk - Kk[-1]) + delta * Kk[-1]

  # Real sales
  Sk ~ Ck + Gk + Ik

  # Sales at current prices
  S ~ Sk * P

  # Stock of inventories at current costs
  IN ~ INk * UC

  # Gross investment
  INV ~ Ik * P

  # Capital stock
  K ~ Kk * P

  # Output at current prices (nominal GDP 
  Y ~ Sk * P + (INk - INk[-1]) * UC

  # Target real wage for workers
  omegat ~ exp(omega0 + omega1 * log(PR) + omega2 * log(ER + z3 * (1 - ER) - z4 * BANDt + z5 * BANDb))

  # Employment rate
  ER ~ N[-1] / Nfe[-1]

  z3a ~ if (ER > (1 - BANDb)) {1} else {0}

  z3b ~ if (ER <= (1 + BANDt)) {1} else {0}

  # Parameter in wage aspiration equation
  z3 ~ z3a * z3b

  # Parameter in wage aspiration equation
  z4 ~ if (ER > (1 + BANDt)) {1} else {0}

  # Parameter in wage aspiration equation
  z5 ~ if (ER < (1 - BANDb)) {1} else {0}

  # Wage rate
  W ~ W[-1] + omega3 * (omegat * P[-1] - W[-1])

  # Lobor productivity
  PR ~ PR[-1] * (1 + GRpr)

  # Desired employment level
  Nt ~ Yk / PR

  # Employment level
  N ~ N[-1] + etan * (Nt - N[-1])

  # The wage bill
  WB ~ N * W

  # Unit costs
  UC ~ WB / Yk

  # Normal unit cost
  NUC ~ W / PR

  # Normal historic unit cost
  NHUC ~ (1 - sigman) * NUC + sigman * (1 + Rln[-1]) * NUC[-1]

  # Price level
  P ~ (1 + phi) * NHUC

  # Mark-up on unit costs
  phi ~ phi[-1] + eps2 * (phit[-1] - phi[-1])

  # Ideal mark-up on unit costs
  phit ~ (FUft + FDf + Rl[-1] * (Lfd[-1] - IN[-1])) / ((1 - sigmase) * Ske * UC + (1 + Rl[-1]) * sigmase * Ske * UC[-1])

  # Expected historical costs
  HCe ~ (1 - sigmase) * Ske * UC + (1 + Rl[-1]) * sigmase * Ske * UC[-1]

  # Opening inventories to expected sales ratio
  sigmase ~ INk[-1] / Ske

  # Planned entrepreneurial profits
  Fft ~ FUft + FDf + Rl[-1] * (Lfd[-1] - IN[-1])

  # Planned retained earnings of firms
  FUft ~ psiu * INV[-1]

  # Dividends of firms
  FDf ~ psid * Ff[-1]

  # Realized entrepreneurial profits
  Ff ~ S - WB + (IN - IN[-1]) - Rl[-1] * IN[-1]

  # Retained earnings of firms
  FUf ~ Ff - FDf - Rl[-1] * (Lfd[-1] - IN[-1]) + Rl[-1] * NPL

  # Demand for loans by firms
  Lfd ~ Lfd[-1] + INV + (IN - IN[-1]) - FUf - (Eks - Eks[-1]) * Pe - NPL

  # Non-Performing loans
  NPL ~ NPLk * Lfs[-1]

  # Number of equities supplied by firms
  Eks ~ Eks[-1] + ((1 - psiu) * INV[-1]) / Pe

  # Dividend yield of firms
  Rk ~ FDf / (Pe[-1] * Ekd[-1])

  # Price earnings ratio
  PE ~ Pe / (Ff / Eks[-1])

  # Tobin's Q
  Q ~ (Eks * Pe + Lfd) / (K + IN)

  # Personal income
  YP ~ WB + FDf + FDb + Rm[-1] * Mh[-1] + Rb[-1] * Bhd[-1] + BLs[-1]

  # Taxes
  TX ~ theta * YP

  # Regular disposable income
  YDr ~ YP - TX - Rl[-1] * Lhd[-1]

  # Haig-Simons measure of disposable income
  YDhs ~ YDr + CG

  # Capital gains on government bonds
  CG ~ (Pbl - Pbl[-1]) * BLd[-1] + (Pe - Pe[-1]) * Ekd[-1] + (OFb - OFb[-1])

  # Wealth of households
  V ~ V[-1] + YDr - CONS + (Pbl - Pbl[-1]) * BLd[-1] + (Pe - Pe[-1]) * Ekd[-1] + (OFb - OFb[-1])

  # Real wealth of households
  Vk ~ V / P

  # Consumption at current prices
  CONS ~ Ck * P

  # Real consumption
  Ck ~ alpha1 * (YDkre + NLk) + alpha2 * Vk[-1]

  # Expected regular real disposable income
  YDkre ~ eps * YDkr + (1 - eps) * (YDkr[-1] * (1 + GRpr))

  # Regular real disposable income
  YDkr ~ YDr / P - ((P - P[-1]) * Vk[-1]) / P

  # Gross amount of new personal loans
  GL ~ eta * YDr

  # Ratio of new loans to personal income
  eta ~ eta0 - etar * RRl

  # Net flow of new loans to the household sector
  NL ~ GL - REP

  # Personal loans repayments
  REP ~ deltarep * Lhd[-1]

  # Demand for loans by households
  Lhd ~ Lhd[-1] + GL - REP

  # Real flow of new loans to the household sector
  NLk ~ NL / P

  # Burden of personal debt
  BUR ~ (REP + Rl[-1] * Lhd[-1]) / YDr[-1]

  # Demand for government bills from households
  Bhd ~ Vfma[-1] * (lambda20 + lambda22 * Rb[-1] - lambda21 * Rm[-1] - lambda24 * Rk[-1] - lambda23 * Rbl[-1] - lambda25 * (YDr / V))

  # Demand for government bonds
  BLd ~ Vfma[-1] * (lambda30 - lambda32 * Rb[-1] - lambda31 * Rm[-1] - lambda34 * Rk[-1] + lambda33 * Rbl[-1] - lambda35 * (YDr / V)) / Pbl

  # Price of equities
  Pe ~ Vfma[-1] * (lambda40 - lambda42 * Rb[-1] - lambda41 * Rm[-1] + lambda44 * Rk[-1] - lambda43 * Rbl[-1] - lambda45 * (YDr / V)) / Ekd

  # Deposits demanded by households
  Mh ~ Vfma - Bhd - Pe * Ekd - Pbl * BLd + Lhd

  # Investible wealth of households
  Vfma ~ V - Hhd - OFb

  VfmaA ~ Mh + Bhd + Pbl * BLd + Pe * Ekd

  # Households demand for cash
  Hhd ~ lambdac * CONS

  # Number of equities demanded
  Ekd ~ Eks

  # Government expenditures
  G ~ Gk * P

  # Real government expenditures
  Gk ~ Gk[-1] * (1 + GRg)

  # Government deficit
  PSBR ~ G + BLs[-1] + Rb[-1] * (Bbs[-1] + Bhs[-1]) - TX

  # Supply of government bills
  Bs ~ Bs[-1] + G - TX - (BLs - BLs[-1]) * Pbl + Rb[-1] * (Bhs[-1] + Bbs[-1]) + BLs[-1]

  # Government debt
  GD ~ Bbs + Bhs + BLs * Pbl + Hs

  # Central bank "profits"
  Fcb ~ Rb[-1] * Bcbd[-1]

  # Supply of government bonds
  BLs ~ BLd

  # Government bills supplied to households
  Bhs ~ Bhd

  # Cash supplied to households
  Hhs ~ Hhd

  # Cash supplied to banks
  Hbs ~ Hbd

  # Total supply of cash
  Hs ~ Hbs + Hhs

  # Government bills demanded by Central bank
  Bcbd ~ Hs

  # Government bills supplied by Central bank
  Bcbs ~ Bcbd

  # Interest rate on government bills
  Rb ~ Rbbar

  # Interest rate on bonds
  Rbl ~ Rb + ADDbl

  # Price of government bonds
  Pbl ~ 1 / Rbl

  # Deposits supplied by banks
  Ms ~ Mh

  # Supply of loans to firms
  Lfs ~ Lfd

  # Loans supplied to households
  Lhs ~ Lhd

  # Cash required by banks
  Hbd ~ ro * Ms

  # Government bills supplied to commercial banks
  Bbs ~ Bbs[-1] + (Bs - Bs[-1]) - (Bhs - Bhs[-1]) - (Bcbs - Bcbs[-1])

  # Government bills demanded by commercial banks
  Bbd ~ Ms + OFb - Lfs - Lhs - Hbd

  # Gross bank liquidity ratio
  BLR ~ Bbd / Ms

  # Interest rate on deposits
  Rm ~ Rm[-1] + z1a * xim1 + z1b * xim2 - z2a * xim1 - z2b * xim2

  # Is one if bank liquidity ratio is above top range
  z2a ~ if (BLR[-1] > (top + 0.05)) {1} else {0}

  # Is one if bank liquidity ratio is above top range
  z2b ~ if (BLR[-1] > top) {1} else {0}

  # Is one if bank liquidity ratio is below bottom range
  z1a ~ if (BLR[-1] <= bot) {1} else {0}

  # Is one if bank liquidity ratio is below bottom range
  z1b ~ if (BLR[-1] <= (bot - 0.05)) {1} else {0}

  # Interest rate on loans
  Rl ~ Rm + ADDl

  # Long-run target for banks own funds
  OFbt ~ NCAR * (Lfs[-1] + Lhs[-1])

  # Short-run target for banks own funds
  OFbe ~ OFb[-1] + betab * (OFbt - OFb[-1])

  # Targt retained earnings of banks
  FUbt ~ OFbe - OFb[-1] + NPLke * Lfs[-1]

  # Expected proportion of Non-Performing Loans
  NPLke ~ epsb * NPLke[-1] + (1 - epsb) * NPLk[-1]

  # Dividends of banks
  FDb ~ Fb - FUb

  # Target profits of banks
  Fbt ~ lambdab * Y[-1] + (OFbe - OFb[-1] + NPLke * Lfs[-1])

  # Realized banks profits
  Fb ~ Rl[-1] * (Lfs[-1] + Lhs[-1] - NPL) + Rb[-1] * Bbd[-1] - Rm[-1] * Ms[-1]

  # Spread between interest rate on loans and rate on deposits
  ADDl ~ (Fbt - Rb[-1] * Bbd[-1] + Rm[-1] * (Ms[-1] - (1 - NPLke) * Lfs[-1] - Lhs[-1])) / ((1 - NPLke) * Lfs[-1] + Lhs[-1])

  # Retained earnings of banks
  FUb ~ Fb - lambdab * Y[-1]

  # Own funds of banks
  OFb ~ OFb[-1] + FUb - NPL

  # Capital adequacy ratio of banks
  CAR ~ OFb / (Lfs + Lhs)

  Vf ~ IN + K - Lfd - Ekd * Pe

  Ls ~ Lfs + Lhs
equationCell:
  id: equations
  title: GROWTH model
  collapsed: true
balance:
  id: balance-sheet
  title: GROWTH balance sheet
  description: Balance-sheet matrix for model GROWTH following the gl8 article.
  note: Validated against the baseline simulation in the R vignette fixture.
  columns: [Households, Firms, Govt, Central Bank, Banks, Sum]
  sectors: [Households, Firms, Govt, Central Bank, Banks, ""]
  rows:
    - [Inventories, Inventories, "", +IN, "", "", "", +IN]
    - [Money, Fixed capital, "", +K, "", "", "", +K]
    - [Money, HPM, +Hhd, "", "", -Hs, +Hbd, "0"]
    - [Money, Money, +Mh, "", "", "", -Ms, "0"]
    - [Bills, Bills, +Bhd, "", -Bs, +Bcbd, +Bbd, "0"]
    - [Bonds, Bonds, +BLd * Pbl, "", -BLs * Pbl, "", "", "0"]
    - [Loans, Loans, -Lhd, -Lfd, "", "", +Ls, "0"]
    - [Equities, Equities, +Ekd * Pe, -Eks * Pe, "", "", "", "0"]
    - [Liabilities, Bank capital, +OFb, "", "", "", -OFb, "0"]
    - [Balance, Balance, -V, -Vf, GD, "", "", -(IN + K)]
    - [Sum, Sum, "0", "0", "0", "0", "0", "0"]
transactions:
  id: transaction-flow
  title: GROWTH transactions-flow matrix
  description: Transactions-flow matrix for model GROWTH following the gl8 article.
  note: Validated against the baseline simulation in the R vignette fixture.
  columns: [Households, Firms curr., Firms cap., Govt., CB curr., CB cap., Banks curr., Banks cap., Sum]
  sectors: [Households, Firms, Firms, Govt, Central Bank, Central Bank, Banks, Banks, ""]
  rows:
    - [Consumption, Consumption, -CONS, +CONS, "", "", "", "", "", "", "0"]
    - [Government, Govt. exp., "", +G, "", -G, "", "", "", "", "0"]
    - [Investment, Investment, "", +INV, -INV, "", "", "", "", "", "0"]
    - [Inventories, Inventories, "", "+(IN - IN[-1])", "-(IN - IN[-1])", "", "", "", "", "", "0"]
    - [Taxes, Taxes, -TX, "", "", +TX, "", "", "", "", "0"]
    - [Wages, Wages, +WB, -WB, "", "", "", "", "", "", "0"]
    - [Inventories, Inventory financing cost, "", "-Rl[-1] * IN[-1]", "", "", "", "", "+Rl[-1] * IN[-1]", "", "0"]
    - [Profits, Entrepreneurial profits, +FDf, -Ff, +FUf, "", "", "", "+Rl[-1] * (Lfs[-1] - IN[-1] - NPL)", "", "0"]
    - [Profits, Banks profits, +FDb, "", "", "", "", "", -Fb, +FUb, "0"]
    - [Loans, Int. hh loans, "-Rl[-1] * Lhd[-1]", "", "", "", "", "", "+Rl[-1] * Lhs[-1]", "", "0"]
    - [Deposits, Int. deposits, "+Rm[-1] * Mh[-1]", "", "", "", "", "", "-Rm[-1] * Ms[-1]", "", "0"]
    - [Bills, Int. bills, "+Rb[-1] * Bhd[-1]", "", "", "-Rb[-1] * Bs[-1]", "+Rb[-1] * Bcbd[-1]", "", "+Rb[-1] * Bbd[-1]", "", "0"]
    - [Bonds, Int. bonds, "+BLd[-1]", "", "", "-BLd[-1]", "", "", "", "", "0"]
    - [Loans, Ch. loans, "+(Lhd - Lhd[-1])", "", "+(Lfd - Lfd[-1])", "", "", "", "", "-(Ls - Ls[-1])", "0"]
    - [Cash, Ch. cash, "-(Hhd - Hhd[-1])", "", "", "", "", "+(Hs - Hs[-1])", "", "-(Hbd - Hbd[-1])", "0"]
    - [Deposits, Ch. deposits, "-(Mh - Mh[-1])", "", "", "", "", "", "", "+(Ms - Ms[-1])", "0"]
    - [Bills, Ch. bills, "-(Bhd - Bhd[-1])", "", "", "+(Bs - Bs[-1])", "", "-(Bcbd - Bcbd[-1])", "", "-(Bbd - Bbd[-1])", "0"]
    - [Bonds, Ch. bonds, "-(BLd - BLd[-1]) * Pbl", "", "", "+(BLs - BLs[-1]) * Pbl", "", "", "", "", "0"]
    - [Equities, Ch. equities, "-(Ekd - Ekd[-1]) * Pe", "", "+(Eks - Eks[-1]) * Pe", "", "", "", "", "", "0"]
    - [Loans, Loan defaults, "", "", +NPL, "", "", "", "", -NPL, "0"]
    - [Sum, Sum, "0", "0", "0", "0", "0", "0", "0", "0", "0"]
parameters:
  alpha1: 0.75
  alpha2: 0.064
  beta: 0.5
  betab: 0.4
  gamma: 0.15
  gamma0: 0.00122
  gammar: 0.1
  gammau: 0.05
  delta: 0.10667
  deltarep: 0.1
