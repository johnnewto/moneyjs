            - "0"
        - label: Bills
          values:
            - +Bhh
            - ""
            - -Bs
            - +Bcb
            - +Bbd
            - "0"
        - label: Bonds
          values:
            - +BLh * pbl
            - ""
            - -BLs * pbl
            - ""
            - ""
            - "0"
        - label: Loans
          values:
            - ""
            - -Ld
            - ""
            - ""
            - +Ls
            - "0"
        - label: Balance
          values:
            - -V
            - "0"
            - +GD
            - "0"
            - "0"
            - -INV
        - [Sum, Sum, "0", "0", "0", "0", "0", "0"]
      more: |
        This is the INSOUT **balance sheet** (Table 10.1 in Godley & Lavoie). Read down a
        column to see a sector's wealth; read across a row to see who holds and who issues
        each asset. Every row sums to zero (one sector's asset is another's liability) and
        the bottom row confirms every column closes.

        - **Households** are the wealth-owners. Their net worth `V ≈ 131` is held as a
          _portfolio_: cash `Hhd ≈ 13.1`, checking deposits `M1h ≈ 3.5`, time deposits
          `M2h ≈ 35.1`, Treasury bills `Bhh ≈ 46.8` and long bonds `BLh * pbl ≈ 32.8`.
          This menu — absent in DIS — is the whole point of the model.
        - **Firms** own **inventories** `INV ≈ 33.3` (the only tangible asset) financed
          one-for-one by bank **loans** `Ld ≈ 33.3`, so their net worth is zero.
        - **Government** has negative net worth: its outstanding bills `Bs` and bonds
          `BLs` are the public debt `GD ≈ 98`.
        - **Central bank** holds bills `Bcb` and advances `As` as assets and issues
          high-powered money `Hs` (the **outside money**) as its liability.
        - **Banks** hold loans `Ls`, bills `Bbd` and required reserves `Hbd` against their
          deposit liabilities `M1s + M2s`, topping up with central-bank advances `Ad` when
          short; like firms they carry no net worth.

        The contrast that names the model is visible here: `Hs` (a state liability) is
        **outside money**, while `M1` and `M2` (banking-system liabilities created by
        lending) are **inside money**. Household financial wealth is, ultimately, claims on
        the goods in firms' warehouses plus the government's debt.
  - matrix:
      id: transaction-flow
      sourceRunCellId: baseline-run
      title: INSOUT transactions-flow matrix
      description: Transactions-flow matrix for model INSOUT following the gl7 article.
      note: Validated against the baseline simulation in the R vignette fixture.
      columns: [Households, Firms current, Firms capital, Government, CB current, CB capital, Banks current, Banks capital, Sum]
      sectors: [Households, Production firms, Production firms, Government, Central bank, Central bank, Banks, Banks, ""]
      accountingKind: transaction-flow
      rows:
        - [Consumption, Consumption, -C, +C, "", "", "", "", "", "", "0"]
        - [Government, Govt. expenditures, "", +G, "", -G, "", "", "", "", "0"]
        - [Inventories, Change inventories, "", +d(INV), -d(INV), "", "", "", "", "", "0"]
        - [Taxes, Taxes, "", -TX, "", +TX, "", "", "", "", "0"]
        - [Wages, Wages, +WB, -WB, "", "", "", "", "", "", "0"]
        - [Profits, Entrepreneurial profits, +FXf, -FXf, "", "", "", "", "", "", "0"]
        - [Profits, Bank profits, +FXb, "", "", "", "", "", -FXb, "", "0"]
        - [Profits, CB profits, "", "", "", +FXcb, -FXcb, "", "", "", "0"]
        - [Interest, Interest advances, "", "", "", "", +lag(ra) * lag(As), "", -lag(ra) * lag(Ad), "", "0"]
        - [Interest, Interest loans, "", -lag(rl) * lag(Ld), "", "", "", "", +lag(rl) * lag(Ld), "", "0"]
        - [Interest, Interest deposits, +lag(rm) * lag(M2h), "", "", "", "", "", -lag(rm) * lag(M2h), "", "0"]
        - [Interest, Interest bills, +lag(rb) * lag(Bhh), "", "", -lag(rb) * lag(Bs), +lag(rb) * lag(Bcb), "", +lag(rb) * lag(Bbd), "", "0"]
        - [Interest, Interest bonds, +lag(BLh), "", "", -lag(BLs), "", "", "", "", "0"]
        - [Advances, Change advances, "", "", "", "", "", -d(As), "", +d(Ad), "0"]
        - [Loans, Change loans, "", "", +d(Ld), "", "", "", "", -d(Ls), "0"]
        - [Money, Change cash, -d(Hhh), "", "", "", "", +d(Hs), "", -d(Hbd), "0"]
        - [Money, Change M1, -d(M1h), "", "", "", "", "", "", +d(M1s), "0"]
        - [Money, Change M2, -d(M2h), "", "", "", "", "", "", +d(M2s), "0"]
        - [Bills, Change bills, -d(Bhh), "", "", +d(Bs), "", -d(Bcb), "", -d(Bbd), "0"]
        - [Bonds, Change bonds, -d(BLh) * pbl, "", "", +d(BLs) * pbl, "", "", "", "", "0"]
        - [Sum, Sum, "0", "0", "0", "0", "0", "0", "0", "0", "0"]
      more: |
        The **transactions-flow matrix** (Table 10.2 in Godley & Lavoie) is where INSOUT's
        stock-flow consistency is enforced. As in DIS, firms, the central bank and banks
        each get a _current_ account (income and spending) and a _capital_ account
        (financing), giving the wide nine-column layout. Every row sums to zero (each flow
        has a payer and a payee) and every column sums to zero (each account's budget
        constraint), and the matrix has many more rows than DIS because there are now many
        more assets to pay interest on and to revalue.

        The top block is the **income-expenditure circuit**: consumption `C`, government
        spending `G`, the change in inventories `d(INV)`, taxes `TX`, wages `WB`, and three
        kinds of distributed profit — entrepreneurial `FXf`, bank `FXb`, and central-bank
        `FXcb`. Crucially the central bank rebates its profit to the **government**, which
        is why `FXcb` lands in the government column.

        The **interest block** pays last period's rate on last period's stock — note every
        entry uses `lag(...)` — for advances, loans, time deposits, bills and bonds. This
        is the web of interest income that DIS lacked: households earn on `M2h`, `Bhh` and
        `BLh`; firms pay on loans; the government pays on bills and bonds; banks earn the
        spread and pay for advances.

        The bottom block turns flows back into **stock changes**: `d(As)`, `d(Ld)`,
        `d(Hh)`, `d(M1)`, `d(M2)`, `d(Bh)` and `d(BL)`. These rows are the model's flow of
        funds — every sector's saving is placed into, or financed by, some financial
        instrument, and the columns confirm no sector can spend money it has not raised.
