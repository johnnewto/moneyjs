format: sfcr-notebook-yaml
formatVersion: 1
id: gl7-insout-v2
title: GL7 INSOUT-v2
metadata:
  version: 1
  template: gl7-insout
cells:
  - markdown:
      id: intro
      title: Overview
      source: "This notebook adapts the `gl7-insout.Rmd` article into executable browser cells. It includes the INSOUT balance-sheet and transactions-flow matrices, the full baseline model, and three representative simulations from the article: higher targeted inventories, higher government expenditure, and the combined inflation-plus-interest-rate experiment."
      more: |
        **INSOUT** is Godley & Lavoie's _"model with both inside and outside money"_
        (_Monetary Economics_, 2007, chapter 10). It is the most complete model in the
        book short of the growth model: it takes the production-and-inventories economy
        of chapter 9 (model DIS) and bolts on a full **financial system** with a menu of
        assets, an active **banking sector**, a **central bank**, and a government that
        funds itself with bills and bonds.

        The name captures the central theme. **Outside money** is the liability of the
        state — high-powered money `Hs` (households' cash plus banks' reserves), created
        when the central bank buys government bills or lends to banks. **Inside money** is
        the liability of the banking system — the **checking deposits** `M1` and **time
        deposits** `M2` that come into existence when banks make **loans** to firms.
        INSOUT lets the two kinds of money coexist and interact.

        Four things are genuinely new relative to DIS:

        - **A portfolio of assets.** Households no longer hold a single deposit. They
          spread wealth across cash, `M1`, `M2`, Treasury bills `Bhh` and long bonds
          `BLh` using a Tobinesque demand system (the `lambda` matrix), so _relative
          interest rates_ now allocate wealth.
        - **An active banking sector.** Banks set both the **deposit rate** `rm` and the
          **loan rate** `rl` themselves, nudging them up or down to keep their liquidity
          ratio and profit margin inside target bands.
        - **A central bank and a Treasury.** The government issues bills `Bs` and bonds
          `BLs`; the central bank buys bills, supplies advances `As` to banks, and rebates
          its profit to the Treasury. Monetary policy is the exogenous **bill rate** `rb`.
        - **Endogenous inflation near full employment.** Money wages chase a target real
          wage that rises with the employment ratio `N / Nfe`, so demand pressure turns
          into a wage-price spiral — the mechanism behind Simulations 2 and 7.

        The baseline settles essentially at full employment (`N ≈ 133.2` against
        `Nfe = 133.28`) with a stable price level (`p ≈ 1.21`) and near-zero inflation.
        As in every G&L model one equation is **redundant**: here the banks' demand for
        reserves equals the supply, `Hbd = Hbs`, which the solver checks rather than
        imposes.
