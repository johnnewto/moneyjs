  W: 1
  UC: 1
  BPM: 0.0035
  rb: 1e-15
initialValuesCell:
  id: initial-values-equations
  collapsed: true
solver:
  method: gauss-seidel
  tolerance: "1e-15"
  maxIterations: 400
  defaultInitialValue: "1e-15"
  hiddenLeftVariable: Hbd
  hiddenRightVariable: Hbs
  hiddenTolerance: "0.00001"
  relativeHiddenTolerance: false
solverCell:
  id: solver
  title: Solver
  collapsed: true
baselineRun:
  id: baseline-run
  title: Baseline run
  description: Baseline INSOUT simulation with the hidden-equation condition Hbd = Hbs.
  resultKey: gl7_insout_baseline
  periods: 210
charts:
  - id: baseline-chart
    title: Baseline steady-state checks
    variables:
      - Y
      - pi
      - BLRN
      - BPM
    axisMode: separate
    axisSnapTolarance: 0.5
    seriesRanges:
      pi:
        includeZero: true
      BLRN:
        includeZero: true
      BPM:
        includeZero: true
tables:
  - id: baseline-table
    title: Baseline variable summary
    variables:
      - y
      - s
      - p
      - V
      - INV
      - BLRN
      - BPM
cells:
  - id: transaction-flow-sequence
    type: sequence
    title: INSOUT transaction flow sequence
    source:
      kind: matrix
      matrixCellId: transaction-flow
    description: Sequence view generated from the INSOUT transactions-flow matrix at the selected simulation period.
  - id: scenario-1-note
    type: markdown
    title: Simulation 1
    source: Simulation 1 raises `sigma0` from `0.3612` to `0.4` between periods 5 and 70, increasing the targeted inventories-to-sales ratio through the `sigmaT` rule.
  - id: scenario-1-run
    type: run
    title: "Simulation 1: targeted inventories shock"
    mode: scenario
    scenario:
      shocks:
        - rangeInclusive:
            - 5
            - 70
          variables:
            sigma0:
              kind: constant
              value: 0.4
    baselineRunCellId: baseline-run
    periods: 70
    resultKey: gl7_insout_s1
    sourceModelId: equations
  - id: scenario-1-chart
    type: chart
    title: Simulation 1 inventories and rates
    sourceRunCellId: scenario-1-run
    variables:
      - INV
      - Ls
      - rm
      - rb
    axisMode: separate
    axisSnapTolarance: 0.5
    seriesRanges:
      rm:
        includeZero: true
      rb:
        includeZero: true
  - id: scenario-2-note
    type: markdown
    title: Simulation 2
    source: Simulation 2 raises real government expenditure `g` from `25` to `30` between periods 5 and 55.
  - id: scenario-2-run
    type: run
    title: "Simulation 2: government expenditure shock"
    mode: scenario
    scenario:
      shocks:
        - rangeInclusive:
            - 5
            - 55
          variables:
            g:
              kind: constant
              value: 30
    baselineRunCellId: baseline-run
    baselineStartPeriod: 60
    periods: 55
    resultKey: gl7_insout_s2
    sourceModelId: equations
  - id: scenario-2-chart
    type: chart
    title: Simulation 2 income, wealth, and inflation
    sourceRunCellId: scenario-2-run
    variables:
      - c
      - v
      - ydr
      - pi
    axisMode: separate
    axisSnapTolarance: 0.5
    seriesRanges:
      pi:
        includeZero: true
  - id: scenario-7-note
    type: markdown
    title: Simulation 7
    source: "Simulation 7 combines a higher target real wage with higher bill and bond rates: `Omega0` rises from `-0.32549` to `-0.2` during periods 4 to 55, while `rb` rises from `0.023` to `0.03` and `rbl` rises from `0.027` to `0.039` during periods 5 to 55."
  - id: scenario-7-run
    type: run
    title: "Simulation 7: inflation and rate shock"
    mode: scenario
    scenario:
      shocks:
        - rangeInclusive:
            - 4
            - 55
          variables:
            Omega0:
              kind: constant
              value: -0.2
        - rangeInclusive:
            - 5
            - 55
          variables:
            rb:
              kind: constant
              value: 0.03
            rbl:
