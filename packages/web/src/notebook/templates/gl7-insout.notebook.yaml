equations: |-
  # Output determined by expected sales and inventory adjustment.
  y ~ sE + (invE - lag(inv))

  # Employment from output and productivity.
  N ~ y / pr

  # Wage bill.
  WB ~ N * W

  # Unit cost.
  UC ~ WB / y

  # Expected sales formed adaptively.
  sE ~ beta * lag(s) + (1 - beta) * lag(sE)

  # Target inventory stock.
  invT ~ sigmaT * sE

  # Target inventory-sales ratio responds to the loan rate.
  sigmaT ~ sigma0 - sigma1 * rl

  # Expected inventory stock.
  invE ~ lag(inv) + gamma * (invT - lag(inv))

  # Price level.
  p ~ (1 + tau) * (1 + phi) * NHUC

  # Normalized historic unit cost.
  NHUC ~ (1 - sigmaT) * UC + sigmaT * (1 + lag(rl)) * lag(UC)

  # Real sales.
  s ~ c + g

  # Nominal sales.
  S ~ s * p

  # Real inventories.
  inv ~ lag(inv) + y - s

  # Inventory-sales ratio.
  sigmas ~ lag(inv) / s

  # Nominal inventories.
  INV ~ inv * UC

  # Firms' demand for loans.
  Ld ~ INV

  # Entrepreneurial profits.
  FXf ~ S - TX - WB + (INV - lag(INV)) - lag(rl) * lag(INV)

  # Inflation rate.
  pi ~ (p / lag(p)) - 1

  # Nominal disposable income.
  YDr ~ FX + WB + lag(rm) * lag(M2h) + lag(rb) * lag(Bhh) + lag(BLh)

  # Capital gains on bonds.
  CG ~ (pbl - lag(pbl)) * lag(BLh)

  # Haig-Simons disposable income.
  YDhs ~ YDr + CG

  # Total distributed profits to households.
  FX ~ FXf + FXb

  # Household wealth.
  V ~ lag(V) + YDhs - C

  # Wealth net of cash.
  Vnc ~ V - Hhh

  # Real disposable income.
  ydr ~ (YDr / p) - pi * (lag(V) / p)

  # Real Haig-Simons disposable income.
  ydhs ~ (YDr - pi * lag(V) + CG) / p

  # Real wealth.
  v ~ V / p

  # Real consumption demand.
  c ~ alpha0 + alpha1 * ydrE + alpha2 * lag(v)

  # Expected real disposable income.
  ydrE ~ epsilon * lag(ydr) + (1 - epsilon) * lag(ydrE)

  # Nominal consumption demand.
  C ~ p * c

  # Expected nominal disposable income.
  YDrE ~ p * ydrE + pi * (lag(V) / p)

  # Expected wealth.
  VE ~ lag(V) + (YDrE - C)

  # Cash demand.
  Hhd ~ lambdac * C

  # Expected wealth net of cash.
  VncE ~ VE - Hhd

  # Expected bond return.
  ERrbl ~ rbl

  # Household time-deposit demand.
  M2d ~ VncE * (lambda20 + lambda22 * rm + lambda23 * rb + lambda24 * ERrbl + lambda25 * (YDrE / VncE))

  # Household bill demand.
  Bhd ~ VncE * (lambda30 + lambda32 * rm + lambda33 * rb + lambda34 * ERrbl + lambda35 * (YDrE / VncE))

  # Household bond demand.
  BLd ~ (VncE / pbl) * (lambda40 + lambda42 * rm + lambda43 * rb + lambda44 * ERrbl + lambda45 * (YDrE / VncE))

  # Household checking-deposit demand.
  M1d ~ VncE * (lambda10 + lambda12 * rm + lambda13 * rb + lambda14 * ERrbl + lambda15 * (YDrE / VncE))

  # Checking-deposit residual definition.
  M1d2 ~ VncE - M2d - Bhd - pbl * BLd

  # Realized cash holdings.
  Hhh ~ Hhd

  # Realized household bill holdings.
  Bhh ~ Bhd

  # Realized household bond holdings.
  BLh ~ BLd

  # Notional checking deposits.
  M1hN ~ Vnc - M2d - Bhd - pbl * BLd

  # Checking-deposit regime indicator.
  z1 ~ if (M1hN > 0) {1} else {0}

  # Alternative portfolio regime indicator.
  z2 ~ 1 - z1

  # Realized checking deposits.
  M1h ~ M1hN * z1

  # Notional time deposits.
  M2hN ~ M2d

  # Realized time deposits.
  M2h ~ M2d * z1 + (Vnc - Bhh - pbl * BLd) * z2

  # Tax revenues.
  TX ~ S * (tau / (1 + tau))

  # Nominal government expenditure.
  G ~ p * g

  # Public sector borrowing requirement.
  PSBR ~ G + lag(rb) * lag(Bs) + lag(BLs) - (TX + FXcb)

  # Treasury bills supplied by government.
  Bs ~ lag(Bs) + PSBR - (BLs - lag(BLs)) * pbl

  # Treasury bonds supplied by government.
  BLs ~ BLd

  # Price of bonds.
  pbl ~ 1 / rbl

  # Government debt accumulation.
  GD ~ lag(GD) + PSBR

  # High-powered money supplied by the central bank.
  Hs ~ Bcb + As

  # Bank reserves at the central bank.
  Hbs ~ Hs - Hhs

  # Bills held by the central bank.
  Bcb ~ Bs - Bhh - Bbd

  # Advances supplied by the central bank.
  As ~ Ad

  # Interest rate on advances.
  ra ~ rb

  # Central-bank profits.
  FXcb ~ lag(rb) * lag(Bcb) + lag(ra) * lag(As)

  # Cash supplied to households.
  Hhs ~ Hhd

  # Checking deposits supplied by banks.
  M1s ~ M1h

  # Time deposits supplied by banks.
  M2s ~ M2h

  # Loans supplied by banks.
  Ls ~ Ld

  # Reserve requirement demand.
  Hbd ~ ro1 * M1s + ro2 * M2s

  # Notional bank-bill holdings.
  BbdN ~ M1s + M2s - Ls - Hbd

  # Notional bank liquidity ratio.
  BLRN ~ BbdN / (M1s + M2s)

  # Advances demanded by banks.
  Ad ~ (bot * (M1s + M2s) - BbdN) * z3

  # Advance-demand regime indicator.
  z3 ~ if (BLRN < bot) {1} else {0}

  # Realized bank-bill holdings.
  Bbd ~ Ad + M1s + M2s - Ls - Hbd

  # Realized bank liquidity ratio.
  BLR ~ Bbd / (M1s + M2s)

  # Deposit rate set by banks.
  rm ~ lag(rm) + zetam * (z4 - z5) + zetab * (rb - lag(rb))

  # Low-liquidity signal.
  z4 ~ if (lag(BLRN) < bot) {1} else {0}

  # High-liquidity signal.
  z5 ~ if (lag(BLRN) > top) {1} else {0}

  # Bank profits.
  FXb ~ lag(rl) * lag(Ls) + lag(rb) * lag(Bbd) - lag(rm) * lag(M2s) - lag(ra) * lag(Ad)

  # Loan rate set by banks.
  rl ~ lag(rl) + zetal * (z6 - z7) + (rb - lag(rb))

  # Low profit-margin signal.
  z6 ~ if (BPM < botpm) {1} else {0}

  # High profit-margin signal.
  z7 ~ if (BPM > toppm) {1} else {0}

  # Lag helper for M1s.
  lM1s ~ lag(M1s)

  # Lag helper for M2s.
  lM2s ~ lag(M2s)

  # Bank profit margin.
  BPM ~ (FXb + lag(FXb)) / (lM1s + lag(lM1s) + lM2s + lag(lM2s))

  # Target real wage.
  omegaT ~ exp(Omega0 + Omega1 * log(pr) + Omega2 * log(N / Nfe))

  # Money wage.
  W ~ lag(W) * (1 + Omega3 * (lag(omegaT) - (lag(W) / lag(p))))

  # Nominal output.
  Y ~ p * s + UC * (inv - lag(inv))
