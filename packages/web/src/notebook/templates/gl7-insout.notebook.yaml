      description: Transactions-flow matrix for model INSOUT following the gl7 article.
      note: Validated against the baseline simulation in the R vignette fixture.
      columns: [Households, Firms current, Firms capital, Government, CB current, CB capital, Banks current, Banks capital, Sum]
      sectors: [Households, Production firms, Production firms, Government, Central bank, Central bank, Banks, Banks, ""]
      accountingKind: transaction-flow
      rows:
        - [Consumption, Consumption, -C, +C, "", "", "", "", "", "", "0"]
        - [Government, Govt. expenditures, "", +G, "", -G, "", "", "", "", "0"]
        - [Inventories, Change inventories, "", +d(INV), -d(INV), "", "", "", "", "", "0"]
        - [Taxes, Taxes, "", -TX, "", +TX, "", "", "", "", "0"]
        - [Wages, Wages, +WB, -WB, "", "", "", "", "", "", "0"]
        - [Profits, Entrepreneurial profits, +FXf, -FXf, "", "", "", "", "", "", "0"]
        - [Profits, Bank profits, +FXb, "", "", "", "", "", -FXb, "", "0"]
        - [Profits, CB profits, "", "", "", +FXcb, -FXcb, "", "", "", "0"]
        - [Interest, Interest advances, "", "", "", "", +lag(ra) * lag(As), "", -lag(ra) * lag(Ad), "", "0"]
        - [Interest, Interest loans, "", -lag(rl) * lag(Ld), "", "", "", "", +lag(rl) * lag(Ld), "", "0"]
        - [Interest, Interest deposits, +lag(rm) * lag(M2h), "", "", "", "", "", -lag(rm) * lag(M2h), "", "0"]
        - [Interest, Interest bills, +lag(rb) * lag(Bhh), "", "", -lag(rb) * lag(Bs), +lag(rb) * lag(Bcb), "", +lag(rb) * lag(Bbd), "", "0"]
        - [Interest, Interest bonds, +lag(BLh), "", "", -lag(BLs), "", "", "", "", "0"]
        - [Advances, Change advances, "", "", "", "", "", -d(As), "", +d(Ad), "0"]
        - [Loans, Change loans, "", "", +d(Ld), "", "", "", "", -d(Ls), "0"]
        - [Money, Change cash, -d(Hhh), "", "", "", "", +d(Hs), "", -d(Hbd), "0"]
        - [Money, Change M1, -d(M1h), "", "", "", "", "", "", +d(M1s), "0"]
        - [Money, Change M2, -d(M2h), "", "", "", "", "", "", +d(M2s), "0"]
        - [Bills, Change bills, -d(Bhh), "", "", +d(Bs), "", -d(Bcb), "", -d(Bbd), "0"]
        - [Bonds, Change bonds, -d(BLh) * pbl, "", "", +d(BLs) * pbl, "", "", "", "", "0"]
        - [Sum, Sum, "0", "0", "0", "0", "0", "0", "0", "0", "0"]
  - matrix:
      id: account-transactions
      collapsed: false
      sourceRunCellId: baseline-run
      title: INSOUT account transactions
      description: Account-level transaction matrix for INSOUT with hierarchical sector and account columns.
      note: Columns group balance-sheet accounts by sector. Use Expand all / Collapse all or click sector headers to show or hide account columns.
      columns: [Deposits, Net_Worth, Current, Capital, Loans, Net_Worth, Government, Current, Capital, Firms.Loans, HH.Deposits, Firms.Current, Current, Capital, Net_Worth, Sum]
      sectors: [Households (HH), Households (HH), Firms, Firms, Firms, Firms, Government (Govt), Central bank (CB), Central bank (CB), Banks, Banks, Banks, Banks, Banks, Banks, ""]
      columnBadges: [asset, equity, asset, asset, liability, equity, asset, liability, asset, asset, liability, liability, asset, asset, equity, ""]
      accountingKind: account-transactions
      rows:
        - [Consumption, Consumption, -C, "", +C, "", "", "", "", "", "", "", "", "", "", "", "", "0"]
        - [Government, Govt. expenditures, "", "", +G, "", "", "", -G, "", "", "", "", "", "", "", "", "0"]
        - [Inventories, Change inventories, "", "", +d(INV), -d(INV), "", "", "", "", "", "", "", "", "", "", "", "0"]
        - [Taxes, Taxes, "", "", -TX, "", "", "", +TX, "", "", "", "", "", "", "", "", "0"]
        - [Wages, Wages, +WB, "", -WB, "", "", "", "", "", "", "", "", "", "", "", "", "0"]
        - [Profits, Entrepreneurial profits, +FXf, "", -FXf, "", "", "", "", "", "", "", "", "", "", "", "", "0"]
        - [Profits, Bank profits, +FXb, "", "", "", "", "", "", "", "", "", "", "", -FXb, "-", "", "0"]
        - [Profits, CB profits, "", "", "", "", "", "", +FXcb, -FXcb, "", "", "", "", "", "", "", "0"]
        - [Interest, Interest advances, "", "", "", "", "", "", "", +ra'•As', "", "", "", "", -ra•Ad', "", "", "0"]
        - [Interest, Interest loans, "", "", -rl'•Ld', "", "", "", "", "", "", "", "", "", +rl'•Ld', "", "", "0"]
        - [Interest, Interest deposits, +rm'•M2h', "", "", "", "", "", "", "", "", "", "", "", -rm'•M2h', "", "", "0"]
        - [Interest, Interest bills, +rb'•Bhh', "", "", "", "", "", -rb'•Bs', +rb'•Bcb', "", "", "", "", +rb'•Bbd', "", "", "0"]
        - [Interest, Interest bonds, +BLh', "", "", "", "", "", -BLs', "", "", "", "", "", "", "", "", "0"]
        - [Advances, Change advances, "", "", "", "", "", "", "", "", -d(As), "", "", "", "", +d(Ad), "", "0"]
        - [Loans, Change loans, "", "", +d(Ld), "", -d(Ld), "", "", "", "", +d(Ls), "", -d(Ld), "", "", "", "0"]
        - [Money, Change cash, -d(Hhh), "", "", "", "", "", "", "", +d(Hs), "", "", "", "", -d(Hbd), "", "0"]
        - [Money, Change M1, -d(M1h), "", "", "", "", "", "", "", "", "", "", "", "", +d(M1s), "", "0"]
        - [Money, Change M2, -d(M2h), "", "", "", "", "", "", "", "", "", "", "", "", +d(M2s), "", "0"]
        - [Bills, Change bills, -d(Bhh), "", "", "", "", "", +d(Bs), "", -d(Bcb), "", "", "", "", -d(Bbd), "", "0"]
        - [Bonds, Change bonds, -d(BLh)•pbl, "", "", "", "", "", +d(BLs)•pbl, "", "", "", "", "", "", "", "", "0"]
        - [Sum, Sum, "", V, "0", INV, Ld, "", GD, Hs, "", Ls, "", "0", "", "", "", "0"]
  - sequence:
      id: transaction-flow-sequence
      title: INSOUT transaction flow sequence
      source:
        kind: matrix
        matrixCellId: transaction-flow
      description: Sequence view generated from the INSOUT transactions-flow matrix at the selected simulation period.
      collapsed: true
  - equations:
      id: equations
      title: INSOUT model
      modelId: equations
      collapsed: false
      rows:
        - [y, s^E + (inv^E - lag(inv)), "Output determined by expected sales and inventory adjustment."]
        - [N, y / pr, "Employment from output and productivity."]
        - [WB, N * W, "Wage bill."]
        - [UC, WB / y, "Unit cost."]
        - [s^E, beta * lag(s) + (1 - beta) * lag(s^E), "Expected sales formed adaptively.", "", "", "", eq-4-sE]
        - [inv^T, sigma^T * s^E, "Target inventory stock.", "", "", "", eq-5-invT]
        - [sigma^T, sigma0 - sigma1 * rl, "Target inventory-sales ratio responds to the loan rate.", "", "", "", eq-6-sigmaT]
        - [inv^E, lag(inv) + gamma * (inv^T - lag(inv)), "Expected inventory stock.", "", "", "", eq-7-invE]
        - [p, (1 + tau) * (1 + phi) * NHUC, "Price level."]
        - [NHUC, (1 - sigma^T) * UC + sigma^T * (1 + lag(rl)) * lag(UC), "Normalized historic unit cost."]
        - [s, c + g, "Real sales."]
        - [S, s * p, "Nominal sales."]
        - [inv, lag(inv) + y - s, "Real inventories."]
        - [sigmas, lag(inv) / s, "Inventory-sales ratio."]
        - [INV, inv * UC, "Nominal inventories."]
        - [Ld, INV, "Firms' demand for loans."]
        - [FXf, S - TX - WB + (INV - lag(INV)) - lag(rl) * lag(INV), "Entrepreneurial profits."]
        - [pi, (p / lag(p)) - 1, "Inflation rate."]
        - [YDr, FX + WB + lag(rm) * lag(M2h) + lag(rb) * lag(Bhh) + lag(BLh), "Nominal disposable income."]
        - [CG, (pbl - lag(pbl)) * lag(BLh), "Capital gains on bonds."]
        - [YDhs, YDr + CG, "Haig-Simons disposable income."]
        - [FX, FXf + FXb, "Total distributed profits to households."]
        - [V, lag(V) + YDhs - C, "Household wealth."]
        - [Vnc, V - Hhh, "Wealth net of cash."]
        - [ydr, (YDr / p) - pi * (lag(V) / p), "Real disposable income."]
        - [ydhs, (YDr - pi * lag(V) + CG) / p, "Real Haig-Simons disposable income."]
        - [v, V / p, "Real wealth."]
        - [c, alpha0 + alpha1 * ydr^E + alpha2 * lag(v), "Real consumption demand."]
        - [ydr^E, epsilon * lag(ydr) + (1 - epsilon) * lag(ydr^E), "Expected real disposable income.", "", "", "", eq-28-ydrE]
        - [C, p * c, "Nominal consumption demand."]
        - [YDr^E, p * ydr^E + pi * (lag(V) / p), "Expected nominal disposable income.", "", "", "", eq-30-YDrE]
        - [V^E, lag(V) + (YDr^E - C), "Expected wealth.", "", "", "", eq-31-VE]
        - [Hhd, lambdac * C, "Cash demand."]
        - [VncE, V^E - Hhd, "Expected wealth net of cash."]
        - [ERrbl, rbl, "Expected bond return."]
        - [M2d, VncE * (lambda20 + lambda22 * rm + lambda23 * rb + lambda24 * ERrbl + lambda25 * (YDr^E / VncE)), "Household time-deposit demand."]
        - [Bhd, VncE * (lambda30 + lambda32 * rm + lambda33 * rb + lambda34 * ERrbl + lambda35 * (YDr^E / VncE)), "Household bill demand."]
        - [BLd, (VncE / pbl) * (lambda40 + lambda42 * rm + lambda43 * rb + lambda44 * ERrbl + lambda45 * (YDr^E / VncE)), "Household bond demand."]
        - [M1d, VncE * (lambda10 + lambda12 * rm + lambda13 * rb + lambda14 * ERrbl + lambda15 * (YDr^E / VncE)), "Household checking-deposit demand."]
        - [M1d2, VncE - M2d - Bhd - pbl * BLd, "Checking-deposit residual definition."]
        - [Hhh, Hhd, "Realized cash holdings."]
        - [Bhh, Bhd, "Realized household bill holdings."]
        - [BLh, BLd, "Realized household bond holdings."]
        - [M1hN, Vnc - M2d - Bhd - pbl * BLd, "Notional checking deposits."]
        - [z1, "if (M1hN > 0) {1} else {0}", "Checking-deposit regime indicator."]
        - [z2, 1 - z1, "Alternative portfolio regime indicator."]
        - [M1h, M1hN * z1, "Realized checking deposits."]
        - [M2hN, M2d, "Notional time deposits."]
        - [M2h, M2d * z1 + (Vnc - Bhh - pbl * BLd) * z2, "Realized time deposits."]
        - [TX, S * (tau / (1 + tau)), "Tax revenues."]
        - [G, p * g, "Nominal government expenditure."]
        - [PSBR, G + lag(rb) * lag(Bs) + lag(BLs) - (TX + FXcb), "Public sector borrowing requirement."]
        - [Bs, lag(Bs) + PSBR - (BLs - lag(BLs)) * pbl, "Treasury bills supplied by government."]
        - [BLs, BLd, "Treasury bonds supplied by government."]
        - [pbl, 1 / rbl, "Price of bonds."]
        - [GD, lag(GD) + PSBR, "Government debt accumulation."]
        - [Hs, Bcb + As, "High-powered money supplied by the central bank."]
        - [Hbs, Hs - Hhs, "Bank reserves at the central bank."]
        - [Bcb, Bs - Bhh - Bbd, "Bills held by the central bank."]
        - [As, Ad, "Advances supplied by the central bank."]
        - [ra, rb, "Interest rate on advances."]
        - [FXcb, lag(rb) * lag(Bcb) + lag(ra) * lag(As), "Central-bank profits."]
        - [Hhs, Hhd, "Cash supplied to households."]
        - [M1s, M1h, "Checking deposits supplied by banks."]
        - [M2s, M2h, "Time deposits supplied by banks."]
        - [Ls, Ld, "Loans supplied by banks."]
        - [Hbd, ro1 * M1s + ro2 * M2s, "Reserve requirement demand."]
        - [BbdN, M1s + M2s - Ls - Hbd, "Notional bank-bill holdings."]
        - [BLRN, BbdN / (M1s + M2s), "Notional bank liquidity ratio."]
        - [Ad, (bot * (M1s + M2s) - BbdN) * z3, "Advances demanded by banks."]
        - [z3, "if (BLRN < bot) {1} else {0}", "Advance-demand regime indicator."]
        - [Bbd, Ad + M1s + M2s - Ls - Hbd, "Realized bank-bill holdings."]
        - [BLR, Bbd / (M1s + M2s), "Realized bank liquidity ratio."]
        - [rm, lag(rm) + zetam * (z4 - z5) + zetab * (rb - lag(rb)), "Deposit rate set by banks."]
        - [z4, "if (lag(BLRN) < bot) {1} else {0}", "Low-liquidity signal."]
        - [z5, "if (lag(BLRN) > top) {1} else {0}", "High-liquidity signal."]
        - [FXb, lag(rl) * lag(Ls) + lag(rb) * lag(Bbd) - lag(rm) * lag(M2s) - lag(ra) * lag(Ad), "Bank profits."]
        - [rl, lag(rl) + zetal * (z6 - z7) + (rb - lag(rb)), "Loan rate set by banks."]
        - [z6, "if (BPM < botpm) {1} else {0}", "Low profit-margin signal."]
        - [z7, "if (BPM > toppm) {1} else {0}", "High profit-margin signal."]
        - [lM1s, lag(M1s), "Lag helper for M1s."]
        - [lM2s, lag(M2s), "Lag helper for M2s."]
        - [BPM, (FXb + lag(FXb)) / (lM1s + lag(lM1s) + lM2s + lag(lM2s)), "Bank profit margin."]
        - [omega^T, exp(Omega0 + Omega1 * log(pr) + Omega2 * log(N / Nfe)), "Target real wage.", "", "", "", eq-83-omegaT]
        - [W, lag(W) * (1 + Omega3 * (lag(omega^T) - (lag(W) / lag(p)))), "Money wage."]
        - [Y, p * s + UC * (inv - lag(inv)), "Nominal output."]
  - solver:
      id: solver
      title: Solver
      modelId: equations
      collapsed: true
      method: gauss-seidel
      tolerance: "1e-15"
      maxIterations: 400
      defaultInitialValue: "1e-15"
      hiddenLeftVariable: Hbd
      hiddenRightVariable: Hbs
      hiddenTolerance: "0.00001"
      relativeHiddenTolerance: false
  - externals:
      id: externals-equations
      title: Externals
      modelId: equations
      collapsed: true
      rows:
        - [rbl, 0.027, "Interest rate on bonds."]
        - [rb, 0.023, "Interest rate on bills."]
        - [pr, 1, "Labor productivity."]
        - [g, 25, "Real government expenditure."]
        - [Nfe, 133.28, "Full-employment labor supply."]
        - [alpha0, 0, "Autonomous consumption."]
        - [alpha1, 0.95, "Propensity to consume from expected income."]
        - [alpha2, 0.05, "Propensity to consume from wealth."]
        - [beta, 0.5, "Sales expectations adjustment speed."]
        - [bot, 0.02, "Lower bound for the bank liquidity ratio."]
        - [botpm, 0.003, "Lower bound for the bank profit margin."]
        - [epsilon, 0.5, "Income expectations adjustment speed."]
        - [gamma, 0.5, "Inventory adjustment speed."]
        - [lambdac, 0.1, "Cash-to-consumption ratio."]
        - [phi, 0.1, "Mark-up parameter."]
        - [ro1, 0.1, "Reserve requirement on M1."]
        - [ro2, 0.1, "Reserve requirement on M2."]
        - [sigma0, 0.3612, "Intercept for desired inventories."]
        - [sigma1, 3, "Sensitivity of desired inventories to the loan rate."]
        - [tau, 0.25, "Tax rate."]
        - [zetab, 0.9, "Pass-through from bill rate to deposit rate."]
        - [zetal, 0.0002, "Loan-rate adjustment speed."]
        - [zetam, 0.0002, "Deposit-rate adjustment speed."]
        - [Omega0, -0.32549, "Wage target intercept."]
        - [Omega1, 1, "Wage target productivity elasticity."]
        - [Omega2, 1.5, "Wage target employment elasticity."]
        - [Omega3, 0.1, "Wage adjustment speed."]
        - [top, 0.06, "Upper bound for the bank liquidity ratio."]
        - [toppm, 0.005, "Upper bound for the bank profit margin."]
        - [lambda10, -0.17071, "Portfolio parameter."]
        - [lambda11, 0, "Portfolio parameter."]
        - [lambda12, 0, "Portfolio parameter."]
        - [lambda13, 0, "Portfolio parameter."]
        - [lambda14, 0, "Portfolio parameter."]
        - [lambda15, 0.18, "Portfolio parameter."]
        - [lambda20, 0.52245, "Portfolio parameter."]
        - [lambda21, 0, "Portfolio parameter."]
        - [lambda22, 30, "Portfolio parameter."]
        - [lambda23, -15, "Portfolio parameter."]
        - [lambda24, -15, "Portfolio parameter."]
        - [lambda25, -0.06, "Portfolio parameter."]
        - [lambda30, 0.47311, "Portfolio parameter."]
        - [lambda31, 0, "Portfolio parameter."]
        - [lambda32, -15, "Portfolio parameter."]
        - [lambda33, 30, "Portfolio parameter."]
        - [lambda34, -15, "Portfolio parameter."]
        - [lambda35, -0.06, "Portfolio parameter."]
        - [lambda40, 0.17515, "Portfolio parameter."]
        - [lambda41, 0, "Portfolio parameter."]
        - [lambda42, -15, "Portfolio parameter."]
        - [lambda43, -15, "Portfolio parameter."]
        - [lambda44, 30, "Portfolio parameter."]
        - [lambda45, -0.06, "Portfolio parameter."]
  - initial-values:
      id: initial-values-equations
      title: Initial values
      modelId: equations
      collapsed: false
      rows:
        - [p, 1]
        - [W, 1]
        - [UC, 1]
        - [BPM, 0.0035]
        - [rb, 1e-15]
  - run:
      id: baseline-run
      title: Baseline run
      description: Baseline INSOUT simulation with the hidden-equation condition Hbd = Hbs.
      mode: baseline
      periods: 210
      resultKey: gl7_insout_baseline
      sourceModelId: equations
  - chart:
      id: baseline-chart
      title: Baseline steady-state checks
      variables:
        - W
        - WB
        - Y
        - pi
        - BLRN
        - BPM
      axisMode: separate
      axisSnapTolarance: 0.5
      seriesRanges:
        pi:
          includeZero: true
        BLRN:
          includeZero: true
        BPM:
          includeZero: true
      sourceRunCellId: baseline-run
  - table:
      id: baseline-table
      title: Baseline variable summary
      variables:
        - y
        - s
        - p
        - V
        - INV
        - BLRN
        - BPM
      sourceRunCellId: baseline-run
  - markdown:
      id: scenario-1-note
      title: Simulation 1
      source: Simulation 1 raises `sigma0` from `0.3612` to `0.4` between periods 5 and 70, increasing the targeted inventories-to-sales ratio through the `sigma^T` rule.
  - run:
      id: scenario-1-run
      title: "Simulation 1: targeted inventories shock"
      mode: scenario
      scenario:
        shocks:
          - rangeInclusive:
              - 5
              - 70
            variables:
              sigma0:
                kind: constant
                value: 0.4
            startPeriodInclusive: 5
            endPeriodInclusive: 70
      baselineRunCellId: baseline-run
      periods: 70
      resultKey: gl7_insout_s1
      sourceModelId: equations
  - chart:
      id: scenario-1-chart
      title: Simulation 1 inventories and rates
      variables:
        - INV
        - Ls
        - rm
        - rb
      axisMode: separate
      axisSnapTolarance: 0.5
      seriesRanges:
        rm:
          includeZero: true
        rb:
          includeZero: true
      sourceRunCellId: scenario-1-run
  - markdown:
      id: scenario-2-note
      title: Simulation 2
      source: Simulation 2 raises real government expenditure `g` from `25` to `30` between periods 5 and 55.
  - run:
      id: scenario-2-run
      title: "Simulation 2: government expenditure shock"
      mode: scenario
      scenario:
        shocks:
          - rangeInclusive:
              - 5
              - 55
            variables:
              g:
                kind: constant
                value: 30
            startPeriodInclusive: 5
            endPeriodInclusive: 55
      baselineRunCellId: baseline-run
      baselineStartPeriod: 60
      periods: 55
      resultKey: gl7_insout_s2
      sourceModelId: equations
  - chart:
      id: scenario-2-chart
      title: Simulation 2 income, wealth, and inflation
      variables:
        - c
        - v
        - ydr
        - pi
      axisMode: separate
      axisSnapTolarance: 0.5
      seriesRanges:
        pi:
          includeZero: true
      sourceRunCellId: scenario-2-run
  - markdown:
      id: scenario-7-note
      title: Simulation 7
      source: "Simulation 7 combines a higher target real wage with higher bill and bond rates: `Omega0` rises from `-0.32549` to `-0.2` during periods 4 to 55, while `rb` rises from `0.023` to `0.03` and `rbl` rises from `0.027` to `0.039` during periods 5 to 55."
  - run:
      id: scenario-7-run
      title: "Simulation 7: inflation and rate shock"
      mode: scenario
      scenario:
        shocks:
          - rangeInclusive:
              - 4
              - 55
            variables:
              Omega0:
                kind: constant
                value: -0.2
            startPeriodInclusive: 4
            endPeriodInclusive: 55
          - rangeInclusive:
              - 5
              - 55
            variables:
              rb:
                kind: constant
                value: 0.03
              rbl:
                kind: constant
                value: 0.039
            startPeriodInclusive: 5
            endPeriodInclusive: 55
      baselineRunCellId: baseline-run
      periods: 55
      resultKey: gl7_insout_s7
      sourceModelId: equations
  - chart:
      id: scenario-7-chart
      title: Simulation 7 inflation, sales, and debt
      variables:
        - pi
        - s
        - V
        - Bs
      axisMode: separate
      axisSnapTolarance: 0.5
      seriesRanges:
        pi:
          includeZero: true
      sourceRunCellId: scenario-7-run
  - sequence:
      id: equation-dependency-graph
      title: INSOUT  dependency graph
      source:
        kind: dependency
        modelId: equations
        showAccountingStrips: true
        showExogenous: false
      description: Dependency view of the pc equations organized by sector strips and accounting bands.
      note: ""
      collapsed: true