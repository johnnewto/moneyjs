      sourceRunCellId: baseline-run
      title: INSOUT balance sheet
      description: Balance-sheet matrix for model INSOUT following the gl7 article.
      note: Validated against the baseline simulation in the R vignette fixture.
      columns: [Households, Firms, Government, Central bank, Banks, Sum]
      accountingKind: balance-sheet
      rows:
        - label: Inventories
          values:
            - ""
            - +INV
            - ""
            - ""
            - ""
            - +INV
        - label: HPM
          values:
            - +Hhd
            - ""
            - ""
            - -Hs
            - +Hbd
            - "0"
        - label: Advances
          values:
            - ""
            - ""
            - ""
            - +As
            - -Ad
            - "0"
        - label: Checking deposits
          values:
            - +M1h
            - ""
            - ""
            - ""
            - -M1s
            - "0"
        - label: Time deposits
          values:
            - +M2h
            - ""
            - ""
            - ""
            - -M2s
            - "0"
        - label: Bills
          values:
            - +Bhh
            - ""
            - -Bs
            - +Bcb
            - +Bbd
            - "0"
        - label: Bonds
          values:
            - +BLh * pbl
            - ""
            - -BLs * pbl
            - ""
            - ""
            - "0"
        - label: Loans
          values:
            - ""
            - -Ld
            - ""
            - ""
            - +Ls
            - "0"
        - label: Balance
          values:
