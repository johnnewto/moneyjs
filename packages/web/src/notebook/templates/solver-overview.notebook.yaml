format: sfcr-notebook-yaml
formatVersion: 1
id: solver-overview-notebook
title: Solver Overview Notebook
metadata:
  version: 1
  template: solver-overview
cells:
  - markdown:
      id: intro
      title: Overview
      source: This notebook turns the concrete block-ordering example from `devdocs/solver-overview.md` into a runnable model. The document uses `c = d + 1` and `d = c + 1` to illustrate a cyclic component, but that pair has no finite solution. This notebook keeps the same overall teaching shape while using a convergent cyclic pair, an explicit dependency from the cyclic block back to `b`, and a lagged feedback term from `e` into `c`. That keeps the ordered blocks exactly `[a]`, `[b]`, `[c, d]`, `[e]` while also creating a more interesting period-to-period transition.
  - equations:
      id: equations
      title: Block-order example model
      modelId: solver-overview
      collapsed: true
      rows:
        - [a, a_level, "Acyclic starting value."]
        - [b, a + b_offset, "Depends only on the solved value of a."]
        - [c, c_weight * d + c_offset + c_from_b * b + c_from_lag_e * lag(e), "First member of the simultaneous block, with current dependence on d and b plus lagged feedback from e."]
        - [d, d_weight * c + d_offset, "Second member of the simultaneous block."]
        - [e, b + c, "Acyclic tail equation that waits for b and c."]
  - solver:
      id: solver
      title: Solver
      modelId: solver-overview
      collapsed: true
      method: gauss-seidel
      tolerance: "1e-10"
      maxIterations: 100
      defaultInitialValue: "1e-15"
      hiddenLeftVariable: ""
      hiddenRightVariable: ""
      hiddenTolerance: "0.00001"
      relativeHiddenTolerance: false
  - externals:
      id: externals
      title: Externals
      modelId: solver-overview
      collapsed: true
      rows:
        - [a_level, 1, "Constant for equation a."]
        - [b_offset, 1, "Offset used by b = a + b_offset."]
        - [c_weight, 0.45, "Feedback weight from d into c."]
        - [c_offset, 0.8, "Constant term in equation c."]
        - [d_weight, 0.5, "Feedback weight from c into d."]
        - [d_offset, 1, "Constant term in equation d."]
        - [c_from_b, 0.1, "Links the cyclic block to b so the block order matches the overview document."]
        - [c_from_lag_e, 0.2, "Lagged feedback from e into the cyclic block to create period-to-period dynamics."]
  - initial-values:
      id: initial-values
      title: Initial values
      modelId: solver-overview
      collapsed: true
      rows: []
  - run:
      id: baseline-run
      title: Baseline run
      description: Baseline run for the block-order example using a convergent cyclic pair with lagged feedback.
      mode: baseline
      periods: 30
      resultKey: solver_overview_baseline
      sourceModelId: solver-overview
  - chart:
      id: baseline-chart
      title: Baseline variables by block position
      variables:
        - a
        - b
        - c
        - d
        - e
      axisMode: separate
      axisSnapTolarance: 0.5
      seriesRanges:
        a:
          includeZero: true
        b:
          includeZero: true
        c:
          includeZero: true
        d:
          includeZero: true
        e:
          includeZero: true
      sourceRunCellId: baseline-run
  - table:
      id: baseline-table
      title: Baseline variable summary
      variables:
        - a
        - b
        - c
        - d
        - e
      sourceRunCellId: baseline-run
  - markdown:
      id: scenario-note
      title: Scenario 1
      source: This scenario raises `c_offset` from `0.8` to `1.1` between periods 5 and 20. It shifts the cyclic block upward while leaving the acyclic equations and overall block ordering unchanged.
  - run:
      id: scenario-run
      title: "Scenario 1: higher c offset"
      mode: scenario
      scenario:
        shocks:
          - rangeInclusive:
              - 5
              - 20
            variables:
              c_offset:
                kind: constant
                value: 1.1
      baselineRunCellId: baseline-run
      periods: 20
      resultKey: solver_overview_s1
      sourceModelId: solver-overview
  - chart:
      id: scenario-chart
      title: Scenario 1 cyclic block response
      variables:
        - c
        - d
        - e
      axisMode: separate
      axisSnapTolarance: 0.5
      seriesRanges:
        c:
          includeZero: true
        d:
          includeZero: true
        e:
          includeZero: true
      sourceRunCellId: scenario-run
  - table:
      id: scenario-table
      title: Scenario 1 variable summary
      variables:
        - a
        - b
        - c
        - d
        - e
      sourceRunCellId: scenario-run
