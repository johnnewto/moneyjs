format: sfcr-notebook-yaml
formatVersion: 1
id: eco-3io-pc-notebook
title: ECO-3IO-PC Notebook
metadata:
  version: 1
  template: eco-3io-pc
  sourceFileName: eco-3io-pc-notebook (1).notebook.yaml
cells:
  - markdown:
      id: intro
      title: Overview
      source: This notebook ports Marco Veronese Passarella's ECO-3IO-PC prototype from the Florence 2025 keynote. It combines Model PC with a three-industry input-output structure and an ecological block for matter, energy, emissions, and temperature feedback on consumption.
      more: |
        **ECO-3IO-PC** is the ecological-input-output cousin of Godley & Lavoie's
        Model PC. It is the destination of lecture 4, _"Introducing the ecosystem"_,
        in Marco Veronese Passarella's _Six lectures on SFC models_ (Beijing,
        2023): start from the portfolio-choice model **PC**, add input-output
        interdependencies between industries (**IO-PC**), then bolt on a physical
        ecosystem to obtain **ECO-PC**. This notebook uses the three-industry
        variant (agriculture, manufacturing, services) rather than the two-industry
        version of the lecture code, but the structure is identical.

        Ecological SFC models, pioneered by Dafermos, Nikolaidi and Galanis
        (2016, 2018) and Jackson and Victor (2015), join **monetary** accounting
        (every financial flow comes from somewhere and goes somewhere, in the
        tradition of Godley & Lavoie) to **physical** accounting (matter and
        energy are conserved, in the tradition of Georgescu-Roegen). The ecosystem
        here rests on eight assumptions taken from the lecture:

        - there are two kinds of reserves, **matter** and **energy**;
        - energy is either **renewable** (`ren`) or **non-renewable** (`nen`);
        - resources are converted into reserves at fixed rates (`sigma_m`, `sigma_e`);
        - industrial **CO2 emissions** track the use of non-renewable energy;
        - **atmospheric temperature** is a rising function of cumulative emissions;
        - consumption goods can be **durable** or non-durable;
        - a share of the durable (socio-economic) stock is **discarded** each period;
        - waste and emissions are produced only by the **firm** sector.

        Because the physical block is layered on top of an intact monetary core,
        the model stays watertight: the redundant cash-market condition
        `h_h = h_s` still holds (enforced as the solver's hidden equation), while
        the new equations only describe the flows of matter, energy and carbon
        that the monetary economy sets in motion.
  - matrix:
      id: balance-sheet
      sourceRunCellId: baseline-run
      title: ECO-3IO-PC balance sheet
      description: Balance-sheet matrix for the 3IO-PC macro structure.
      note: Validated against the baseline simulation in the Florence R fixture.
      columns: [Households, Firms, Central bank, Government, Sum]
      sectors: [Households, Firms, Central bank, Government, ""]
      accountingKind: balance-sheet
      rows:
        - [Cash, Cash (money), +h_h, "", -h_s, "", "0"]
        - [Bills, Bills, +b_h, "", +b_cb, -b_s, "0"]
        - [Wealth, Wealth, -v, "", "", +b_s, "0"]
        - [Sum, Sum, "0", "0", "0", "0", "0"]
      more: |
        The monetary core is unchanged from Model **PC**: the only two financial
        assets are government **cash** (`h_h` held by households, `h_s` issued by
        the central bank) and government **bills** (`b_h` held by households,
        `b_cb` held by the central bank, `b_s` issued by the government).
        Households own all the net wealth of the economy, `v = h_h + b_h`, which
        is exactly the value of the government's outstanding debt held outside the
        central bank.

        Reading the table the SFC way: **assets are positive, liabilities
        negative**, so every asset row sums across sectors to zero (one sector's
        claim is another's obligation), and the net-worth row closes each column.
        Firms hold no financial assets here — production is sold within the period
        and profits are distributed — so they appear only in the flow accounts.
        The ecosystem adds **no** financial assets: matter, energy and carbon are
        tracked in their own physical matrices (see the appendix), keeping this
        balance sheet identical to the textbook PC model.
  - matrix:
      id: transaction-flow
      sourceRunCellId: baseline-run
      title: ECO-3IO-PC transactions-flow matrix
      description: Transactions-flow matrix for the 3IO-PC macro structure.
      note: Validated against the baseline simulation in the Florence R fixture.
      columns: [Households, Firms, Central bank, Government, Sum]
      sectors: [Households, Firms, Central bank, Government, ""]
      accountingKind: transaction-flow
      rows:
        - [Consumption, Consumption, -cons * p_c, +cons * p_c, "", "", "0"]
        - [Government, Government expenditure, "", +g * p_g, "", -g * p_g, "0"]
        - [Income, GDP (income), +y, -y, "", "", "0"]
        - [Interest, Interest payments, +lag(r) * lag(b_h), "", +lag(r) * lag(b_cb), -lag(r) * lag(b_s), "0"]
        - [Profits, CB profit, "", "", -lag(r) * lag(b_cb), +lag(r) * lag(b_cb), "0"]
        - [Taxes, Taxes, -t, "", "", +t, "0"]
        - [Cash, Change in cash, -d(h_h), "", +d(h_s), "", "0"]
        - [Bills, Change in bills, -d(b_h), "", -d(b_cb), +d(b_s), "0"]
        - [Sum, Sum, "0", "0", "0", "0", "0"]
      more: |
        The transactions-flow matrix is the period-by-period companion of the
        balance sheet, and again it reproduces Model **PC**. Every row is an
        identity that sums to zero across sectors — there are no black holes.
        Consumption and government expenditure are valued at their price indices
        (`cons * p_c`, `g * p_g`) because the input-output block lets the consumer
        and government baskets carry different prices. GDP appears as
        `y = p1 * d1 + p2 * d2 + p3 * d3`, the value of final demand.

        The bottom two rows are the **flow-of-funds**: household saving that is not
        held as cash, `d(b_h)`, is lent to the government by buying bills, while
        any residual bill supply is absorbed by the central bank (`d(b_cb)`), whose
        bill purchases create cash (`d(h_s)`). Because the columns balance, the
        change in household wealth equals income minus consumption, which is the
        accounting root of the wealth equation `v = I(yd - p_c * cons)`. The
        ecosystem does not enter here: matter and energy never appear in the
        monetary transactions matrix, only in the physical tables.
  - sequence:
      id: transaction-flow-sequence
      title: ECO-3IO-PC transaction flow sequence
      source:
        kind: matrix
        matrixCellId: transaction-flow
      description: Sequence view generated from the transactions-flow matrix at the selected simulation period.
  - markdown:
      id: ecosystem-block-note
      title: The ecosystem block
      source: >-
        Lecture 4 of the Six lectures builds the ecosystem in four steps on top of the IO-PC core: (1) extraction of matter and waste, (2) energy use and CO2 emissions, (3) the dynamics of reserves and resources, and (4) climate feedback on behaviour. The equations cell below lists them all; this note groups them so the physical logic is easy to follow.
      more: |
        **1. Matter and waste.** Production of material goods
        `x_mat = mu_mat1 * x1 + mu_mat2 * x2 + mu_mat3 * x3` weights each
        industry's gross output by its material intensity. Some of the demand for
        matter is met by **recycling** the discarded socio-economic stock
        (`rec = rho_dis * dis`), so virgin **extraction** is only the remainder,
        `mat = x_mat - rec`. Durable consumption goods accumulate into stocks
        `dc1, dc2, dc3`, a fraction `zeta_dc` of which is discarded each period;
        the **socio-economic stock** of matter grows by `kh = I(x_mat - dis)` and
        the leftover becomes **waste**, `wa = mat - (kh - lag(kh))`.

        **2. Energy and emissions.** Total energy use is
        `en = eps_en1 * x1 + eps_en2 * x2 + eps_en3 * x3`; the renewable part
        `ren` uses the industry shares `eta_en`, leaving non-renewable energy
        `nen = en - ren`. Burning non-renewables emits CO2,
        `emis = beta_e * nen`, where `beta_e` is the carbon intensity of fossil
        energy. Emissions accumulate (`co2_cum = I(emis)`) and drive
        **temperature** through the transient-climate-response identity
        `temp = (tcre / (1 - fnc)) * co2_cum`.

        **3. Reserves and resources.** Matter and energy each have a stock of
        **reserves** that is drawn down by use and topped up by converting the much
        larger stock of **resources**: `k_m = I(conv_m - mat)` with
        `conv_m = sigma_m * res_m`, and `k_e = I(conv_e - nen)` with
        `conv_e = sigma_e * res_e`. The depletion ratios `depl_m_pct` and
        `depl_e_pct` report annual use as a percentage of lagged reserves.

        **4. Feedback.** Climate change feeds back onto the economy through the
        propensity to consume,
        `alpha1 = alpha10 - alpha11 * lag(r) - alpha12 * (temp - lag(temp))`. The
        elasticity `alpha12` is **zero in the baseline**, so the ecosystem is
        purely a passive accounting layer until the scenario switches the channel
        on. Note the feedback works on the _change_ in temperature `temp - lag(temp)`,
        i.e. the pace of warming, not its level.
  - equations:
      id: equations
      title: ECO-3IO-PC model
      modelId: eco-3io-pc
      collapsed: false
      rows:
        - [d1, beta1_c * cons + beta1_g * g, "Final demand for agriculture.", items/year, flow, identity]
        - [d2, beta2_c * cons + beta2_g * g, "Final demand for manufacturing.", items/year, flow, identity]
        - [d3, beta3_c * cons + beta3_g * g, "Final demand for services.", items/year, flow, identity]
        - [x1, a11 * x1 + a12 * x2 + a13 * x3 + d1, "Gross output in agriculture.", items/year, flow, identity]
        - [x2, a21 * x1 + a22 * x2 + a23 * x3 + d2, "Gross output in manufacturing.", items/year, flow, identity]
        - [x3, a31 * x1 + a32 * x2 + a33 * x3 + d3, "Gross output in services.", items/year, flow, identity]
        - [y, p1 * d1 + p2 * d2 + p3 * d3, "Nominal GDP from final demands.", $/year, flow, identity]
        - [p1, (w / pr1) + (p1 * a11 + p2 * a21 + p3 * a31) * (1 + mu), "Unit price in agriculture.", $/item, aux, identity]
        - [p2, (w / pr2) + (p1 * a12 + p2 * a22 + p3 * a32) * (1 + mu), "Unit price in manufacturing.", $/item, aux, identity]
        - [p3, (w / pr3) + (p1 * a13 + p2 * a23 + p3 * a33) * (1 + mu), "Unit price in services.", $/item, aux, identity]
        - [p_c, p1 * beta1_c + p2 * beta2_c + p3 * beta3_c, "Consumer price index.", $/item, aux, identity]
        - [p_g, p1 * beta1_g + p2 * beta2_g + p3 * beta3_g, "Government purchase price index.", "", flow, identity]
        - [yd, y - t + lag(r) * lag(b_h), "Household disposable income.", $/year, flow, identity]
        - [v, I(yd - p_c * cons), "Household wealth.", $, stock, accumulation]
        - [infl, (d(p_c) / p_c') * (v' / p_c), "Inflation tax on lagged wealth.", items/year, flow, identity]
        - [cons, alpha1 * ((yd / p_c) - infl) + alpha2 * lag(v) / p_c, "Real consumption without monetary illusion.", items/year, flow, identity]
        - [alpha1, alpha10 - alpha11 * lag(r) - alpha12 * (temp - lag(temp)), "Endogenous propensity to consume out of income.", "", aux, identity]
        - [h_h, v - b_h, "Household cash holdings.", $, stock, accumulation]
        - [b_h, v * (lambda0 + lambda1 * r - lambda2 * (yd / v)), "Household bill holdings.", $, stock, accumulation]
        - [t, theta * (y + lag(r) * lag(b_h)), "Income and interest taxes.", $/year, flow, identity]
        - [b_s, I(p_g * g + lag(r) * lag(b_s) - t - lag(r) * lag(b_cb)), "Government bill supply.", $, stock, accumulation]
        - [h_s, I(b_cb - lag(b_cb)), "High-powered money supply.", $, stock, accumulation]
        - [b_cb, b_s - b_h, "Central-bank bill holdings.", $, stock, accumulation]
        - [x_mat, mu_mat1 * x1 + mu_mat2 * x2 + mu_mat3 * x3, "Production of material goods.", kg/year, flow, identity]
        - [rec, rho_dis * dis, "Recycled socioeconomic stock.", kg/year, flow, identity]
        - [dis, mu_mat1 * zeta_dc1 * lag(dc1) + mu_mat2 * zeta_dc2 * lag(dc2) + mu_mat3 * zeta_dc3 * lag(dc3), "Discarded socioeconomic stock.", kg/year, flow, identity]
        - [dc1, (1 - zeta_dc1) * lag(dc1) + beta1_c * cons, "Durable stock of product 1.", kg, stock, accumulation]
        - [dc2, (1 - zeta_dc2) * lag(dc2) + beta2_c * cons, "Durable stock of product 2.", kg, stock, accumulation]
        - [dc3, (1 - zeta_dc3) * lag(dc3) + beta3_c * cons, "Durable stock of product 3.", kg, stock, accumulation]
        - [mat, x_mat - rec, "Extracted matter.", kg/year, flow, identity]
        - [kh, I(x_mat - dis), "Socioeconomic stock of matter.", kg, stock, accumulation]
        - [wa, mat - (kh - lag(kh)), "Waste flow.", kg/year, flow, identity]
        - [en, eps_en1 * x1 + eps_en2 * x2 + eps_en3 * x3, "Total energy use.", J/year, flow, identity]
        - [ren, eps_en1 * eta_en1 * x1 + eps_en2 * eta_en2 * x2 + eps_en3 * eta_en3 * x3, "Renewable energy use.", J/year, flow, identity]
        - [nen, en - ren, "Non-renewable energy use.", J/year, flow, identity]
        - [emis, beta_e * nen, "Annual CO2 emissions.", kg/year, flow, identity]
        - [emis1, eps_en1 * (1 - eta_en1) * x1 * beta_e, "CO2 emissions from agriculture.", kg/year, flow, identity]
        - [emis2, eps_en2 * (1 - eta_en2) * x2 * beta_e, "CO2 emissions from manufacturing.", kg/year, flow, identity]
        - [emis3, eps_en3 * (1 - eta_en3) * x3 * beta_e, "CO2 emissions from services.", kg/year, flow, identity]
        - [depl_m_pct, 100 * mat / lag(k_m), "Matter reserves depletion rate.", 1/year, aux, identity]
        - [depl_e_pct, 100 * nen / lag(k_e), "Energy reserves depletion rate.", 1/year, aux, identity]
        - [beta_e, lag(beta_e) * (1 - g_beta_e), "CO2 intensity of non-renewable energy.", "", aux, identity]
        - [co2_cum, I(emis), "Cumulative CO2 emissions.", kg, stock, accumulation]
        - [temp, (tcre / (1 - fnc)) * co2_cum, "Atmospheric temperature response.", °C, stock, identity]
        - [k_m, I(conv_m - mat), "Matter reserves.", kg, stock, accumulation]
        - [conv_m, sigma_m * res_m, "Matter resources converted to reserves.", kg/year, flow, identity]
        - [res_m, lag(res_m) - conv_m*dt, "Matter resource stock.", kg, stock, accumulation]
        - [cen, emis / car, "Carbon mass of energy use.", kg/year, flow, identity]
        - [o2, emis - cen, "Oxygen mass flow.", kg/year, flow, identity]
        - [k_e, I(conv_e - nen), "Energy reserves.", J, stock, accumulation]
        - [conv_e, sigma_e * res_e, "Energy resources converted to reserves.", J/year, flow, identity]
        - [res_e, lag(res_e) - conv_e*dt, "Energy resource stock.", J, stock, accumulation]
      more: |
        These rows hold the **full** model: the monetary PC block, the
        input-output block, and the four ecosystem sub-blocks described in the
        note above. A few things are worth highlighting.

        The **input-output** core inverts the Leontief system: final demand by
        product `d1, d2, d3` (split between consumption and government via the
        `beta` shares) drives gross output `x1, x2, x3` through
        `x = a * x + d`, so each industry's output covers both final demand and
        the intermediate inputs other industries need. Unit prices are a markup
        over wages and intermediate costs,
        `p1 = (w / pr1) + (p1 * a11 + p2 * a21 + p3 * a31) * (1 + mu)`. With the
        wage `w`, markup `mu` and productivities fixed, these prices are constant,
        so the consumer price index settles at `p_c = 1.0019` and the inflation
        tax `infl` is negligible.

        **Real consumption** avoids money illusion:
        `cons = alpha1 * ((yd / p_c) - infl) + alpha2 * lag(v) / p_c`, deflating
        income and wealth by the price index. The propensity `alpha1` is where the
        climate feedback enters. In the baseline (`alpha12 = 0`) `alpha1` is flat
        at `0.8 - 8 * 0.025 = 0.6`, and the economy converges to a monetary steady
        state with GDP `y` near `105.7` and household wealth `v` near `85.9`.

        The **physical identities** then ride on top of that real activity. Because
        `beta_e` declines at 1% a year (`beta_e = lag(beta_e) * (1 - g_beta_e)`),
        emissions `emis` peak around `47` near period 20 and fall back toward `22`
        by period 100 even as output plateaus — decarbonisation per unit of fossil
        energy outpaces the modest growth in `nen`. Cumulative CO2 keeps rising,
        so `temp` climbs monotonically to about `8.7°C` over the run.
  - solver:
      id: solver
      title: Solver
      modelId: eco-3io-pc
      collapsed: true
      method: gauss-seidel
      tolerance: "1e-10"
      maxIterations: 200
      defaultInitialValue: "0"
      hiddenLeftVariable: h_h
      hiddenRightVariable: h_s
      hiddenTolerance: "1e-6"
      relativeHiddenTolerance: false
  - externals:
      id: externals-equations
      title: Externals
      modelId: eco-3io-pc
      collapsed: true
      rows:
        - [r, 0.025, "Interest rate on government bills.", 1/year, aux]
        - [g, 20, "Real government expenditure.", items/year, flow]
        - [alpha10, 0.8, "Autonomous propensity to consume out of income.", "", aux]
        - [alpha11, 8, "Interest-rate elasticity of consumption propensity.", year, aux]
        - [alpha12, 0, "Temperature-change elasticity of consumption propensity.", "", aux]
