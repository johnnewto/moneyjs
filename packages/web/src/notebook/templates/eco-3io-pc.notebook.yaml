format: sfcr-notebook-yaml
formatVersion: 1
id: eco-3io-pc-notebook
title: ECO-3IO-PC Notebook
metadata:
  version: 1
  template: eco-3io-pc
cells:
  - markdown:
      id: intro
      title: Overview
      source: "This notebook ports Marco Veronese Passarella's ECO-3IO-PC prototype from the Florence 2025 keynote. It combines Model PC with a three-industry input-output structure and an ecological block for matter, energy, emissions, and temperature feedback on consumption."
  - matrix:
      id: balance-sheet
      accountingKind: balance-sheet
      title: ECO-3IO-PC balance sheet
      description: Balance-sheet matrix for the 3IO-PC macro structure.
      note: Validated against the baseline simulation in the Florence R fixture.
      sourceRunCellId: baseline-run
      columns: [Households, Firms, Central bank, Government, Sum]
      sectors: [Households, Firms, Central bank, Government, ""]
      rows:
        - [Cash, Cash (money), +h_h, "", -h_s, "", "0"]
        - [Bills, Bills, +b_h, "", +b_cb, -b_s, "0"]
        - [Wealth, Wealth, -v, "", "", +b_s, "0"]
        - [Sum, Sum, "0", "0", "0", "0", "0"]
  - matrix:
      id: transaction-flow
      accountingKind: transaction-flow
      title: ECO-3IO-PC transactions-flow matrix
      description: Transactions-flow matrix for the 3IO-PC macro structure.
      note: Validated against the baseline simulation in the Florence R fixture.
      sourceRunCellId: baseline-run
      columns: [Households, Firms, Central bank, Government, Sum]
      sectors: [Households, Firms, Central bank, Government, ""]
      rows:
        - [Consumption, Consumption, -cons * p_c, +cons * p_c, "", "", "0"]
        - [Government, Government expenditure, "", +g * p_g, "", -g * p_g, "0"]
        - [Income, GDP (income), +y, -y, "", "", "0"]
        - [Interest, Interest payments, +lag(r) * lag(b_h), "", +lag(r) * lag(b_cb), -lag(r) * lag(b_s), "0"]
        - [Profits, CB profit, "", "", -lag(r) * lag(b_cb), +lag(r) * lag(b_cb), "0"]
        - [Taxes, Taxes, -t, "", "", +t, "0"]
        - [Cash, Change in cash, -(h_h - lag(h_h)), "", +(h_s - lag(h_s)), "", "0"]
        - [Bills, Change in bills, -(b_h - lag(b_h)), "", -(b_cb - lag(b_cb)), +(b_s - lag(b_s)), "0"]
        - [Sum, Sum, "0", "0", "0", "0", "0"]
  - sequence:
      id: transaction-flow-sequence
      title: ECO-3IO-PC transaction flow sequence
      source:
        kind: matrix
        matrixCellId: transaction-flow
      description: Sequence view generated from the transactions-flow matrix at the selected simulation period.
  - equations:
      id: equations
      title: ECO-3IO-PC model
      modelId: eco-3io-pc
      collapsed: true
      rows:
        - [d1, beta1_c * cons + beta1_g * g, "Final demand for agriculture.", units, flow, identity]
        - [d2, beta2_c * cons + beta2_g * g, "Final demand for manufacturing.", units, flow, identity]
        - [d3, beta3_c * cons + beta3_g * g, "Final demand for services.", units, flow, identity]
        - [x1, a11 * x1 + a12 * x2 + a13 * x3 + d1, "Gross output in agriculture.", units, flow, identity]
        - [x2, a21 * x1 + a22 * x2 + a23 * x3 + d2, "Gross output in manufacturing.", units, flow, identity]
        - [x3, a31 * x1 + a32 * x2 + a33 * x3 + d3, "Gross output in services.", units, flow, identity]
        - [y, p1 * d1 + p2 * d2 + p3 * d3, "Nominal GDP from final demands.", currency/year, flow, identity]
        - [p1, (w / pr1) + (p1 * a11 + p2 * a21 + p3 * a31) * (1 + mu), "Unit price in agriculture.", currency/unit, flow, identity]
        - [p2, (w / pr2) + (p1 * a12 + p2 * a22 + p3 * a32) * (1 + mu), "Unit price in manufacturing.", currency/unit, flow, identity]
        - [p3, (w / pr3) + (p1 * a13 + p2 * a23 + p3 * a33) * (1 + mu), "Unit price in services.", currency/unit, flow, identity]
        - [p_c, p1 * beta1_c + p2 * beta2_c + p3 * beta3_c, "Consumer price index.", currency/unit, flow, identity]
        - [p_g, p1 * beta1_g + p2 * beta2_g + p3 * beta3_g, "Government purchase price index.", currency/unit, flow, identity]
        - [yd, y - t + lag(r) * lag(b_h), "Household disposable income.", currency/year, flow, identity]
        - [v, I(yd - p_c * cons), "Household wealth.", currency, stock, accumulation]
        - [infl, ((p_c - lag(p_c)) / lag(p_c)) * (lag(v) / p_c), "Inflation tax on lagged wealth.", currency/year, flow, identity]
        - [cons, alpha1 * ((yd / p_c) - infl) + alpha2 * lag(v) / p_c, "Real consumption without monetary illusion.", units/year, flow, identity]
        - [alpha1, alpha10 - alpha11 * lag(r) - alpha12 * (temp - lag(temp)), "Endogenous propensity to consume out of income.", "", aux, identity]
        - [h_h, v - b_h, "Household cash holdings.", currency, stock, accumulation]
        - [b_h, v * (lambda0 + lambda1 * r - lambda2 * (yd / v)), "Household bill holdings.", currency, stock, accumulation]
        - [t, theta * (y + lag(r) * lag(b_h)), "Income and interest taxes.", currency/year, flow, identity]
        - [b_s, I(p_g * g + lag(r) * lag(b_s) - t - lag(r) * lag(b_cb)), "Government bill supply.", currency, stock, accumulation]
        - [h_s, I(b_cb - lag(b_cb)), "High-powered money supply.", currency, stock, accumulation]
        - [b_cb, b_s - b_h, "Central-bank bill holdings.", currency, stock, accumulation]
        - [x_mat, mu_mat1 * x1 + mu_mat2 * x2 + mu_mat3 * x3, "Production of material goods.", Gt/year, flow, identity]
        - [rec, rho_dis * dis, "Recycled socioeconomic stock.", Gt/year, flow, identity]
        - [dis, mu_mat1 * zeta_dc1 * lag(dc1) + mu_mat2 * zeta_dc2 * lag(dc2) + mu_mat3 * zeta_dc3 * lag(dc3), "Discarded socioeconomic stock.", Gt/year, flow, identity]
        - [dc1, (1 - zeta_dc1) * lag(dc1) + beta1_c * cons, "Durable stock of product 1.", units, stock, accumulation]
        - [dc2, (1 - zeta_dc2) * lag(dc2) + beta2_c * cons, "Durable stock of product 2.", units, stock, accumulation]
        - [dc3, (1 - zeta_dc3) * lag(dc3) + beta3_c * cons, "Durable stock of product 3.", units, stock, accumulation]
        - [mat, x_mat - rec, "Extracted matter.", Gt/year, flow, identity]
        - [kh, I(x_mat - dis), "Socioeconomic stock of matter.", Gt, stock, accumulation]
        - [wa, mat - (kh - lag(kh)), "Waste flow.", Gt/year, flow, identity]
        - [en, eps_en1 * x1 + eps_en2 * x2 + eps_en3 * x3, "Total energy use.", EJ/year, flow, identity]
        - [ren, eps_en1 * eta_en1 * x1 + eps_en2 * eta_en2 * x2 + eps_en3 * eta_en3 * x3, "Renewable energy use.", EJ/year, flow, identity]
        - [nen, en - ren, "Non-renewable energy use.", EJ/year, flow, identity]
        - [emis, beta_e * nen, "Annual CO2 emissions.", GtCO2/year, flow, identity]
        - [beta_e, lag(beta_e) * (1 - g_beta_e), "CO2 intensity of non-renewable energy.", 1/EJ, aux, identity]
        - [co2_cum, I(emis), "Cumulative CO2 emissions.", GtCO2, stock, accumulation]
        - [temp, (tcre / (1 - fnc)) * co2_cum, "Atmospheric temperature response.", degC, flow, identity]
        - [k_m, I(conv_m - mat), "Matter reserves.", Gt, stock, accumulation]
        - [conv_m, sigma_m * res_m, "Matter resources converted to reserves.", Gt/year, flow, identity]
        - [res_m, lag(res_m) - conv_m, "Matter resource stock.", Gt, stock, accumulation]
        - [cen, emis / car, "Carbon mass of energy use.", GtC/year, flow, identity]
        - [o2, emis - cen, "Oxygen mass flow.", Gt/year, flow, identity]
        - [k_e, I(conv_e - nen), "Energy reserves.", EJ, stock, accumulation]
        - [conv_e, sigma_e * res_e, "Energy resources converted to reserves.", EJ/year, flow, identity]
        - [res_e, lag(res_e) - conv_e, "Energy resource stock.", EJ, stock, accumulation]
  - solver:
      id: solver
      title: Solver
      modelId: eco-3io-pc
      collapsed: true
      method: gauss-seidel
      tolerance: "1e-10"
      maxIterations: 200
      defaultInitialValue: "0"
      hiddenLeftVariable: h_h
      hiddenRightVariable: h_s
      hiddenTolerance: "1e-6"
      relativeHiddenTolerance: false
  - externals:
      id: externals-equations
      title: Externals
      modelId: eco-3io-pc
      collapsed: true
      rows:
        - [r, 0.025, "Interest rate on government bills.", 1/year, aux]
        - [g, 20, "Real government expenditure.", units/year, aux]
        - [alpha10, 0.8, "Autonomous propensity to consume out of income.", "", aux]
        - [alpha11, 8, "Interest-rate elasticity of consumption propensity.", year, aux]
        - [alpha12, 0, "Temperature-change elasticity of consumption propensity.", 1/degC, aux]
        - [alpha2, 0.4, "Propensity to consume out of lagged wealth.", 1/year, aux]
        - [w, 0.4, "Uniform wage rate.", currency/unit, aux]
        - [mu, 0.875, "Uniform markup.", "", aux]
        - [pr1, 3.5, "Labour productivity in agriculture.", units/labour, aux]
        - [pr2, 5, "Labour productivity in manufacturing.", units/labour, aux]
        - [pr3, 2.2, "Labour productivity in services.", units/labour, aux]
        - [lambda0, 0.635, "Autonomous portfolio share of bills.", "", aux]
        - [lambda1, 5, "Interest elasticity of bill demand.", year, aux]
        - [lambda2, 0.01, "Income elasticity of bill demand.", year, aux]
        - [theta, 0.2, "Tax rate on income and interest.", "", aux]
        - [beta1_c, 0.15, "Consumption share of agriculture output.", "", aux]
        - [beta2_c, 0.35, "Consumption share of manufacturing output.", "", aux]
        - [beta3_c, 0.5, "Consumption share of services output.", "", aux]
        - [beta1_g, 0.1, "Government spending share of agriculture output.", "", aux]
        - [beta2_g, 0.3, "Government spending share of manufacturing output.", "", aux]
        - [beta3_g, 0.6, "Government spending share of services output.", "", aux]
        - [a11, 0.11, "Agriculture input per unit of agriculture output.", "", aux]
        - [a12, 0.12, "Agriculture input per unit of manufacturing output.", "", aux]
        - [a13, 0.1, "Agriculture input per unit of services output.", "", aux]
        - [a21, 0.21, "Manufacturing input per unit of agriculture output.", "", aux]
        - [a22, 0.22, "Manufacturing input per unit of manufacturing output.", "", aux]
        - [a23, 0.2, "Manufacturing input per unit of services output.", "", aux]
        - [a31, 0.15, "Services input per unit of agriculture output.", "", aux]
        - [a32, 0.18, "Services input per unit of manufacturing output.", "", aux]
        - [a33, 0.1, "Services input per unit of services output.", "", aux]
        - [rho_dis, 0.2, "Recycling rate of discarded stock.", "", aux]
        - [g_beta_e, 0.01, "Decline rate of CO2 intensity.", 1/year, aux]
        - [tcre, 0.00165, "Transient climate response to cumulative emissions.", degC/GtC, aux]
        - [fnc, 0.34, "Non-CO2 share of anthropogenic forcing.", "", aux]
        - [sigma_m, 0.0005, "Matter resource conversion rate.", 1/year, aux]
        - [car, 3.67, "Carbon-to-CO2 conversion coefficient.", GtCO2/GtC, aux]
        - [sigma_e, 0.003, "Energy resource conversion rate.", 1/year, aux]
        - [mu_mat1, 0.4, "Material intensity in agriculture.", Gt/unit, aux]
        - [mu_mat2, 0.7, "Material intensity in manufacturing.", Gt/unit, aux]
        - [mu_mat3, 0.3, "Material intensity in services.", Gt/unit, aux]
        - [zeta_dc1, 0.025, "Discard rate for durable stock 1.", 1/year, aux]
        - [zeta_dc2, 0.035, "Discard rate for durable stock 2.", 1/year, aux]
        - [zeta_dc3, 0.02, "Discard rate for durable stock 3.", 1/year, aux]
        - [eps_en1, 8, "Energy intensity in agriculture.", EJ/unit, aux]
        - [eps_en2, 6, "Energy intensity in manufacturing.", EJ/unit, aux]
        - [eps_en3, 3, "Energy intensity in services.", EJ/unit, aux]
        - [eta_en1, 0.12, "Renewable share of energy in agriculture.", "", aux]
        - [eta_en2, 0.15, "Renewable share of energy in manufacturing.", "", aux]
        - [eta_en3, 0.18, "Renewable share of energy in services.", "", aux]
  - initial-values:
      id: initial-values-equations
      title: Initial values
      modelId: eco-3io-pc
      collapsed: true
      rows:
        - [p1, 1, "Initial agriculture price.", currency/unit, aux]
        - [p2, 1, "Initial manufacturing price.", currency/unit, aux]
        - [p3, 1, "Initial services price.", currency/unit, aux]
        - [p_c, 1, "Initial consumer price index.", currency/unit, aux]
        - [p_g, 1, "Initial government price index.", currency/unit, aux]
        - [beta_e, 0.07, "Initial CO2 intensity.", 1/EJ, aux]
        - [k_m, 6000, "Initial matter reserves.", Gt, aux]
        - [res_m, 388889, "Initial matter resources.", Gt, aux]
        - [k_e, 37000, "Initial energy reserves.", EJ, aux]
        - [res_e, 542000, "Initial energy resources.", EJ, aux]
  - run:
      id: baseline-run
      title: Baseline run
      description: Baseline ECO-3IO-PC simulation with hidden-equation condition h_h = h_s.
      mode: baseline
      periods: 100
      resultKey: eco_3io_pc_baseline
      sourceModelId: eco-3io-pc
  - chart:
      id: baseline-chart
      title: Baseline macro and ecological variables
      variables:
        - y
        - yd
        - cons
        - v
        - temp
        - emis
      axisMode: separate
      axisSnapTolarance: 0.5
      sourceRunCellId: baseline-run
  - table:
      id: baseline-table
      title: Baseline variable summary
      variables:
        - y
        - yd
        - cons
        - v
        - b_h
        - h_h
        - p_c
        - temp
        - emis
        - co2_cum
        - x1
        - x2
        - x3
      sourceRunCellId: baseline-run
  - markdown:
      id: scenario-1-note
      title: Temperature elasticity scenario
      source: "This scenario sets `alpha12 = 4` from period 50 onward, matching the alternative experiment in the Florence keynote code."
  - run:
      id: scenario-1-run
      title: "Scenario 1: higher temperature elasticity"
      mode: scenario
      scenario:
        shocks:
          - rangeInclusive:
              - 50
              - 100
            variables:
              alpha12:
                kind: constant
                value: 4
      baselineRunCellId: baseline-run
      periods: 100
      resultKey: eco_3io_pc_s1
      sourceModelId: eco-3io-pc
  - chart:
      id: scenario-1-chart
      title: Scenario 1 macro and climate feedback
      variables:
        - y
        - yd
        - cons
        - v
        - alpha1
        - temp
      axisMode: separate
      axisSnapTolarance: 0.5
      sourceRunCellId: scenario-1-run
