  - run:
      id: baseline-run
      title: Baseline run
      description: Baseline ECO-3IO-PC simulation with hidden-equation condition h_h = h_s.
      mode: baseline
      periods: 100
      resultKey: eco_3io_pc_baseline
      sourceModelId: eco-3io-pc
  - chart:
      id: baseline-chart
      title: Baseline macro and ecological variables
      variables:
        - infl
        - y
        - yd
        - cons
        - v
        - temp
        - emis
      axisGroups:
        - [infl]
        - [y, yd, cons, v, temp, emis]
      axisSnapTolarance: 0.5
      sourceRunCellId: baseline-run
      more: |
        The baseline traces the model from its low starting point to its steady
        state. Income `y`, disposable income `yd`, consumption `cons` and wealth
        `v` rise together from around `38` (GDP at period 1) and flatten near their
        long-run values — `y` about `105.7`, with `yd`, `cons` and `v` all close to
        `85.7` to `85.9`. This is the ordinary Model PC convergence; the ecosystem
        does not disturb it because the feedback elasticity `alpha12` is zero in the
        baseline.

        The two physical series tell the ecological story. `temp` climbs steadily,
        without flattening, to roughly `8.7°C` by period 100, because it tracks
        _cumulative_ emissions and carbon keeps accumulating. `emis`, by contrast,
        is hump-shaped: it rises to about `47` near period 20 and then drifts down
        toward `22`, reflecting the assumed 1%-a-year fall in the carbon intensity
        `beta_e`. `infl` sits on its own axis and stays essentially flat at zero,
        confirming the constant-price result of the input-output block.
  - table:
      id: baseline-table
      title: Baseline variable summary
      variables:
        - y
        - yd
        - cons
        - v
        - b_h
        - h_h
        - p_c
        - temp
        - emis
        - co2_cum
        - x1
        - x2
        - x3
      sourceRunCellId: baseline-run
      more: |
        Use the period selector to read the model at any date. At the steady state
        (late periods) GDP `y` is about `105.7`, with `yd`, `cons` and `v` near
        `85.7` to `85.9` and the consumer price index `p_c` pinned at `1.0019`.
        Gross outputs settle at roughly `x1 = 36.3` (agriculture),
        `x2 = 77.1` (manufacturing) and `x3 = 82.4` (services) — manufacturing and
        services dominate because they carry the larger consumption and government
        shares and absorb more intermediate inputs.

        The ecological columns make the physical scale visible: temperature `temp`
        rises past `8°C`, cumulative CO2 `co2_cum` exceeds `3400`, while annual
        emissions `emis` have already fallen back from their peak. Reading `b_h`
        and `h_h` together confirms the portfolio split of household wealth between
        bills and cash, and that `h_h` equals the central bank's cash supply — the
        watertightness check built into the solver.
  - markdown:
      id: scenario-1-note
      title: Temperature elasticity scenario
      source: This scenario sets `alpha12 = 4` from period 50 onward, matching the alternative experiment in the Florence keynote code.
      more: |
        This is the lecture-4 experiment: _"how do key variables behave when the
        propensity to consume out of income is influenced by an emissions-led
        increase in temperature?"_ Switching `alpha12` from `0` to `4` activates
        the term `- alpha12 * (temp - lag(temp))` in the propensity-to-consume
        equation, so households cut back when the climate is warming quickly.

        Two mechanics of the run are worth keeping in mind. First, the shock targets
        the **external** parameter `alpha12` only — exactly the kind of lever the
        notebook engine allows a scenario to pull. Second, a scenario run starts
        from the **baseline's last-period state**, so cumulative emissions and
        temperature are already at their end-of-baseline levels when the experiment
        begins; the interesting comparison is therefore the _path of the response_,
        not the absolute level of `temp` against the baseline chart.
  - run:
      id: scenario-1-run
      title: "Scenario 1: higher temperature elasticity"
      mode: scenario
      scenario:
        shocks:
          - rangeInclusive:
              - 50
              - 100
            variables:
              alpha12:
                kind: constant
                value: 4
            startPeriodInclusive: 50
            endPeriodInclusive: 100
      baselineRunCellId: baseline-run
      periods: 100
      resultKey: eco_3io_pc_s1
      sourceModelId: eco-3io-pc
  - chart:
      id: scenario-1-chart
      title: Scenario 1 macro and climate feedback
      variables:
        - y
        - yd
        - cons
        - v
        - alpha1
        - temp
      axisMode: separate
      axisGroups:
        - [y, yd, cons, v]
        - [temp]
        - [alpha1]
      axisSnapTolarance: 0.5
      sourceRunCellId: scenario-1-run
      more: |
        Once the feedback is switched on, the propensity to consume `alpha1` drops
        from its baseline `0.6` to about `0.48`, since rapid warming now subtracts
        from it. The demand contraction is immediate: GDP `y` falls roughly 16%,
        from about `105.7` to near `89.7` in the first shock periods, dragging
        consumption `cons` down with it.

        The effect is not permanent, though, and this is the instructive part. The
        feedback responds to the _change_ in temperature, `temp - lag(temp)`. As
        the carbon intensity `beta_e` keeps falling, annual emissions and hence the
        pace of warming ease off, so the drag on `alpha1` shrinks and the propensity
        partially recovers (back toward `0.52`). Output and consumption rebound and
        even edge above their old steady state, while households temporarily hold
        **more** wealth `v` during the low-consumption phase. The lesson mirrors the
        lecture's Figure 1: a climate-driven fall in the propensity to consume
        reshapes the whole macro trajectory, not just the level of emissions.
  - markdown:
      id: appendix-mat-en-note
      title: "Appendix: physical matter and energy accounting"
      source: This appendix follows `8_Mat_En_Tables.R` (Tables 4–5) and the ecological figures in `1_ECO-3IO-PC-Model.R` (Figures 7–10). Matrices are evaluated at the selected simulation period; charts trace reserves, emissions, and temperature over time.
      more: |
        Just as the monetary side has a balance sheet and a transactions-flow
        matrix, the ecosystem has two consistency tables, generated in the lecture
        by `ECOPC_model_tables.R`. The **physical flow matrix** (Table 4) is the
        law of conservation of mass and energy for a single period: what enters the
        economy as matter and energy must leave as emissions, waste, dissipated
        energy or additions to stock. The **physical stock-flow matrix** (Table 5)
        is the analogue of a flow-of-funds for the four physical stocks — material
        reserves, energy reserves, atmospheric CO2 and the socio-economic stock —
        showing how each opening stock plus the period's flows yields the closing
        stock. Both tables close to zero, which is the physical counterpart of the
        watertight monetary accounts.
  - matrix:
      id: physical-flow-matrix
      sourceRunCellId: baseline-run
      title: Physical flow matrix (Table 4)
      description: Physical flow matrix for matter and energy inputs and outputs, following the Florence keynote Table 4.
      note: Matter column uses carbon mass `cen` for non-renewable energy inputs; energy column tracks renewable and non-renewable use and dissipation.
      columns: [Matter, Energy]
      sectors: [Matter, Energy]
      rows:
        - [Inputs, Inputs, "", ""]
        - [Inputs, Extracted matter, +mat, ""]
        - [Inputs, Recycled socio-economic stock, +rec, ""]
        - [Inputs, Renewable energy, "", +ren]
        - [Inputs, Non-renewable energy, +cen, +nen]
        - [Inputs, Oxygen, +o2, ""]
        - [Outputs, Outputs, "", ""]
        - [Outputs, Industrial CO2 emissions, -emis, ""]
        - [Outputs, Discarded socio-economic stock, -dis, ""]
        - [Outputs, Dissipated energy, "", -en]
        - [Outputs, Change in socio-economic stock, -(kh - lag(kh)), ""]
      more: |
        Read this as a mass-and-energy balance for the selected period. In the
        **matter** column, inputs are extracted matter `mat`, recycled stock `rec`,
        the carbon mass of the fossil energy burned `cen`, and the oxygen `o2`
        drawn in to oxidise it; outputs are industrial CO2 `emis`, the discarded
        socio-economic stock `dis`, and the net build-up of socio-economic stock
        `kh - lag(kh)`. The column sums to zero: nothing is created or destroyed,
        only transformed.

        In the **energy** column, renewable `ren` and non-renewable `nen` energy
        enter and the whole amount is ultimately dissipated as `en` (the first law
        of thermodynamics — energy is conserved, but degraded). Around period 20,
        for example, the economy draws in roughly `mat = 87` of matter and uses
        `en = 966` of energy of which `nen = 822` is fossil, emitting about
        `emis = 47` of CO2 — the numbers behind the figures below.
  - matrix:
      id: physical-stock-flow-matrix
      sourceRunCellId: baseline-run
      title: Physical stock-flow matrix (Table 5)
      description: Physical stock-flow matrix for material reserves, energy reserves, cumulative CO2, and socioeconomic stock, following the Florence keynote Table 5.
      note: Initial-stock rows use lagged values; final-stock rows use end-of-period levels from the baseline simulation.
      columns: [Material reserves, Energy reserves, CO2 concentration, Socio-economic stock]
      sectors: [Matter, Energy, CO2, SES]
      rows:
        - [Stock, Initial stock, +lag(k_m), +lag(k_e), +lag(co2_cum), +lag(kh)]
        - [Flows, Resources converted into reserves, +conv_m, +conv_e, "", ""]
        - [Flows, CO2 emissions, "", "", +emis, ""]
        - [Flows, Production of material goods, "", "", "", +x_mat]
        - [Flows, Extraction of matter / use of energy, -mat, -nen, "", ""]
        - [Flows, Destruction of socio-economic stock, "", "", "", -dis]
        - [Stock, Final stock, +k_m, +k_e, +co2_cum, +kh]
      more: |
        Each column starts from the opening stock (`lag(...)`), adds the period's
        flows, and lands on the closing stock — and the discrepancy row is zero.
        The two **reserve** columns reveal a counter-intuitive baseline result:
        conversion of resources into reserves outruns extraction, so reserves
        actually _grow_. Around period 20 the matter column adds `conv_m = 193` of
        new reserves against only `mat = 87` of extraction, lifting `k_m` from about
        `8323` to `8428`; energy reserves `k_e` rise similarly. With the assumed
        resource base, scarcity is not the binding constraint in this run.

        The **CO2** column shows the opposite: there is no offsetting outflow, so
        atmospheric carbon `co2_cum` only accumulates — from about `785` to `832` in
        that single period. The **socio-economic stock** column nets production of
        durable goods `x_mat` against discards `dis`, so `kh` keeps building up the
        material legacy embedded in long-lived consumption goods.
  - chart:
      id: appendix-figure-7-reserves-chart
      title: "Figure 7: matter and energy reserves"
      description: Matter reserves `k_m` and energy reserves `k_e` (Gt and EJ).
      variables:
        - k_m
        - k_e
      axisMode: shared
      axisSnapTolarance: 0.5
      sourceRunCellId: baseline-run
      more: |
        Both reserve stocks rise over the run — matter reserves `k_m` from `6000`
        to about `16400`, energy reserves `k_e` from `37000` to about `95600` —
        because the conversion of resources into reserves (`conv_m`, `conv_e`)
        exceeds annual use. In this baseline the ecosystem's binding problem is the
        _sink_ side (accumulating CO2 and temperature), not the _source_ side
        (running out of reserves).
  - chart:
      id: appendix-figure-7-depletion-chart
      title: "Figure 7: reserves depletion rates"
      description: Depletion rates as percentages of lagged reserves (`100 * mat / lag(k_m)` and `100 * nen / lag(k_e)`).
      variables:
        - depl_m_pct
        - depl_e_pct
      axisMode: shared
      axisSnapTolarance: 0.5
      sourceRunCellId: baseline-run
      more: |
        The depletion rates express annual extraction as a percentage of the
        previous period's reserves, `100 * mat / lag(k_m)` and
        `100 * nen / lag(k_e)`. Both stay low — peaking around `1.1%` for matter and
        `1.5%` for energy near period 20 — and then _decline_, because reserves are
        growing faster than use. The energy rate sits above the matter rate
        throughout, reflecting the economy's heavier draw on energy than on matter.
  - chart:
      id: appendix-figure-8-chart
      title: "Figure 8: annual CO2 emissions by industry"
      description: Industry-specific emissions from non-renewable energy use by agriculture, manufacturing, and services.
      variables:
        - emis1
        - emis2
        - emis3
      axisMode: shared
      axisSnapTolarance: 0.5
      sourceRunCellId: baseline-run
      more: |
        Industry emissions decompose total CO2 by sector,
        `emis_z = eps_en_z * (1 - eta_en_z) * x_z * beta_e`. Manufacturing
        (`emis2`) is the largest emitter — it has high energy intensity, a low
        renewable share, and large output — followed by agriculture and then
        services. Each industry's curve is hump-shaped for the same reason as
        the aggregate: the falling carbon intensity `beta_e` eventually outweighs
        the gentle rise in output. This is the breakdown behind Figure 2 of the
        lecture's emissions experiment.
  - chart:
      id: appendix-figure-9-chart
      title: "Figure 9: total CO2 emissions"
      description: Annual emissions `emis` and cumulative stock `co2_cum` (separate scales, matching the dual-axis layout in the R keynote plot).
      variables:
        - emis
        - co2_cum
      axisMode: separate
      axisSnapTolarance: 0.5
      sourceRunCellId: baseline-run
      more: |
        This pairs the **flow** of emissions with the **stock** they accumulate
        into. Annual emissions `emis` peak near `47` around period 20 and then fall
        back toward `22`, but cumulative CO2 `co2_cum` rises without pause — past
        `3400` by period 100 — because a falling _flow_ that stays positive still
        _adds_ to the stock every period. The dual-axis layout makes the point that
        slowing emissions is not the same as stabilising the climate.
  - chart:
      id: appendix-figure-10-chart
      title: "Figure 10: atmospheric temperature"
      description: Temperature response driven by cumulative CO2 emissions.
      variables:
        - temp
      axisMode: separate
      axisSnapTolarance: 0.5
      sourceRunCellId: baseline-run
      more: |
        Temperature is a linear function of cumulative emissions,
        `temp = (tcre / (1 - fnc)) * co2_cum`, so it inherits the steady climb of
        `co2_cum` and reaches roughly `8.7°C` by period 100. The coefficient
        bundles the transient climate response `tcre` with the non-CO2 forcing
        share `fnc`. This is the deliberately simple climate module of the lecture:
        warming is driven entirely by the carbon the economy has already emitted, so
        only sustained _negative_ net emissions could bend the curve down.
  - table:
      id: appendix-physical-table
      title: Physical accounting summary
      description: Key physical variables for cross-checking Tables 4–5 at the selected period.
      variables:
        - mat
        - rec
        - dis
        - x_mat
        - kh
        - en
        - ren
        - nen
        - emis
        - emis1
        - emis2
        - emis3
        - co2_cum
        - temp
        - depl_m_pct
        - depl_e_pct
        - conv_m
        - conv_e
        - k_m
        - k_e
        - cen
        - o2
        - wa
      sourceRunCellId: baseline-run
      more: |
        This table gathers every physical variable so you can cross-check the two
        matrices above at the selected period and watch the conservation identities
        hold. Two are easy to verify by eye: the waste residual
        `wa = mat - (kh - lag(kh))` is what is left of extracted matter after the
        socio-economic stock grows, and the carbon/oxygen split satisfies
        `emis = cen + o2` for every period. The recycling flow `rec` stays small
        relative to extraction `mat`, so the economy in this baseline remains
        heavily dependent on virgin matter rather than on closing the material loop.